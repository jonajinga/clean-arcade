<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minesweeper Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:.5rem;touch-action:manipulation}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{font-size:1.1rem;max-width:400px;text-align:center;line-height:1.5}
.overlay .score{font-size:1.4rem;color:#22c55e}
.btn{padding:12px 32px;font-size:1.1rem;border:none;border-radius:0;cursor:pointer;background:#6366f1;color:#fff;font-weight:600;margin:.25rem}
.btn:hover{background:#4f46e5}
.btn-sm{padding:8px 16px;font-size:.9rem}
.hidden{display:none!important}
#hud{display:flex;gap:1.5rem;margin:.25rem 0;font-size:.95rem;flex-wrap:wrap;justify-content:center;align-items:center}
#hud span{color:#facc15}
#flag-toggle{padding:6px 14px;font-size:.9rem;border:2px solid #ef4444;border-radius:0;background:transparent;color:#ef4444;cursor:pointer;font-weight:600}
#flag-toggle.active{background:#ef4444;color:#fff}
#grid-wrap{overflow:auto;max-width:100%;max-height:70vh;border:2px solid #6366f1;border-radius:0}
table{border-collapse:collapse}
td{width:28px;height:28px;text-align:center;font-size:.75rem;font-weight:700;border:1px solid #1e293b;cursor:pointer;user-select:none;transition:background .1s}
td.hidden-cell{background:#334155}
td.hidden-cell:hover{background:#475569}
td.revealed{background:#1e293b;cursor:default}
td.mine{background:#ef4444}
td.flagged{background:#334155}
.n1{color:#3b82f6}.n2{color:#22c55e}.n3{color:#ef4444}.n4{color:#6366f1}
.n5{color:#facc15}.n6{color:#06b6d4}.n7{color:#e2e8f0}.n8{color:#94a3b8}
#difficulty{display:flex;gap:.5rem;margin:.5rem 0}
</style>
</head>
<body>
<h1>Minesweeper Pro</h1>
<div id="hud">
<div>Mines: <span id="mine-count">40</span></div>
<div>Time: <span id="timer">0</span>s</div>
<button id="flag-toggle" onclick="toggleFlag()">🚩 Flag</button>
</div>
<div id="grid-wrap"><table id="grid"></table></div>
<div id="start-overlay" class="overlay">
<h2>Minesweeper Pro</h2>
<p>Reveal cells without hitting mines. Numbers show adjacent mines. Right-click or use Flag mode to mark mines. First click is always safe!</p>
<div id="difficulty">
<button class="btn btn-sm" onclick="startGame(16,16,40)">16x16 (40)</button>
<button class="btn btn-sm" onclick="startGame(30,16,99)">30x16 (99)</button>
</div>
</div>
<div id="end-overlay" class="overlay hidden">
<h2 id="end-title">Game Over</h2>
<p class="score" id="end-score"></p>
<div id="difficulty2">
<button class="btn btn-sm" onclick="startGame(16,16,40)">16x16 (40)</button>
<button class="btn btn-sm" onclick="startGame(30,16,99)">30x16 (99)</button>
</div>
</div>
<script>
const SLUG='minesweeper-pro';
let COLS,ROWS,MINES,board,revealed,flagged,mineCount,firstClick,gameOver,timerVal,timerInt,flagMode=false,highScores={};

function startGame(cols,rows,mines){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  COLS=cols;ROWS=rows;MINES=mines;
  board=[];revealed=[];flagged=[];
  mineCount=mines;firstClick=true;gameOver=false;flagMode=false;
  document.getElementById('flag-toggle').classList.remove('active');
  clearInterval(timerInt);timerVal=0;
  document.getElementById('timer').textContent='0';
  document.getElementById('mine-count').textContent=mineCount;
  for(let r=0;r<ROWS;r++){
    board[r]=[];revealed[r]=[];flagged[r]=[];
    for(let c=0;c<COLS;c++){board[r][c]=0;revealed[r][c]=false;flagged[r][c]=false;}
  }
  renderGrid();
}

function placeMines(safeR,safeC){
  let placed=0;
  while(placed<MINES){
    let r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
    if(board[r][c]===-1)continue;
    if(Math.abs(r-safeR)<=1&&Math.abs(c-safeC)<=1)continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]===-1)continue;
    let count=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      let nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)count++;
    }
    board[r][c]=count;
  }
}

function renderGrid(){
  let table=document.getElementById('grid');
  table.innerHTML='';
  for(let r=0;r<ROWS;r++){
    let tr=document.createElement('tr');
    for(let c=0;c<COLS;c++){
      let td=document.createElement('td');
      td.dataset.r=r;td.dataset.c=c;
      if(revealed[r][c]){
        td.className='revealed';
        if(board[r][c]===-1){td.className='revealed mine';td.textContent='💣';}
        else if(board[r][c]>0){td.textContent=board[r][c];td.classList.add('n'+board[r][c]);}
      }else if(flagged[r][c]){
        td.className='hidden-cell flagged';td.textContent='🚩';
      }else{
        td.className='hidden-cell';
      }
      td.onclick=()=>cellClick(r,c);
      td.oncontextmenu=e=>{e.preventDefault();toggleFlagCell(r,c);};
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
}

function cellClick(r,c){
  if(gameOver||revealed[r][c])return;
  if(flagMode){toggleFlagCell(r,c);return;}
  if(flagged[r][c])return;
  if(firstClick){
    firstClick=false;
    placeMines(r,c);
    timerInt=setInterval(()=>{timerVal++;document.getElementById('timer').textContent=timerVal;},1000);
  }
  if(board[r][c]===-1){
    revealAll();gameOver=true;clearInterval(timerInt);
    document.getElementById('end-title').textContent='Game Over!';
    document.getElementById('end-score').textContent='Hit a mine at '+timerVal+'s';
    document.getElementById('end-overlay').classList.remove('hidden');
    saveState();return;
  }
  reveal(r,c);
  renderGrid();
  checkWin();
}

function reveal(r,c){
  if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===0){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);
  }
}

function revealAll(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)revealed[r][c]=true;
  renderGrid();
}

function toggleFlagCell(r,c){
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  mineCount+=flagged[r][c]?-1:1;
  document.getElementById('mine-count').textContent=mineCount;
  renderGrid();
}

function toggleFlag(){
  flagMode=!flagMode;
  document.getElementById('flag-toggle').classList.toggle('active',flagMode);
}

function checkWin(){
  let unrevealed=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!revealed[r][c])unrevealed++;
  }
  if(unrevealed===MINES){
    gameOver=true;clearInterval(timerInt);
    let key=COLS+'x'+ROWS;
    if(!highScores[key]||timerVal<highScores[key])highScores[key]=timerVal;
    document.getElementById('end-title').textContent='You Win!';
    document.getElementById('end-score').textContent='Cleared in '+timerVal+'s! Best: '+highScores[key]+'s';
    document.getElementById('end-overlay').classList.remove('hidden');
    saveState();
  }
}

function saveState(){
  try{parent.postMessage({type:'ca-save',slug:SLUG,state:{highScores}},'*')}catch(e){}
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    if(e.data.state.highScores)highScores=e.data.state.highScores;
  }
});
</script>
</body>
</html>
