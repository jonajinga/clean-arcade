<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Dodge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.hud{display:flex;gap:2rem;font-size:0.9rem;margin:0.25rem}
canvas{border:2px solid #6366f1;display:block;max-width:100%}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:1rem;color:#facc15}
.overlay p{margin-bottom:1rem;font-size:1rem;text-align:center}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{background:#4f46e5}
.hidden{display:none}
.pause-btn{background:#334155;margin:0.25rem;padding:0.5rem 1rem;font-size:0.85rem}
.game-controls{display:flex;gap:4px;justify-content:center;margin:6px auto;flex-wrap:wrap}
.game-controls button{width:48px;height:40px;font-size:1.1rem;background:#334155;color:#e2e8f0;border:none;cursor:pointer}
.game-controls button:active{background:#475569}
</style>
</head>
<body>
<h1>Space Dodge</h1>
<div class="hud"><span>Time: <strong id="timeEl">0.0</strong>s</span><span>Best: <strong id="bestEl">0.0</strong>s</span></div>
<canvas id="canvas"></canvas>
<div class="game-controls">
<button ontouchstart="event.preventDefault();keys['ArrowLeft']=true" ontouchend="event.preventDefault();keys['ArrowLeft']=false" onmousedown="keys['ArrowLeft']=true" onmouseup="keys['ArrowLeft']=false">&#9664;</button>
<button ontouchstart="event.preventDefault();keys['ArrowUp']=true" ontouchend="event.preventDefault();keys['ArrowUp']=false" onmousedown="keys['ArrowUp']=true" onmouseup="keys['ArrowUp']=false">&#9650;</button>
<button ontouchstart="event.preventDefault();keys['ArrowDown']=true" ontouchend="event.preventDefault();keys['ArrowDown']=false" onmousedown="keys['ArrowDown']=true" onmouseup="keys['ArrowDown']=false">&#9660;</button>
<button ontouchstart="event.preventDefault();keys['ArrowRight']=true" ontouchend="event.preventDefault();keys['ArrowRight']=false" onmousedown="keys['ArrowRight']=true" onmouseup="keys['ArrowRight']=false">&#9654;</button>
</div>
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>

<div class="overlay" id="startOverlay">
<h2>Space Dodge</h2>
<p>Move your ship to dodge asteroids from all directions. How long can you survive? Arrow keys / WASD / touch drag.</p>
<button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="overOverlay">
<h2 id="overTitle">Game Over</h2>
<p id="overMsg"></p>
<button onclick="startGame()">Play Again</button>
</div>

<script>
let ship,asteroids,stars,survivalTime,paused,gameOver,animId,lastTime,spawnRate,highScore=0;
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let cw,ch;
const keys={};

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='space-dodge'){const s=e.data.state;if(s)highScore=s.highScore||0}});
function save(){try{parent.postMessage({type:'ca-save',slug:'space-dodge',state:{highScore}},'*')}catch(e){}}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='P'||e.key==='p')togglePause()});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function resize(){
cw=Math.min(window.innerWidth-4,450);ch=Math.min(window.innerHeight-120,500);
canvas.width=cw;canvas.height=ch;
}
window.addEventListener('resize',resize);

let touchTarget=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const r=canvas.getBoundingClientRect();touchTarget={x:(t.clientX-r.left)*(cw/r.width),y:(t.clientY-r.top)*(ch/r.height)}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];const r=canvas.getBoundingClientRect();touchTarget={x:(t.clientX-r.left)*(cw/r.width),y:(t.clientY-r.top)*(ch/r.height)}},{passive:false});
canvas.addEventListener('touchend',()=>{touchTarget=null});

function startGame(){
resize();
ship={x:cw/2,y:ch/2,size:12};
asteroids=[];
stars=Array.from({length:80},()=>({x:Math.random()*cw,y:Math.random()*ch,s:Math.random()*2+0.5,b:Math.random()}));
survivalTime=0;paused=false;gameOver=false;spawnRate=60;lastTime=performance.now();
document.getElementById('startOverlay').classList.add('hidden');
document.getElementById('overOverlay').classList.add('hidden');
document.getElementById('bestEl').textContent=highScore.toFixed(1);
gameLoop(performance.now());
}

function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';if(!paused){lastTime=performance.now();gameLoop(performance.now())}}

function spawnAsteroid(){
const side=Math.floor(Math.random()*4);
let x,y,angle;
const size=10+Math.random()*20;
const speed=1.5+survivalTime*0.02+Math.random()*2;
if(side===0){x=Math.random()*cw;y=-size}
else if(side===1){x=cw+size;y=Math.random()*ch}
else if(side===2){x=Math.random()*cw;y=ch+size}
else{x=-size;y=Math.random()*ch}
angle=Math.atan2(ship.y-y+Math.random()*100-50,ship.x-x+Math.random()*100-50);
asteroids.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size,rot:0,vr:(Math.random()-0.5)*0.1,
vertices:Array.from({length:7},(_,i)=>{const a=i/7*Math.PI*2;return{r:size*(0.7+Math.random()*0.3),a}})
});
}

function gameLoop(now){
if(paused||gameOver){animId=null;return}
const dt=Math.min(now-lastTime,50)/16.67;
lastTime=now;
survivalTime+=dt/60;
// Spawn
spawnRate=Math.max(10,60-survivalTime*2);
if(Math.random()*spawnRate<1)spawnAsteroid();
// Ship movement
const spd=4;
if(keys['ArrowLeft']||keys['a']||keys['A'])ship.x-=spd*dt;
if(keys['ArrowRight']||keys['d']||keys['D'])ship.x+=spd*dt;
if(keys['ArrowUp']||keys['w']||keys['W'])ship.y-=spd*dt;
if(keys['ArrowDown']||keys['s']||keys['S'])ship.y+=spd*dt;
if(touchTarget){
const dx=touchTarget.x-ship.x,dy=touchTarget.y-ship.y;
const dist=Math.hypot(dx,dy);
if(dist>5){ship.x+=dx/dist*spd*dt;ship.y+=dy/dist*spd*dt}
}
ship.x=Math.max(ship.size,Math.min(cw-ship.size,ship.x));
ship.y=Math.max(ship.size,Math.min(ch-ship.size,ship.y));
// Asteroids
for(const a of asteroids){
a.x+=a.vx*dt;a.y+=a.vy*dt;a.rot+=a.vr*dt;
if(Math.hypot(a.x-ship.x,a.y-ship.y)<a.size+ship.size-4){
endGame();return;
}
}
asteroids=asteroids.filter(a=>a.x>-50&&a.x<cw+50&&a.y>-50&&a.y<ch+50);
// Stars twinkle
stars.forEach(s=>{s.b+=0.02*dt;if(s.b>1)s.b=0});
document.getElementById('timeEl').textContent=survivalTime.toFixed(1);
render();
animId=requestAnimationFrame(gameLoop);
}

function render(){
ctx.fillStyle='#0f172a';ctx.fillRect(0,0,cw,ch);
// Stars
for(const s of stars){
ctx.fillStyle=`rgba(226,232,240,${0.3+Math.sin(s.b*Math.PI*2)*0.3})`;
ctx.fillRect(s.x,s.y,s.s,s.s);
}
// Ship
ctx.save();ctx.translate(ship.x,ship.y);
ctx.fillStyle='#3b82f6';ctx.beginPath();
ctx.moveTo(0,-ship.size);ctx.lineTo(-ship.size*0.7,ship.size*0.7);ctx.lineTo(0,ship.size*0.3);ctx.lineTo(ship.size*0.7,ship.size*0.7);ctx.closePath();ctx.fill();
ctx.fillStyle='#6366f1';ctx.beginPath();ctx.moveTo(0,-ship.size*0.5);ctx.lineTo(-ship.size*0.3,ship.size*0.3);ctx.lineTo(ship.size*0.3,ship.size*0.3);ctx.closePath();ctx.fill();
// Engine glow
ctx.fillStyle='#facc15';ctx.beginPath();ctx.moveTo(-ship.size*0.3,ship.size*0.5);ctx.lineTo(0,ship.size*(0.8+Math.random()*0.4));ctx.lineTo(ship.size*0.3,ship.size*0.5);ctx.closePath();ctx.fill();
ctx.restore();
// Asteroids
for(const a of asteroids){
ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
ctx.fillStyle='#78716c';ctx.strokeStyle='#a8a29e';ctx.lineWidth=1.5;
ctx.beginPath();
a.vertices.forEach((v,i)=>{const x=Math.cos(v.a)*v.r,y=Math.sin(v.a)*v.r;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
ctx.closePath();ctx.fill();ctx.stroke();
ctx.restore();
}
}

function endGame(){
gameOver=true;cancelAnimationFrame(animId);animId=null;
highScore=Math.max(highScore,Math.round(survivalTime*10)/10);save();
document.getElementById('bestEl').textContent=highScore.toFixed(1);
setTimeout(()=>{
document.getElementById('overTitle').textContent='Destroyed!';
document.getElementById('overMsg').textContent=`Survived: ${survivalTime.toFixed(1)}s\nBest: ${highScore.toFixed(1)}s`;
document.getElementById('overOverlay').classList.remove('hidden');
},300);
}
</script>
</body>
</html>
