<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Garden Design</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-area{position:relative;width:90vw;max-width:450px;border:2px solid #6366f1;background:#1e293b}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem;padding:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
.hidden{display:none!important}
canvas{display:block;width:100%;cursor:pointer}
#controls{display:flex;gap:0.3rem;margin-top:0.5rem;flex-wrap:wrap;justify-content:center}
.tool-btn{background:#334155;padding:0.5rem 0.75rem;font-size:0.85rem;border:2px solid transparent}
.tool-btn.active{border-color:#facc15}
#score-btn{background:#22c55e}
</style>
</head>
<body>
<h1>Garden Design</h1>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="start-overlay" class="overlay">
    <h2>Garden Design</h2>
    <p>Create a beautiful garden!</p>
    <p style="color:#94a3b8">Place flowers, paths, fountains, trees.<br>Score based on variety, symmetry, coverage.</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="end-overlay" class="overlay hidden">
    <h2>Garden Score</h2>
    <p id="final-score"></p>
    <p id="score-breakdown" style="color:#94a3b8;font-size:0.85rem"></p>
    <p id="hs" style="color:#facc15"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="controls">
  <button class="tool-btn active" onclick="setTool(0,this)">🌷 Flower</button>
  <button class="tool-btn" onclick="setTool(1,this)">🌳 Tree</button>
  <button class="tool-btn" onclick="setTool(2,this)">⛲ Fountain</button>
  <button class="tool-btn" onclick="setTool(3,this)">🪨 Rock</button>
  <button class="tool-btn" onclick="setTool(4,this)">🟫 Path</button>
  <button class="tool-btn" onclick="setTool(5,this)">🌿 Bush</button>
  <button class="tool-btn" onclick="setTool(-1,this)">❌ Erase</button>
  <button id="score-btn" onclick="scoreGarden()">Score It!</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const GRID=10;let W,SZ,garden,tool=0,highScore=0;
const ITEMS=[
  {name:'Flower',colors:['#ef4444','#ec4899','#facc15','#a855f7','#f97316']},
  {name:'Tree',colors:['#22c55e']},
  {name:'Fountain',colors:['#3b82f6']},
  {name:'Rock',colors:['#94a3b8']},
  {name:'Path',colors:['#92400e']},
  {name:'Bush',colors:['#16a34a']}
];
function resize(){const r=canvas.parentElement.getBoundingClientRect();W=r.width;SZ=W/GRID;canvas.width=W;canvas.height=W}
resize();window.addEventListener('resize',()=>{resize();draw()});

function startGame(){
  garden=Array(GRID).fill(null).map(()=>Array(GRID).fill(-1));
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  draw();
}
function setTool(t,btn){
  tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function place(col,row){
  if(col<0||col>=GRID||row<0||row>=GRID)return;
  garden[row][col]=tool;
  draw();
}
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const col=Math.floor((e.clientX-r.left)/r.width*GRID);
  const row=Math.floor((e.clientY-r.top)/r.height*GRID);
  place(col,row);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();
  place(Math.floor((t.clientX-r.left)/r.width*GRID),Math.floor((t.clientY-r.top)/r.height*GRID));
});
let dragging=false;
canvas.addEventListener('mousedown',()=>dragging=true);
canvas.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const r=canvas.getBoundingClientRect();
  place(Math.floor((e.clientX-r.left)/r.width*GRID),Math.floor((e.clientY-r.top)/r.height*GRID));
});

function draw(){
  // Grass background
  ctx.fillStyle='#15803d';ctx.fillRect(0,0,W,W);
  // Grid lines
  ctx.strokeStyle='rgba(0,0,0,0.15)';
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,W);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(W,i*SZ);ctx.stroke();
  }
  // Items
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const t=garden[r][c];if(t<0)continue;
    const x=c*SZ,y=r*SZ;
    const item=ITEMS[t];
    const color=item.colors[(r*GRID+c)%item.colors.length];
    if(t===0){// Flower
      ctx.fillStyle=color;
      ctx.beginPath();for(let p=0;p<5;p++){const a=p*Math.PI*2/5-Math.PI/2;ctx.lineTo(x+SZ/2+Math.cos(a)*SZ*0.3,y+SZ/2+Math.sin(a)*SZ*0.3)}ctx.fill();
      ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(x+SZ/2,y+SZ/2,SZ*0.12,0,Math.PI*2);ctx.fill();
    }else if(t===1){// Tree
      ctx.fillStyle='#713f12';ctx.fillRect(x+SZ*0.4,y+SZ*0.5,SZ*0.2,SZ*0.4);
      ctx.fillStyle=color;ctx.beginPath();ctx.arc(x+SZ/2,y+SZ*0.35,SZ*0.35,0,Math.PI*2);ctx.fill();
    }else if(t===2){// Fountain
      ctx.fillStyle='#64748b';ctx.fillRect(x+SZ*0.15,y+SZ*0.5,SZ*0.7,SZ*0.35);
      ctx.fillStyle=color;ctx.beginPath();ctx.arc(x+SZ/2,y+SZ*0.4,SZ*0.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#93c5fd';
      ctx.beginPath();ctx.arc(x+SZ/2,y+SZ*0.3,SZ*0.08,0,Math.PI*2);ctx.fill();
    }else if(t===3){// Rock
      ctx.fillStyle=color;
      ctx.beginPath();ctx.ellipse(x+SZ/2,y+SZ*0.6,SZ*0.35,SZ*0.25,0,0,Math.PI*2);ctx.fill();
    }else if(t===4){// Path
      ctx.fillStyle=color;ctx.fillRect(x+2,y+2,SZ-4,SZ-4);
      ctx.fillStyle='#78350f';
      ctx.fillRect(x+SZ*0.1,y+SZ*0.1,SZ*0.3,SZ*0.3);
      ctx.fillRect(x+SZ*0.5,y+SZ*0.5,SZ*0.3,SZ*0.3);
    }else if(t===5){// Bush
      ctx.fillStyle=color;
      ctx.beginPath();ctx.arc(x+SZ*0.3,y+SZ*0.6,SZ*0.25,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+SZ*0.65,y+SZ*0.55,SZ*0.28,0,Math.PI*2);ctx.fill();
    }
  }
}
function scoreGarden(){
  let coverage=0,variety=new Set(),symmetry=0,total=0;
  const counts={};
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    if(garden[r][c]>=0){coverage++;variety.add(garden[r][c]);counts[garden[r][c]]=(counts[garden[r][c]]||0)+1}
    // Symmetry check (horizontal)
    const mirror=GRID-1-c;
    if(garden[r][c]===garden[r][mirror]&&garden[r][c]>=0)symmetry++;
  }
  const coverScore=Math.round(coverage/(GRID*GRID)*40);
  const varietyScore=variety.size*8;
  const symScore=Math.round(symmetry/GRID*10);
  // Balance bonus: penalize if one type dominates
  const maxCount=Math.max(...Object.values(counts),0);
  const balanceScore=coverage>0?Math.round((1-maxCount/coverage)*20):0;
  total=coverScore+varietyScore+symScore+balanceScore;
  if(total>highScore){highScore=total;saveScore()}
  document.getElementById('final-score').textContent='Total Score: '+total;
  document.getElementById('score-breakdown').textContent=`Coverage: ${coverScore} | Variety: ${varietyScore} | Symmetry: ${symScore} | Balance: ${balanceScore}`;
  document.getElementById('hs').textContent='Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
function saveScore(){try{parent.postMessage({type:'ca-save',slug:'garden-design',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='garden-design'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
