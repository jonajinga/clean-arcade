<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hex Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.info{font-size:0.9rem;margin:0.25rem 0;text-align:center;min-height:1.4em}
canvas{border:2px solid #6366f1;display:block;max-width:100%;margin:0.25rem auto}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:1rem;color:#facc15}
.overlay p{margin-bottom:1rem;font-size:1rem;text-align:center;max-width:300px}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{background:#4f46e5}
.hidden{display:none}
.modes{display:flex;gap:4px;justify-content:center;margin:4px 0}
.modes button{padding:4px 12px;font-size:0.8rem;background:#334155;color:#e2e8f0;border:1px solid #475569;cursor:pointer;border-radius:0}
.modes button.active{background:#6366f1;border-color:#6366f1}
</style>
</head>
<body>
<h1>Hex Game</h1>
<div class="modes">
<button class="active" id="btnComputer" onclick="setMode('computer')">vs Computer</button>
<button id="btnLocal" onclick="setMode('local')">vs Player</button>
</div>
<div class="info" id="info">Red (You): Connect Top-Bottom</div>
<canvas id="canvas"></canvas>

<div class="overlay" id="startOverlay">
<h2>Hex Game</h2>
<p>Red connects top to bottom. Blue (AI) connects left to right. Place pieces on the hex grid.</p>
<button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="overOverlay">
<h2 id="overTitle">Game Over</h2>
<p id="overMsg"></p>
<button onclick="startGame()">Play Again</button>
</div>

<script>
const N=11;
let board,turn,gameOver,highScore=0,wins=0,mode='computer';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const info=document.getElementById('info');

let hexSize,offX,offY,cw,ch;

function resize(){
const w=Math.min(window.innerWidth-20,500);
canvas.width=w;canvas.height=w*0.9;
cw=canvas.width;ch=canvas.height;
hexSize=Math.floor(cw/(N*1.8+2));
offX=hexSize*2;offY=hexSize*2;
if(!gameOver)render();
}
window.addEventListener('resize',resize);

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='hex-game'){const s=e.data.state;if(s&&s.highScore!=null)highScore=s.highScore}});
function save(){try{parent.postMessage({type:'ca-save',slug:'hex-game',state:{highScore}},'*')}catch(e){}}

function hexCenter(r,c){
const x=offX+c*hexSize*1.75+r*hexSize*0.875;
const y=offY+r*hexSize*1.52;
return{x,y};
}

function drawHex(cx,cy,s,fill,stroke){
ctx.beginPath();
for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.lineTo(cx+s*Math.cos(a),cy+s*Math.sin(a))}
ctx.closePath();
ctx.fillStyle=fill;ctx.fill();
ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();
}

function render(){
ctx.fillStyle='#0f172a';ctx.fillRect(0,0,cw,ch);
// Draw border indicators
for(let i=0;i<N;i++){
const t=hexCenter(0,i),b=hexCenter(N-1,i);
// top/bottom edges red
ctx.fillStyle='rgba(239,68,68,0.3)';
ctx.fillRect(t.x-hexSize*0.6,t.y-hexSize*1.1,hexSize*1.2,hexSize*0.3);
ctx.fillRect(b.x-hexSize*0.6,b.y+hexSize*0.8,hexSize*1.2,hexSize*0.3);
const l=hexCenter(i,0),ri=hexCenter(i,N-1);
ctx.fillStyle='rgba(59,130,246,0.3)';
ctx.fillRect(l.x-hexSize*1.2,l.y-hexSize*0.4,hexSize*0.4,hexSize*0.8);
ctx.fillRect(ri.x+hexSize*0.8,ri.y-hexSize*0.4,hexSize*0.4,hexSize*0.8);
}
for(let r=0;r<N;r++)for(let c=0;c<N;c++){
const{x,y}=hexCenter(r,c);
const v=board[r][c];
const fill=v===1?'#ef4444':v===2?'#3b82f6':'#1e293b';
drawHex(x,y,hexSize*0.9,fill,'#475569');
}
}

function pixelToHex(px,py){
let best=-1,bestR=-1,bestC=-1,bestD=Infinity;
for(let r=0;r<N;r++)for(let c=0;c<N;c++){
const{x,y}=hexCenter(r,c);
const d=Math.hypot(px-x,py-y);
if(d<bestD&&d<hexSize){bestD=d;bestR=r;bestC=c}
}
return bestR>=0?{r:bestR,c:bestC}:null;
}

function setMode(m){
mode=m;
document.getElementById('btnComputer').className=m==='computer'?'active':'';
document.getElementById('btnLocal').className=m==='local'?'active':'';
startGame();
}
canvas.addEventListener('click',e=>{
if(gameOver)return;
if(mode==='computer'&&turn!==1)return;
const rect=canvas.getBoundingClientRect();
const px=(e.clientX-rect.left)*(canvas.width/rect.width);
const py=(e.clientY-rect.top)*(canvas.height/rect.height);
const h=pixelToHex(px,py);
if(!h||board[h.r][h.c])return;
board[h.r][h.c]=turn;render();
if(checkWin(turn)){
  if(mode==='local'){endGame(turn===1?'Player 1 (Red) wins!':'Player 2 (Blue) wins!');}
  else{endGame('You win!');wins++;highScore=Math.max(highScore,wins);save();}
  return;
}
if(isFull()){endGame('Draw!');return}
turn=turn===1?2:1;
if(mode==='local'){
  info.textContent=turn===1?'Player 1 (Red: Top-Bottom)':'Player 2 (Blue: Left-Right)';
}else{
  info.textContent="AI thinking...";
  setTimeout(aiMove,150);
}
});

function aiMove(){
if(gameOver)return;
// Simple AI: block player paths, try to connect left-right
let best=null,bestScore=-Infinity;
for(let r=0;r<N;r++)for(let c=0;c<N;c++){
if(!board[r][c]){
let sc=0;
// Center preference
sc+=Math.max(0,5-Math.abs(r-5))+Math.max(0,5-Math.abs(c-5));
// Check if blocks player
board[r][c]=1;if(checkWin(1))sc+=1000;board[r][c]=0;
// Check if wins
board[r][c]=2;if(checkWin(2))sc+=2000;board[r][c]=0;
// Neighbor bonus
const nb=neighbors(r,c);
for(const[nr,nc]of nb){if(board[nr]&&board[nr][nc]===2)sc+=8}
if(sc>bestScore){bestScore=sc;best={r,c}}
}
}
if(best){board[best.r][best.c]=2;render()}
if(checkWin(2)){endGame('AI wins!');return}
if(isFull()){endGame('Draw!');return}
turn=1;info.textContent=mode==='local'?'Player 1 (Red: Top-Bottom)':'Your turn (Red: Top-Bottom)';
}

function neighbors(r,c){
return[[r-1,c],[r-1,c+1],[r,c-1],[r,c+1],[r+1,c-1],[r+1,c]].filter(([nr,nc])=>nr>=0&&nr<N&&nc>=0&&nc<N);
}

function checkWin(p){
const visited=Array.from({length:N},()=>Array(N).fill(false));
if(p===1){// top to bottom
const stack=[];
for(let c=0;c<N;c++)if(board[0][c]===p){stack.push([0,c]);visited[0][c]=true}
while(stack.length){
const[r,c]=stack.pop();
if(r===N-1)return true;
for(const[nr,nc]of neighbors(r,c)){
if(!visited[nr][nc]&&board[nr][nc]===p){visited[nr][nc]=true;stack.push([nr,nc])}
}
}
}else{// left to right
const stack=[];
for(let r=0;r<N;r++)if(board[r][0]===p){stack.push([r,0]);visited[r][0]=true}
while(stack.length){
const[r,c]=stack.pop();
if(c===N-1)return true;
for(const[nr,nc]of neighbors(r,c)){
if(!visited[nr][nc]&&board[nr][nc]===p){visited[nr][nc]=true;stack.push([nr,nc])}
}
}
}
return false;
}

function isFull(){for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!board[r][c])return false;return true}

function endGame(msg){
gameOver=true;info.textContent=msg;
setTimeout(()=>{
document.getElementById('overTitle').textContent=msg;
document.getElementById('overMsg').textContent=`Wins: ${wins}`;
document.getElementById('overOverlay').classList.remove('hidden');
},600);
}

function startGame(){
board=Array.from({length:N},()=>Array(N).fill(0));
turn=1;gameOver=false;
document.getElementById('startOverlay').classList.add('hidden');
document.getElementById('overOverlay').classList.add('hidden');
info.textContent=mode==='local'?'Player 1 (Red: Top-Bottom)':'Your turn (Red: Top-Bottom)';
resize();
}
</script>
</body>
</html>
