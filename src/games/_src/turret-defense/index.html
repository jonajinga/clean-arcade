<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turret Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;width:100%;max-width:480px}
canvas{display:block;width:100%;border:2px solid #6366f1;max-width:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
.overlay button,.ctrl-btn{background:#6366f1;color:#fff;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin-top:0.5rem}
.ctrl-btn{background:#334155;margin:0.3rem;font-size:0.9rem;padding:0.4rem 1rem}
#hud{display:flex;justify-content:space-between;width:100%;max-width:480px;padding:0.2rem 0.5rem;font-size:0.85rem}
#controls{display:flex;justify-content:center;gap:0.5rem;margin-top:0.3rem;flex-wrap:wrap}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Turret Defense</h1>
<div id="hud"><span id="hud-wave">Wave: 1</span><span id="hud-score">Score: 0</span><span id="hud-hp">HP: 100</span><span id="hud-hi">Hi: 0</span></div>
<div id="game-wrap">
<canvas id="c" width="480" height="480"></canvas>
<div class="overlay" id="start-overlay">
<h2>Turret Defense</h2>
<p>Defend your turret from all sides!</p>
<p>Click/tap to shoot at enemies.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="end-overlay">
<h2>Overrun!</h2>
<p id="final-score"></p>
<p id="final-hi"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<div id="controls">
<button class="ctrl-btn" id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const CX=240,CY=240;
let turretAngle=0,enemies=[],bullets=[],particles=[],score=0,hp=100,wave=1,highScore=0;
let running=false,paused=false,lastTime,waveTimer=0,enemiesInWave=0,spawnedInWave=0;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='turret-defense'){highScore=e.data.state?.highScore||0;document.getElementById('hud-hi').textContent='Hi: '+highScore}});

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  enemies=[];bullets=[];particles=[];score=0;hp=100;wave=1;
  enemiesInWave=5;spawnedInWave=0;waveTimer=0;
  running=true;paused=false;lastTime=performance.now();
  requestAnimationFrame(loop);
}

function togglePause(){if(!running)return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused){lastTime=performance.now();requestAnimationFrame(loop)}}

function spawnEnemy(){
  const angle=Math.random()*Math.PI*2;
  const dist=280;
  const speed=0.5+wave*0.15+Math.random()*0.3;
  const hp=1+Math.floor(wave/3);
  enemies.push({x:CX+Math.cos(angle)*dist,y:CY+Math.sin(angle)*dist,speed,hp,maxHp:hp,r:8+hp*2});
}

function shoot(tx,ty){
  if(!running||paused)return;
  const dx=tx-CX,dy=ty-CY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<5)return;
  turretAngle=Math.atan2(dy,dx);
  const speed=8;
  bullets.push({x:CX+Math.cos(turretAngle)*20,y:CY+Math.sin(turretAngle)*20,vx:dx/dist*speed,vy:dy/dist*speed,life:60});
}

function loop(ts){
  if(!running||paused)return;
  const dt=(ts-lastTime)/16;lastTime=ts;
  waveTimer+=dt;
  // spawn
  if(spawnedInWave<enemiesInWave&&waveTimer>30){waveTimer=0;spawnEnemy();spawnedInWave++}
  // next wave
  if(spawnedInWave>=enemiesInWave&&enemies.length===0){wave++;enemiesInWave=5+wave*2;spawnedInWave=0}
  // update enemies
  enemies.forEach(e=>{
    const dx=CX-e.x,dy=CY-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    e.x+=dx/dist*e.speed*dt;e.y+=dy/dist*e.speed*dt;
    if(dist<25){hp-=e.hp;e.hp=0}
  });
  enemies=enemies.filter(e=>e.hp>0);
  // update bullets
  bullets.forEach(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    enemies.forEach(e=>{
      const dx=b.x-e.x,dy=b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.r+4){
        e.hp--;b.life=0;score+=10;
        for(let i=0;i<5;i++)particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20});
        if(e.hp<=0)score+=20;
      }
    });
  });
  bullets=bullets.filter(b=>b.life>0&&b.x>-10&&b.x<490&&b.y>-10&&b.y<490);
  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
  particles=particles.filter(p=>p.life>0);
  if(hp<=0){endGame();return}
  draw();
  document.getElementById('hud-wave').textContent='Wave: '+wave;
  document.getElementById('hud-score').textContent='Score: '+score;
  document.getElementById('hud-hp').textContent='HP: '+Math.max(0,hp);
  requestAnimationFrame(loop);
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,480,480);
  // grid
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let i=0;i<480;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,480);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(480,i);ctx.stroke()}
  // range circles
  ctx.strokeStyle='rgba(99,102,241,0.1)';ctx.lineWidth=1;
  [80,160,240].forEach(r=>{ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.stroke()});
  // enemies
  enemies.forEach(e=>{
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#991b1b';ctx.beginPath();ctx.arc(e.x,e.y,e.r*0.6,0,Math.PI*2);ctx.fill();
    // hp bar
    if(e.maxHp>1){
      ctx.fillStyle='#334155';ctx.fillRect(e.x-e.r,e.y-e.r-6,e.r*2,4);
      ctx.fillStyle='#22c55e';ctx.fillRect(e.x-e.r,e.y-e.r-6,e.r*2*(e.hp/e.maxHp),4);
    }
  });
  // bullets
  ctx.fillStyle='#facc15';bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill()});
  // particles
  particles.forEach(p=>{ctx.fillStyle=`rgba(250,204,21,${p.life/20})`;ctx.fillRect(p.x-1,p.y-1,3,3)});
  // turret base
  ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(CX,CY,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6366f1';ctx.beginPath();ctx.arc(CX,CY,12,0,Math.PI*2);ctx.fill();
  // turret barrel
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+Math.cos(turretAngle)*25,CY+Math.sin(turretAngle)*25);ctx.stroke();
  // hp bar
  ctx.fillStyle='#334155';ctx.fillRect(10,460,200,12);
  ctx.fillStyle=hp>30?'#22c55e':'#ef4444';ctx.fillRect(10,460,hp*2,12);
  ctx.fillStyle='#e2e8f0';ctx.font='10px system-ui';ctx.fillText('HP',215,470);
}

function endGame(){
  running=false;
  if(score>highScore){highScore=score;parent.postMessage({type:'ca-save',slug:'turret-defense',state:{highScore}},'*')}
  document.getElementById('hud-hi').textContent='Hi: '+highScore;
  document.getElementById('final-score').textContent='Score: '+score+' (Wave '+wave+')';
  document.getElementById('final-hi').textContent='High Score: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}

function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(480/r.width),y:(t.clientY-r.top)*(480/r.height)};
}
canvas.addEventListener('click',e=>{const p=getCanvasPos(e);shoot(p.x,p.y)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=getCanvasPos(e);shoot(p.x,p.y)},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P')togglePause()});
</script>
</body>
</html>
