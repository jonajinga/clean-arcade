<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jigsaw Mini</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#1e293b;border:2px solid #6366f1;border-radius:12px;padding:2rem;text-align:center;max-width:420px;width:90%}
.overlay-box h2{font-size:1.8rem;margin-bottom:.8rem;color:#facc15}
.overlay-box p{margin-bottom:.5rem;color:#94a3b8;font-size:.95rem}
.overlay-box .score{font-size:1.4rem;color:#22c55e;margin:.8rem 0}
button{font-family:inherit;cursor:pointer;border:none;border-radius:0;padding:.6rem 1.2rem;font-size:1rem;font-weight:600;transition:transform .1s}
button:active{transform:scale(.96)}
.btn-play{background:#6366f1;color:#fff;font-size:1.2rem;padding:.8rem 2rem;margin-top:1rem}
.btn-play:hover{background:#818cf8}
#game{display:none;text-align:center;max-width:460px;width:100%}
.stats{display:flex;justify-content:center;gap:1.5rem;margin-bottom:1rem;font-size:.95rem;color:#94a3b8}
.stats span{font-weight:600}
.stats .time{color:#3b82f6}
.stats .moves{color:#facc15}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-width:340px;margin:0 auto;touch-action:none}
.piece{aspect-ratio:1;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;user-select:none;-webkit-user-select:none;border:2px solid transparent}
.piece:hover{transform:scale(1.05)}
.piece.selected{border-color:#fff;box-shadow:0 0 12px rgba(99,102,241,.6);transform:scale(1.08)}
.piece.correct{opacity:.85}
.msg{font-size:1rem;min-height:1.5rem;margin:.8rem 0;color:#94a3b8}
.controls{margin:.8rem 0}
.btn-shuffle{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<h1 style="font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center">Jigsaw Mini</h1>

<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>Jigsaw Mini</h2>
<p>Arrange the 16 numbered pieces in order (1-16). Click two pieces to swap them.</p>
<button class="btn-play" onclick="startGame()">Play</button>
</div>
</div>

<div class="overlay" id="winOverlay" style="display:none">
<div class="overlay-box">
<h2 style="color:#22c55e">Puzzle Complete!</h2>
<div class="score" id="winScore"></div>
<div id="winDetail" style="color:#94a3b8;margin:.3rem 0"></div>
<div id="winHigh" style="color:#facc15;margin:.5rem 0"></div>
<button class="btn-play" onclick="startGame()">Play Again</button>
</div>
</div>

<div id="game">
<div class="stats">
<span class="time">Time: <span id="timer">0:00</span></span>
<span class="moves">Moves: <span id="moveCount">0</span></span>
</div>
<div class="grid" id="grid"></div>
<div class="msg" id="msg">Click two pieces to swap them</div>
<div class="controls">
<button class="btn-shuffle" onclick="startGame()">New Puzzle</button>
</div>
</div>

<script>
const SLUG='jigsaw-mini',SIZE=4,TOTAL=16;
const COLORS=['#6366f1','#3b82f6','#22c55e','#facc15','#ef4444','#8b5cf6','#ec4899','#14b8a6',
              '#f97316','#06b6d4','#84cc16','#e879f9','#fb923c','#2dd4bf','#a78bfa','#f472b6'];
let board,selected,moves,startTime,timerInterval,bestTime=Infinity,bestMoves=Infinity;

function save(){try{window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore:{bestTime,bestMoves}}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.state){
  if(e.data.state.highScore){bestTime=e.data.state.highScore.bestTime||Infinity;bestMoves=e.data.state.highScore.bestMoves||Infinity;}
}});

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  // ensure it's not already solved
  if(a.every((v,i)=>v===i+1))return shuffle(a);
  return a;
}

function startGame(){
  document.getElementById('startOverlay').style.display='none';
  document.getElementById('winOverlay').style.display='none';
  document.getElementById('game').style.display='block';
  board=shuffle(Array.from({length:TOTAL},(_,i)=>i+1));
  selected=null;moves=0;
  document.getElementById('moveCount').textContent=0;
  document.getElementById('msg').textContent='Click two pieces to swap them';
  clearInterval(timerInterval);
  startTime=Date.now();
  timerInterval=setInterval(updateTimer,500);
  renderBoard();
}

function updateTimer(){
  let s=Math.floor((Date.now()-startTime)/1000);
  let m=Math.floor(s/60);s=s%60;
  document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
}

function renderBoard(){
  let html='';
  board.forEach((num,i)=>{
    let correct=num===i+1;
    html+=`<div class="piece${selected===i?' selected':''}${correct?' correct':''}" style="background:${COLORS[num-1]};color:${getLuma(COLORS[num-1])>.5?'#0f172a':'#fff'}" onclick="clickPiece(${i})">${num}</div>`;
  });
  document.getElementById('grid').innerHTML=html;
}

function getLuma(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return 0.2126*r+0.7152*g+0.0722*b;
}

function clickPiece(i){
  if(selected===null){
    selected=i;renderBoard();
  } else if(selected===i){
    selected=null;renderBoard();
  } else {
    [board[selected],board[i]]=[board[i],board[selected]];
    moves++;
    document.getElementById('moveCount').textContent=moves;
    selected=null;
    renderBoard();
    if(board.every((v,idx)=>v===idx+1)){
      clearInterval(timerInterval);
      updateTimer();
      win();
    }
  }
}

function win(){
  let elapsed=Math.floor((Date.now()-startTime)/1000);
  let m=Math.floor(elapsed/60),s=elapsed%60;
  let timeStr=m+':'+(s<10?'0':'')+s;
  if(elapsed<bestTime)bestTime=elapsed;
  if(moves<bestMoves)bestMoves=moves;
  save();
  document.getElementById('winScore').textContent='Completed in '+timeStr+' with '+moves+' moves';
  document.getElementById('winDetail').textContent='';
  let bm=Math.floor(bestTime/60),bs=bestTime%60;
  document.getElementById('winHigh').textContent='Best: '+bm+':'+(bs<10?'0':'')+bs+' / '+bestMoves+' moves';
  document.getElementById('winOverlay').style.display='flex';
}
</script>
</body>
</html>
