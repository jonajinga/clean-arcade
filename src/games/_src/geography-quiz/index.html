<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geography Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.game-area{border:2px solid #6366f1;max-width:100%;width:380px;padding:16px;position:relative;min-height:460px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:20px;text-align:center}
.overlay.hidden{display:none}
button{background:#6366f1;color:#e2e8f0;border:none;padding:10px 24px;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{opacity:0.9}
.score-bar{display:flex;justify-content:space-between;font-size:0.85rem;color:#94a3b8;margin-bottom:10px}
.shape-area{width:200px;height:160px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.shape-area canvas{border:1px solid #334155}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice{background:#1e293b;border:2px solid #334155;padding:12px;cursor:pointer;text-align:center;font-size:0.9rem;color:#e2e8f0;font-family:inherit}
.choice:hover{background:#334155}
.choice.correct{background:#22c55e;border-color:#22c55e;color:#0f172a}
.choice.wrong{background:#ef4444;border-color:#ef4444}
.feedback{text-align:center;margin-top:8px;font-size:0.9rem;min-height:20px}
</style>
</head>
<body>
<h1>Geography Quiz</h1>
<div class="game-area">
<div class="overlay" id="startOverlay">
<p style="margin-bottom:12px;font-size:1.1rem">Geography Quiz</p>
<p style="margin-bottom:16px;font-size:0.85rem;color:#94a3b8">Identify countries by their shape!</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<p style="margin-bottom:8px;font-size:1.2rem">Quiz Complete!</p>
<p style="margin-bottom:8px" id="goScore"></p>
<p style="margin-bottom:16px;color:#94a3b8" id="goHigh"></p>
<button onclick="startGame()">Play Again</button>
</div>
<div class="score-bar"><span>Round: <b id="round">1</b>/20</span><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span></div>
<div class="shape-area"><canvas id="shapeCanvas" width="200" height="160"></canvas></div>
<div class="choices" id="choices"></div>
<div class="feedback" id="feedback"></div>
</div>
<script>
const COUNTRIES=[
  {name:'Italy',path:[[70,10],[80,30],[90,50],[100,70],[85,100],[75,130],[65,150],[55,140],[60,110],[50,90],[55,60],[60,30]]},
  {name:'Brazil',path:[[30,20],[80,10],[130,20],[160,50],[170,90],[150,130],[120,150],[70,150],[30,130],[20,90],[25,50]]},
  {name:'Japan',path:[[90,10],[100,30],[105,60],[100,90],[95,110],[90,130],[85,145],[80,130],[85,100],[80,70],[82,40]]},
  {name:'Australia',path:[[30,50],[70,30],[120,25],[160,40],[170,70],[165,110],[140,130],[100,140],[50,130],[25,100],[20,70]]},
  {name:'India',path:[[80,10],[120,20],[150,50],[155,90],[130,130],[100,150],[70,130],[45,90],[50,50],[60,20]]},
  {name:'France',path:[[60,20],[100,10],[140,20],[155,60],[150,100],[130,130],[90,140],[50,130],[35,100],[40,60]]},
  {name:'Chile',path:[[90,5],[95,25],[93,50],[95,75],[92,100],[90,125],[88,150],[85,125],[87,100],[85,75],[87,50],[85,25]]},
  {name:'Germany',path:[[60,20],[100,15],[135,25],[140,60],[135,90],[120,110],[80,115],[55,100],[45,70],[50,40]]},
  {name:'Egypt',path:[[30,30],[170,30],[170,120],[130,130],[70,130],[30,120]]},
  {name:'Russia',path:[[10,50],[40,30],[90,20],[140,25],[180,35],[190,60],[185,90],[160,100],[120,95],[80,90],[40,80],[15,70]]},
  {name:'Mexico',path:[[20,40],[60,20],[110,25],[140,40],[160,60],[150,90],[120,110],[80,120],[40,110],[20,80]]},
  {name:'UK',path:[[80,15],[100,30],[105,55],[100,80],[95,100],[85,115],[75,105],[70,80],[72,55],[75,30]]},
  {name:'Canada',path:[[10,60],[40,40],[80,30],[120,28],[160,35],[185,50],[190,70],[170,85],[130,90],[80,88],[40,82],[15,75]]},
  {name:'Argentina',path:[[70,10],[110,15],[130,40],[125,70],[120,100],[110,130],[95,150],[80,140],[75,110],[70,80],[65,50],[60,25]]},
  {name:'Greece',path:[[60,30],[100,20],[130,35],[135,65],[120,90],[100,110],[75,120],[55,100],[45,70],[50,45]]},
  {name:'Turkey',path:[[20,50],[60,35],[100,30],[140,35],[170,50],[165,80],[130,90],[80,88],[40,80],[20,70]]},
  {name:'Sweden',path:[[85,5],[95,25],[100,55],[95,85],[90,110],[85,135],[80,150],[75,130],[78,100],[75,70],[77,40],[80,15]]},
  {name:'Spain',path:[[30,40],[80,25],[140,30],[165,55],[160,90],[130,110],[70,115],[35,100],[25,70]]},
  {name:'China',path:[[20,50],[50,25],[100,15],[150,20],[180,40],[185,75],[170,100],[130,115],[80,110],[40,95],[20,75]]},
  {name:'South Africa',path:[[40,30],[100,20],[155,30],[170,65],[160,110],[120,135],[75,135],[35,110],[25,70]]},
];
let currentRound=0,score=0,highScore=0,answered=false,rounds=[];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function drawShape(country){
  const cv=document.getElementById('shapeCanvas'),cx=cv.getContext('2d');
  cx.clearRect(0,0,200,160);
  cx.fillStyle='#6366f1';cx.strokeStyle='#e2e8f0';cx.lineWidth=2;
  cx.beginPath();
  const p=country.path;
  cx.moveTo(p[0][0],p[0][1]);
  for(let i=1;i<p.length;i++)cx.lineTo(p[i][0],p[i][1]);
  cx.closePath();cx.fill();cx.stroke();
}

function setupRound(){
  if(currentRound>=20){endGame();return}
  answered=false;
  const country=rounds[currentRound];
  drawShape(country);
  document.getElementById('round').textContent=currentRound+1;
  document.getElementById('feedback').textContent='';
  let opts=[country.name];
  const names=COUNTRIES.map(c=>c.name);
  while(opts.length<4){const n=names[Math.floor(Math.random()*names.length)];if(!opts.includes(n))opts.push(n)}
  shuffle(opts);
  const c=document.getElementById('choices');c.innerHTML='';
  opts.forEach(name=>{
    const d=document.createElement('div');d.className='choice';d.textContent=name;
    d.onclick=()=>answer(d,name,country.name);c.appendChild(d);
  });
}

function answer(el,picked,correct){
  if(answered)return;answered=true;
  if(picked===correct){score++;document.getElementById('score').textContent=score;el.classList.add('correct');document.getElementById('feedback').textContent='Correct!';document.getElementById('feedback').style.color='#22c55e'}
  else{el.classList.add('wrong');document.getElementById('feedback').textContent='It was '+correct;document.getElementById('feedback').style.color='#ef4444';document.querySelectorAll('.choice').forEach(c=>{if(c.textContent===correct)c.classList.add('correct')})}
  currentRound++;setTimeout(setupRound,1200);
}

function endGame(){
  if(score>highScore){highScore=score;saveState()}
  document.getElementById('goScore').textContent='Score: '+score+'/20';
  document.getElementById('goHigh').textContent='Best: '+highScore;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  score=0;currentRound=0;
  document.getElementById('score').textContent=0;
  document.getElementById('best').textContent=highScore;
  rounds=shuffle([...COUNTRIES]).slice(0,20);
  setupRound();
}

function saveState(){try{parent.postMessage({type:'ca-save',slug:'geography-quiz',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='geography-quiz'&&e.data.state){highScore=e.data.state.highScore||0;document.getElementById('best').textContent=highScore}});
</script>
</body>
</html>
