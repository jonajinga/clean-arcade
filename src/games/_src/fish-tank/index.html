<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Tank</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.4rem;margin:10px 0 4px}
#hud{display:flex;gap:16px;font-size:1rem;margin-bottom:6px;flex-wrap:wrap;justify-content:center}
#hud span{color:#facc15}
canvas{display:block;border-radius:8px;max-width:100%;touch-action:none;cursor:pointer}
#shop{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.sbtn{padding:8px 16px;font-size:0.9rem;background:#334155;color:#e2e8f0;border:2px solid #6366f1;border-radius:6px;cursor:pointer}
.sbtn:hover{background:#6366f1}
.sbtn:disabled{opacity:0.4;cursor:default;background:#334155}
.sbtn .cost{color:#facc15;font-size:0.8rem}
#pauseBtn{margin:6px auto;padding:8px 24px;font-size:1.2rem;background:#6366f1;color:#e2e8f0;border:none;border-radius:6px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:2rem;margin-bottom:12px;color:#facc15}
.overlay p{font-size:1.1rem;margin-bottom:6px}
.overlay button{padding:12px 36px;font-size:1.1rem;background:#6366f1;color:#e2e8f0;border:none;border-radius:6px;cursor:pointer;margin-top:10px}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Fish Tank</h1>
<div id="hud">
  <span>Fish: <b id="fishEl">1</b></span>
  <span>Coins: <b id="coinEl">0</b></span>
  <span>Food: <b id="foodEl">0</b></span>
</div>
<canvas id="c"></canvas>
<div id="shop">
  <button class="sbtn" id="buySmall" onclick="buyFish('small')">Small Fish <span class="cost">10c</span></button>
  <button class="sbtn" id="buyMed" onclick="buyFish('medium')">Med Fish <span class="cost">25c</span></button>
  <button class="sbtn" id="buyBig" onclick="buyFish('large')">Big Fish <span class="cost">50c</span></button>
  <button class="sbtn" id="buyFood" onclick="buyFood()">Buy Food x5 <span class="cost">5c</span></button>
</div>
<button id="pauseBtn">⏸</button>

<div class="overlay" id="startOverlay">
  <h2>Fish Tank</h2>
  <p>Click the tank to drop food. Fish swim toward it.</p>
  <p>Earn coins over time. Buy more fish and food!</p>
  <button onclick="startGame()">Play</button>
</div>

<script>
const SLUG='fish-tank';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=Math.min(window.innerWidth-20,600);H=canvas.height=Math.round(W*0.65);}
resize();window.addEventListener('resize',resize);

let running=false,paused=false;
let coins=0,foodCount=10,fishes=[],foods=[];
let coinTimer=0;
const FISH_COLORS=['#ef4444','#3b82f6','#22c55e','#facc15','#a855f7','#f97316','#ec4899','#06b6d4'];
const FISH_COST={small:10,medium:25,large:50};
const FISH_SIZE={small:12,medium:20,large:30};

function makeFish(type){
  const sz=FISH_SIZE[type];
  return{
    x:Math.random()*W*0.8+W*0.1,y:Math.random()*H*0.6+H*0.2,
    vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*1,
    size:sz,color:FISH_COLORS[Math.floor(Math.random()*FISH_COLORS.length)],
    type,targetFood:null,wobble:Math.random()*Math.PI*2,
    tailPhase:Math.random()*Math.PI*2
  };
}

function drawWater(){
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#0c4a6e');grd.addColorStop(1,'#0f172a');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Bubbles
  ctx.fillStyle='rgba(226,232,240,0.06)';
  for(let i=0;i<15;i++){
    const bx=(i*137+Date.now()*0.01*((i%3)+1))%W;
    const by=H-((Date.now()*0.02*(i%4+1)+i*97)%H);
    ctx.beginPath();ctx.arc(bx,by,2+i%3,0,Math.PI*2);ctx.fill();
  }
  // Sand
  ctx.fillStyle='#92400e';ctx.fillRect(0,H-15,W,15);
  ctx.fillStyle='#a16207';
  for(let i=0;i<W;i+=20){ctx.beginPath();ctx.arc(i+Math.sin(i)*5,H-12,8,Math.PI,0);ctx.fill();}
  // Plants
  ctx.fillStyle='#166534';
  for(let i=0;i<5;i++){
    const px=80+i*120;
    ctx.beginPath();ctx.moveTo(px,H-15);
    ctx.quadraticCurveTo(px-10+Math.sin(Date.now()*0.001+i)*5,H-60-i*10,px+5,H-80-i*8);
    ctx.quadraticCurveTo(px+15,H-60-i*10,px+8,H-15);ctx.fill();
  }
}

function drawFish(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  const dir=f.vx>=0?1:-1;
  ctx.scale(dir,1);
  const tailWag=Math.sin(f.tailPhase)*0.3;
  // Body
  ctx.fillStyle=f.color;
  ctx.beginPath();
  ctx.ellipse(0,0,f.size,f.size*0.5,0,0,Math.PI*2);
  ctx.fill();
  // Tail
  ctx.beginPath();
  ctx.moveTo(-f.size*0.8,0);
  ctx.lineTo(-f.size*1.4,-f.size*0.4+tailWag*f.size);
  ctx.lineTo(-f.size*1.4,f.size*0.4+tailWag*f.size);
  ctx.fill();
  // Eye
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(f.size*0.4,f.size*-0.1,f.size*0.15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0f172a';
  ctx.beginPath();ctx.arc(f.size*0.45,f.size*-0.1,f.size*0.08,0,Math.PI*2);ctx.fill();
  // Fin
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.moveTo(0,f.size*0.2);ctx.lineTo(-f.size*0.3,f.size*0.6);ctx.lineTo(f.size*0.2,f.size*0.3);ctx.fill();
  ctx.restore();
}

function drawFood(){
  foods.forEach(fd=>{
    ctx.fillStyle='#facc15';
    ctx.beginPath();ctx.arc(fd.x,fd.y,3,0,Math.PI*2);ctx.fill();
  });
}

function update(dt){
  if(paused)return;
  // Coins over time
  coinTimer+=dt;
  if(coinTimer>=2000){
    coins+=fishes.length;coinTimer=0;
    document.getElementById('coinEl').textContent=coins;
    updateShop();
  }
  // Food falls
  foods.forEach(fd=>{fd.y+=0.3;if(fd.y>H-20)fd.y=H-20;});
  // Fish AI
  fishes.forEach(f=>{
    f.tailPhase+=dt*0.008;f.wobble+=dt*0.002;
    // Find food
    if(foods.length>0){
      let closest=null,minD=Infinity;
      foods.forEach(fd=>{
        const d=Math.sqrt((fd.x-f.x)**2+(fd.y-f.y)**2);
        if(d<minD){minD=d;closest=fd;}
      });
      if(closest&&minD<200){
        const dx=closest.x-f.x,dy=closest.y-f.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        f.vx+=(dx/d)*0.15;f.vy+=(dy/d)*0.1;
        if(d<f.size){
          foods.splice(foods.indexOf(closest),1);
          document.getElementById('foodEl').textContent=foods.length;
        }
      }
    }
    // Wander
    f.vx+=Math.sin(f.wobble)*0.02;
    f.vy+=Math.cos(f.wobble*0.7)*0.015;
    // Damping
    f.vx*=0.98;f.vy*=0.98;
    // Speed limit
    const spd=Math.sqrt(f.vx*f.vx+f.vy*f.vy);
    const maxSpd=f.type==='small'?2.5:f.type==='medium'?2:1.5;
    if(spd>maxSpd){f.vx*=maxSpd/spd;f.vy*=maxSpd/spd;}
    f.x+=f.vx;f.y+=f.vy;
    // Bounds
    const m=f.size+5;
    if(f.x<m){f.x=m;f.vx*=-1;}
    if(f.x>W-m){f.x=W-m;f.vx*=-1;}
    if(f.y<m){f.y=m;f.vy*=-1;}
    if(f.y>H-25){f.y=H-25;f.vy*=-1;}
  });
}

let lastTime=0;
function loop(ts){
  if(!running)return;
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  update(dt);
  drawWater();drawFood();fishes.forEach(drawFish);
  requestAnimationFrame(loop);
}

canvas.addEventListener('click',e=>{
  if(!running||paused)return;
  if(foodCount<=0&&coins<5)return;
  if(foodCount<=0){coins-=5;foodCount+=5;document.getElementById('coinEl').textContent=coins;}
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  foods.push({x,y});foodCount--;
  document.getElementById('foodEl').textContent=foods.length;
  updateShop();
});

function buyFish(type){
  if(coins<FISH_COST[type])return;
  coins-=FISH_COST[type];
  fishes.push(makeFish(type));
  document.getElementById('fishEl').textContent=fishes.length;
  document.getElementById('coinEl').textContent=coins;
  updateShop();save();
}
function buyFood(){
  if(coins<5)return;
  coins-=5;foodCount+=5;
  document.getElementById('coinEl').textContent=coins;
  updateShop();
}

function updateShop(){
  document.getElementById('buySmall').disabled=coins<10;
  document.getElementById('buyMed').disabled=coins<25;
  document.getElementById('buyBig').disabled=coins<50;
  document.getElementById('buyFood').disabled=coins<5;
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  coins=0;foodCount=10;fishes=[makeFish('small')];foods=[];
  document.getElementById('fishEl').textContent=1;
  document.getElementById('coinEl').textContent=0;
  document.getElementById('foodEl').textContent=0;
  updateShop();
  running=true;lastTime=performance.now();requestAnimationFrame(loop);
}

function save(){window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore:fishes.length,coins}},'*');}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    // Just restore coins if reloading mid-session
  }
});

const pauseBtn=document.getElementById('pauseBtn');
pauseBtn.addEventListener('click',()=>{paused=!paused;pauseBtn.textContent=paused?'▶':'⏸';if(paused)save();});
document.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P'){paused=!paused;pauseBtn.textContent=paused?'▶':'⏸';if(paused)save();}});
</script>
</body>
</html>
