<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0f172a;overflow-x:hidden;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#e2e8f0;user-select:none;-webkit-user-select:none;touch-action:manipulation}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}
#hud{display:flex;gap:1rem;padding:0.5rem;font-size:0.85rem;color:#94a3b8;flex-wrap:wrap;justify-content:center}
#hud span{color:#e2e8f0;font-weight:700}
#game-area{text-align:center;max-width:400px;width:100%;padding:2rem 1rem}
#color-word{font-size:3.5rem;font-weight:900;margin-bottom:2rem;min-height:5rem;display:flex;align-items:center;justify-content:center}
#question{font-size:1.1rem;color:#94a3b8;margin-bottom:1.5rem}
#buttons{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.answer-btn{padding:0.75rem 2rem;font-size:1.1rem;font-weight:700;border:2px solid;cursor:pointer;min-width:120px;border-radius:0}
.answer-btn.match{background:#22c55e22;color:#22c55e;border-color:#22c55e}
.answer-btn.match:hover{background:#22c55e44}
.answer-btn.no-match{background:#ef444422;color:#ef4444;border-color:#ef4444}
.answer-btn.no-match:hover{background:#ef444444}
#feedback{margin-top:1rem;font-size:1.5rem;min-height:2rem}
#timer-bar{width:100%;max-width:400px;height:6px;background:#1e293b;margin-top:1rem;overflow:hidden}
#timer-fill{height:100%;background:#ef4444;width:100%;transition:width 0.2s linear}
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,0.92);z-index:10}
.overlay.hidden{display:none !important}
.overlay-box{background:#1e293b;border:2px solid #6366f1;border-radius:12px;padding:2rem;text-align:center;max-width:400px;width:90%;max-height:90vh;overflow-y:auto}
.overlay-box h2{font-size:1.6rem;color:#facc15;margin-bottom:.75rem}
.overlay-box p{margin:.5rem 0;color:#94a3b8}
.overlay-box p span{color:#e2e8f0;font-weight:600}
.final-score{font-size:1.15rem;color:#6366f1}
.btn{display:inline-block;padding:.7rem 1.8rem;border:none;border-radius:0;font-size:1.1rem;font-weight:600;cursor:pointer;margin:.4rem;background:#22c55e;color:#0f172a}
.btn:hover{background:#16a34a}
.opt-label{color:#94a3b8;font-size:.85rem;margin:1rem 0 .4rem;text-align:left}
.opt-group{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center}
.opt-btn{padding:.5rem .85rem;border:2px solid #475569;background:#334155;color:#e2e8f0;border-radius:0;font-size:.85rem;cursor:pointer;transition:background .2s,border-color .2s}
.opt-btn:hover{border-color:#6366f1}
.opt-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
.pause-wrap{text-align:center;padding:6px 0}
#pauseBtn{width:40px;height:40px;background:#334155;color:#e2e8f0;border:1px solid #475569;font-size:16px;cursor:pointer;border-radius:0}
#pauseBtn:hover{background:#6366f1}
</style>
</head>
<body>

<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>Color Match</h2>
<p>Does the word match its ink color?</p>
<div class="opt-label">Mode</div>
<div class="opt-group" id="modeGroup">
<button class="opt-btn active" data-mode="classic" onclick="selectMode('classic',this)">Classic</button>
<button class="opt-btn" data-mode="speed" onclick="selectMode('speed',this)">Speed Round</button>
<button class="opt-btn" data-mode="hard" onclick="selectMode('hard',this)">Hard Mode</button>
<button class="opt-btn" data-mode="reverse" onclick="selectMode('reverse',this)">Reverse</button>
</div>
<div class="opt-label">Duration</div>
<div class="opt-group" id="durGroup">
<button class="opt-btn" data-dur="15" onclick="selectDur(15,this)">15s</button>
<button class="opt-btn active" data-dur="30" onclick="selectDur(30,this)">30s</button>
<button class="opt-btn" data-dur="60" onclick="selectDur(60,this)">60s</button>
<button class="opt-btn" data-dur="90" onclick="selectDur(90,this)">90s</button>
</div>
<button class="btn" onclick="window._startGame()">Play</button>
</div>
</div>

<div class="overlay hidden" id="endOverlay">
<div class="overlay-box">
<h2 id="endTitle">Time's Up!</h2>
<p class="final-score" id="finalScore"></p>
<p>High Score (<span id="endMode">Classic</span>): <span id="endHigh">0</span></p>
<button class="btn" onclick="window._restart()">Play Again</button>
</div>
</div>

<h1 style="font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center">Color Match</h1>
<div id="hud">
Score: <span id="scoreEl">0</span> &nbsp; BEST: <span id="hiEl">0</span> &nbsp; TIME: <span id="timeEl">30</span>
</div>
<div id="game-area">
<div id="color-word">RED</div>
<div id="question">Does the word match the ink color?</div>
<div id="buttons">
<button class="answer-btn match" onclick="window._answer(true)">Match</button>
<button class="answer-btn no-match" onclick="window._answer(false)">No Match</button>
</div>
<div id="feedback"></div>
</div>
<div id="timer-bar"><div id="timer-fill"></div></div>
<div class="pause-wrap">
<button id="pauseBtn" onclick="window._togglePause()">&#9208;</button>
</div>

<script>
(function(){
  var COLORS_CLASSIC=[
    {name:'RED',hex:'#ef4444'},{name:'GREEN',hex:'#22c55e'},
    {name:'BLUE',hex:'#3b82f6'},{name:'YELLOW',hex:'#facc15'},
    {name:'WHITE',hex:'#e2e8f0'}
  ];
  var COLORS_HARD=[
    {name:'RED',hex:'#ef4444'},{name:'GREEN',hex:'#22c55e'},
    {name:'BLUE',hex:'#3b82f6'},{name:'YELLOW',hex:'#facc15'},
    {name:'WHITE',hex:'#e2e8f0'},{name:'PURPLE',hex:'#a855f7'},
    {name:'ORANGE',hex:'#f97316'},{name:'PINK',hex:'#ec4899'},
    {name:'CYAN',hex:'#06b6d4'},{name:'BROWN',hex:'#a16207'}
  ];

  var MODE_LABELS={classic:'Classic',speed:'Speed Round',hard:'Hard Mode',reverse:'Reverse'};

  var colorWord=document.getElementById('color-word');
  var feedbackEl=document.getElementById('feedback');
  var scoreEl=document.getElementById('scoreEl');
  var hiEl=document.getElementById('hiEl');
  var timeEl=document.getElementById('timeEl');
  var timerFill=document.getElementById('timer-fill');
  var questionEl=document.getElementById('question');
  var startOverlay=document.getElementById('startOverlay');
  var endOverlay=document.getElementById('endOverlay');
  var pauseBtn=document.getElementById('pauseBtn');

  var gameMode='classic',duration=30;
  var score,total,correct,isMatch,gameState,paused,startTime,remaining,tickTimer;
  var highScores={};

  function getColors(){
    if(gameMode==='hard')return COLORS_HARD;
    return COLORS_CLASSIC;
  }

  window.selectMode=function(m,btn){
    gameMode=m;
    document.querySelectorAll('#modeGroup .opt-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    if(m==='speed'){
      // default speed to 15s
      duration=15;
      document.querySelectorAll('#durGroup .opt-btn').forEach(function(b){
        b.classList.remove('active');
        if(b.dataset.dur==='15')b.classList.add('active');
      });
    }
  };

  window.selectDur=function(d,btn){
    duration=d;
    document.querySelectorAll('#durGroup .opt-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  };

  function init(){
    clearInterval(tickTimer);
    score=0;total=0;correct=0;remaining=duration;
    paused=false;
    scoreEl.textContent='0';
    timeEl.textContent=duration;
    timerFill.style.width='100%';
    feedbackEl.textContent='';
    gameState='ready';

    var key=gameMode;
    hiEl.textContent=highScores[key]||0;

    if(gameMode==='reverse'){
      questionEl.textContent='Is the INK color matching the WORD?';
    }else{
      questionEl.textContent='Does the word match the ink color?';
    }

    pauseBtn.innerHTML='&#9208;';
    newRound();
  }

  window._startGame=function(){
    init();
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    gameState='playing';
    startTime=Date.now();
    tickTimer=setInterval(tick,100);
  };

  function newRound(){
    var colors=getColors();
    var wordColor=colors[Math.floor(Math.random()*colors.length)];
    var shouldMatch=Math.random()<0.4;
    var inkColor;
    if(shouldMatch){
      inkColor=wordColor;
    }else{
      do{
        inkColor=colors[Math.floor(Math.random()*colors.length)];
      }while(inkColor.name===wordColor.name);
    }
    isMatch=shouldMatch;
    colorWord.textContent=wordColor.name;
    colorWord.style.color=inkColor.hex;
  }

  function tick(){
    if(paused)return;
    var elapsed=(Date.now()-startTime)/1000;
    remaining=Math.max(0,duration-elapsed);
    timeEl.textContent=Math.ceil(remaining);
    timerFill.style.width=(remaining/duration*100)+'%';
    if(remaining<=0)gameOver();
  }

  window._answer=function(playerSaysMatch){
    if(gameState==='ready'){
      window._startGame();
      return;
    }
    if(gameState!=='playing'||paused)return;
    total++;
    if(playerSaysMatch===isMatch){
      correct++;score++;
      scoreEl.textContent=score;
      feedbackEl.style.color='#22c55e';
      feedbackEl.textContent='Correct!';
    }else{
      feedbackEl.style.color='#ef4444';
      feedbackEl.textContent='Wrong!';
    }
    setTimeout(function(){feedbackEl.textContent='';},400);
    newRound();
  };

  function gameOver(){
    clearInterval(tickTimer);
    gameState='over';
    var key=gameMode;
    if(score>(highScores[key]||0))highScores[key]=score;
    hiEl.textContent=highScores[key]||0;
    var acc=total>0?Math.round(correct/total*100):0;
    document.getElementById('endTitle').textContent="Time's Up!";
    document.getElementById('finalScore').textContent=score+' points | '+acc+'% accuracy ('+correct+'/'+total+')';
    document.getElementById('endMode').textContent=MODE_LABELS[gameMode]||gameMode;
    document.getElementById('endHigh').textContent=highScores[key]||0;
    endOverlay.classList.remove('hidden');
    save();
  }

  function save(){
    try{parent.postMessage({type:'ca-save',slug:'color-match',state:{highScores:highScores}},'*');}catch(e){}
  }

  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='ca-load'&&e.data.state){
      if(e.data.state.highScores)highScores=e.data.state.highScores;
      else if(e.data.state.highScore)highScores.classic=e.data.state.highScore;
      hiEl.textContent=highScores[gameMode]||0;
    }
  });

  window._togglePause=function(){
    if(gameState!=='playing')return;
    paused=!paused;
    pauseBtn.innerHTML=paused?'&#9654;':'&#9208;';
    if(paused)save();
    else startTime=Date.now()-(duration-remaining)*1000;
  };

  window._restart=function(){
    endOverlay.classList.add('hidden');
    startOverlay.classList.remove('hidden');
  };

  document.addEventListener('keydown',function(e){
    if(e.code==='KeyP'&&gameState==='playing')window._togglePause();
    if(gameState==='playing'&&!paused){
      if(e.code==='ArrowLeft'||e.code==='KeyY')window._answer(true);
      if(e.code==='ArrowRight'||e.code==='KeyN')window._answer(false);
    }
  });

  init();
})();
</script>
</body>
</html>
