<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Q*bert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;display:inline-block}
canvas{display:block;max-width:100%;border:2px solid #6366f1}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
.overlay h2{color:#facc15;font-size:1.5rem;margin-bottom:0.5rem}
.overlay p{color:#e2e8f0;margin:0.25rem 0}
button{border:none;padding:0.5rem 1.5rem;font-size:1rem;cursor:pointer;color:#e2e8f0;border-radius:0;font-family:inherit}
.btn-primary{background:#6366f1}.btn-secondary{background:#334155}
#controls{display:flex;gap:0.5rem;margin:0.5rem 0}
#score-bar{display:flex;justify-content:space-between;width:100%;max-width:400px;padding:0.25rem 0;font-size:0.85rem}
.touch-controls{display:grid;grid-template-columns:70px 70px;grid-template-rows:50px 50px;gap:4px;margin:0.25rem 0}
.touch-controls button{width:100%;height:100%;font-size:0.75rem}
</style>
</head>
<body>
<h1>Q*bert</h1>
<div id="score-bar"><span id="hud-score">Score: 0</span><span id="hud-lives">Lives: 3</span><span id="hud-level">Level: 1</span></div>
<div id="game-wrap">
<canvas id="c" width="400" height="450"></canvas>
<div class="overlay" id="start-overlay">
<h2>Q*bert</h2>
<p>Hop on cubes to change their color</p>
<p>Arrow keys or diagonal buttons</p>
<button class="btn-primary" onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="over-overlay">
<h2>Game Over</h2>
<p id="final-score"></p>
<p id="high-score-msg"></p>
<button class="btn-primary" onclick="startGame()" style="margin-top:0.5rem">Play Again</button>
</div>
</div>
<div id="controls"><button class="btn-secondary" id="pause-btn" onclick="togglePause()">⏸</button></div>
<div class="touch-controls">
<button class="btn-secondary" onclick="movePlayer(-1,-1)">↖ Up-Left</button>
<button class="btn-secondary" onclick="movePlayer(0,-1)">↗ Up-Right</button>
<button class="btn-secondary" onclick="movePlayer(0,1)">↙ Down-Left</button>
<button class="btn-secondary" onclick="movePlayer(1,1)">↘ Down-Right</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=400,H=450;
let gameRunning=false,paused=false,animId;
let cubes,playerRow,playerCol,enemies,score,lives,level,highScore=0;
let moving=false,moveTimer=0;
let keys={};
const ROWS=7;
const TARGET_COLOR='#6366f1',START_COLOR='#ef4444',DONE_COLOR='#22c55e';
const CUBE_W=44,CUBE_H=32,TOP_H=12;

function resize(){const s=Math.min(window.innerWidth-16,400)/400;canvas.style.width=(400*s)+'px';canvas.style.height=(450*s)+'px';}
resize();window.addEventListener('resize',resize);
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='qbert'&&e.data.state)highScore=e.data.state.highScore||0;});
function saveState(){try{parent.postMessage({type:'ca-save',slug:'qbert',state:{highScore}},'*');}catch(e){}}

document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'){togglePause();return;}
  if(!gameRunning||paused||moving)return;
  if(e.key==='ArrowUp'||e.key==='w')movePlayer(-1,-1);
  else if(e.key==='ArrowRight'||e.key==='d')movePlayer(0,-1);
  else if(e.key==='ArrowLeft'||e.key==='a')movePlayer(0,1);
  else if(e.key==='ArrowDown'||e.key==='s')movePlayer(1,1);
});

function togglePause(){if(!gameRunning)return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused)loop();else saveState();}

function cubePos(row,col){
  let x=W/2+(col-row/2)*CUBE_W;
  let y=50+row*(CUBE_H+TOP_H);
  return{x,y};
}

function buildLevel(){
  cubes=[];
  for(let r=0;r<ROWS;r++){
    cubes[r]=[];
    for(let c=0;c<=r;c++){
      cubes[r][c]={colored:false,color:START_COLOR};
    }
  }
  playerRow=0;playerCol=0;
  enemies=[];
  moving=false;
}

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('over-overlay').classList.add('hidden');
  score=0;lives=3;level=1;
  buildLevel();
  gameRunning=true;paused=false;
  document.getElementById('pause-btn').textContent='⏸';
  updateHUD();
  if(animId)cancelAnimationFrame(animId);
  loop();
}

function updateHUD(){
  document.getElementById('hud-score').textContent='Score: '+score;
  document.getElementById('hud-lives').textContent='Lives: '+lives;
  document.getElementById('hud-level').textContent='Level: '+level;
}

function movePlayer(dRow,dCol){
  if(moving)return;
  let nr=playerRow+Math.abs(dCol),nc=playerCol+(dCol>0?0:dRow);
  if(dCol<0){nr=playerRow-1;nc=playerCol+dRow;}
  if(dCol>0){nr=playerRow+1;nc=playerCol+(dCol>0&&dRow>0?1:0);}

  // Diagonal movement on isometric grid
  // Up-left: row-1, col-1 (but col stays if going up-left)
  // Up-right: row-1, col same
  // Down-left: row+1, col same
  // Down-right: row+1, col+1
  if(dRow===-1&&dCol===-1){nr=playerRow-1;nc=playerCol-1;} // up-left
  if(dRow===0&&dCol===-1){nr=playerRow-1;nc=playerCol;}   // up-right
  if(dRow===0&&dCol===1){nr=playerRow+1;nc=playerCol;}    // down-left
  if(dRow===1&&dCol===1){nr=playerRow+1;nc=playerCol+1;}  // down-right

  if(nr<0||nr>=ROWS||nc<0||nc>nr){
    // Fell off
    loseLife();
    return;
  }

  playerRow=nr;playerCol=nc;
  moving=true;moveTimer=10;

  // Color cube
  if(!cubes[nr][nc].colored){
    cubes[nr][nc].colored=true;
    cubes[nr][nc].color=TARGET_COLOR;
    score+=25;
    updateHUD();
  }

  checkLevelComplete();
}

function checkLevelComplete(){
  let allColored=true;
  for(let r=0;r<ROWS;r++)for(let c=0;c<=r;c++)if(!cubes[r][c].colored)allColored=false;
  if(allColored){
    score+=1000;level++;buildLevel();updateHUD();
  }
}

function loseLife(){
  lives--;updateHUD();
  if(lives<=0){gameRunning=false;if(score>highScore)highScore=score;document.getElementById('final-score').textContent='Score: '+score;document.getElementById('high-score-msg').textContent='High Score: '+highScore;document.getElementById('over-overlay').classList.remove('hidden');saveState();}
  else{playerRow=0;playerCol=0;moving=true;moveTimer=20;}
}

let enemyTimer=0;
function loop(){if(!gameRunning||paused)return;update();draw();animId=requestAnimationFrame(loop);}

function update(){
  if(moving){moveTimer--;if(moveTimer<=0)moving=false;}

  // Spawn enemies
  enemyTimer++;
  if(enemyTimer>=Math.max(60,180-level*15)){
    enemyTimer=0;
    if(enemies.length<3+level){
      enemies.push({row:0,col:0,moveTimer:30+Math.random()*20,type:Math.random()<0.5?'coily':'ugg'});
    }
  }

  // Move enemies
  enemies.forEach(e=>{
    e.moveTimer--;
    if(e.moveTimer<=0){
      e.moveTimer=20+Math.random()*30;
      // Move down randomly
      if(e.row<ROWS-1){
        let goRight=Math.random()<0.5;
        e.row++;
        if(goRight)e.col++;
        // Clamp
        if(e.col>e.row)e.col=e.row;
      } else {
        // Reset
        e.row=0;e.col=0;
      }

      // Hit player
      if(e.row===playerRow&&e.col===playerCol&&!moving)loseLife();
    }
  });
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);

  // Draw cubes (isometric)
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<=r;c++){
      let{x,y}=cubePos(r,c);
      let cube=cubes[r][c];

      // Top face
      ctx.fillStyle=cube.color;
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+CUBE_W/2,y-TOP_H);
      ctx.lineTo(x+CUBE_W,y);
      ctx.lineTo(x+CUBE_W/2,y+TOP_H);
      ctx.closePath();
      ctx.fill();

      // Left face
      ctx.fillStyle='#1e293b';
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+CUBE_W/2,y+TOP_H);
      ctx.lineTo(x+CUBE_W/2,y+TOP_H+CUBE_H);
      ctx.lineTo(x,y+CUBE_H);
      ctx.closePath();
      ctx.fill();

      // Right face
      ctx.fillStyle='#334155';
      ctx.beginPath();
      ctx.moveTo(x+CUBE_W,y);
      ctx.lineTo(x+CUBE_W/2,y+TOP_H);
      ctx.lineTo(x+CUBE_W/2,y+TOP_H+CUBE_H);
      ctx.lineTo(x+CUBE_W,y+CUBE_H);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Enemies
  enemies.forEach(e=>{
    let{x,y}=cubePos(e.row,e.col);
    ctx.fillStyle=e.type==='coily'?'#22c55e':'#ef4444';
    ctx.beginPath();
    ctx.arc(x+CUBE_W/2,y-6,10,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillRect(x+CUBE_W/2-5,y-10,4,4);
    ctx.fillRect(x+CUBE_W/2+1,y-10,4,4);
  });

  // Player (Q*bert)
  if(!moving||moveTimer%4<2){
    let{x,y}=cubePos(playerRow,playerCol);
    ctx.fillStyle='#facc15';
    ctx.beginPath();
    ctx.arc(x+CUBE_W/2,y-8,12,0,Math.PI*2);
    ctx.fill();
    // Nose
    ctx.fillStyle='#ef4444';
    ctx.beginPath();
    ctx.arc(x+CUBE_W/2,y-4,4,0,Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle='#0f172a';
    ctx.fillRect(x+CUBE_W/2-5,y-12,3,3);
    ctx.fillRect(x+CUBE_W/2+2,y-12,3,3);
  }
}
</script>
</body>
</html>
