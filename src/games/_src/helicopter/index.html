<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Helicopter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.4rem;margin:.5rem 0;color:#facc15}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{color:#e2e8f0}
.btn{background:#6366f1;color:#e2e8f0;border:none;padding:.7rem 1.8rem;font-size:1rem;border-radius:.5rem;cursor:pointer;font-family:inherit}
.btn:hover{background:#818cf8}
.hidden{display:none!important}
#game{display:flex;flex-direction:column;align-items:center;width:100%;max-width:600px;padding:.5rem}
.hud{display:flex;justify-content:space-between;width:100%;font-size:.85rem;margin-bottom:.3rem}
.hud span{background:#1e293b;padding:.2rem .6rem;border-radius:.25rem}
canvas{background:#1e293b;border-radius:.5rem;display:block;max-width:100%;touch-action:none}
.pause-row{margin-top:.75rem}
.pause-btn{background:#334155;color:#e2e8f0;border:none;padding:.5rem 1.5rem;font-size:1.2rem;border-radius:.5rem;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="overlay" id="startOverlay">
<h2>Helicopter</h2>
<p>Hold click/space to rise, release to fall.<br>Navigate through the cave corridor.<br>Walls close in over time!</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="endOverlay">
<h2>Crashed!</h2>
<p id="endMsg"></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
<div id="game">
<h1>Helicopter</h1>
<div class="hud">
<span>Distance: <b id="dist">0</b></span>
<span>Best: <b id="high">0</b></span>
</div>
<canvas id="canvas" width="600" height="400"></canvas>
<div class="pause-row"><button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button></div>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W=600,H=400;
let heli,cave,score,highScore=0,gameActive=false,paused=false,holding=false,lastTime,raf,scrollSpeed;
function resize(){let w=Math.min(600,window.innerWidth-16);canvas.style.width=w+'px';canvas.style.height=(w*H/W)+'px';}
window.addEventListener('resize',resize);
function initCave(){
  cave=[];let top=50,bot=H-50,gap=220;
  for(let x=0;x<W+100;x+=4){
    top+=randFloat(-3,3);bot+=randFloat(-3,3);
    top=Math.max(10,Math.min(H/2-gap/2-10,top));
    bot=Math.max(H/2+gap/2+10,Math.min(H-10,bot));
    cave.push({x,top,bot});
  }
}
function randFloat(a,b){return a+Math.random()*(b-a);}
function extendCave(){
  let last=cave[cave.length-1];
  let gap=Math.max(80,220-score*0.15);
  let mid=H/2;
  let t=last.top+randFloat(-4,4);let b=last.bot+randFloat(-4,4);
  t=Math.max(10,Math.min(mid-gap/2,t));
  b=Math.max(mid+gap/2,Math.min(H-10,b));
  cave.push({x:last.x+4,top:t,bot:b});
}
function update(dt){
  scrollSpeed=2+score*0.005;
  // heli physics
  if(holding)heli.vy-=0.6;else heli.vy+=0.35;
  heli.vy=Math.max(-6,Math.min(6,heli.vy));
  heli.y+=heli.vy;
  // scroll cave
  for(let c of cave)c.x-=scrollSpeed;
  while(cave.length>0&&cave[0].x<-10)cave.shift();
  while(cave.length<(W+100)/4)extendCave();
  // collision
  let seg=cave.find(c=>Math.abs(c.x-heli.x)<6);
  if(seg){
    if(heli.y-8<seg.top||heli.y+8>seg.bot){endGame();return;}
  }
  if(heli.y<0||heli.y>H){endGame();return;}
  score+=scrollSpeed*0.05;
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // cave walls
  ctx.fillStyle='#334155';
  ctx.beginPath();ctx.moveTo(0,0);
  cave.forEach(c=>{ctx.lineTo(c.x,c.top);});
  ctx.lineTo(W,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,H);
  cave.forEach(c=>{ctx.lineTo(c.x,c.bot);});
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  // helicopter
  ctx.fillStyle='#22c55e';
  ctx.fillRect(heli.x-12,heli.y-6,24,12);
  ctx.fillStyle='#6366f1';
  ctx.fillRect(heli.x-16,heli.y-8,32,3); // rotor
  ctx.fillRect(heli.x+10,heli.y-2,6,4); // tail
  document.getElementById('dist').textContent=score|0;
  document.getElementById('high').textContent=highScore|0;
}
function loop(ts){
  if(!gameActive)return;
  if(!lastTime)lastTime=ts;
  let dt=Math.min((ts-lastTime)/16,3);lastTime=ts;
  if(!paused){update(dt);draw();}
  raf=requestAnimationFrame(loop);
}
function endGame(){
  gameActive=false;
  if(score>highScore)highScore=score|0;
  document.getElementById('endMsg').textContent=`Distance: ${score|0} | Best: ${highScore}`;
  document.getElementById('endOverlay').classList.remove('hidden');
  saveState();
}
function togglePause(){
  if(!gameActive)return;paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
  if(paused)saveState();
}
function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  heli={x:100,y:H/2,vy:0};score=0;paused=false;holding=false;lastTime=0;gameActive=true;
  initCave();
  document.getElementById('pauseBtn').textContent='⏸';
  raf=requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();holding=true;}
  if(e.key==='p'||e.key==='P')togglePause();
});
document.addEventListener('keyup',e=>{if(e.code==='Space')holding=false;});
canvas.addEventListener('mousedown',e=>{e.preventDefault();holding=true;});
canvas.addEventListener('mouseup',()=>{holding=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();holding=true;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();holding=false;},{passive:false});
function saveState(){try{window.parent.postMessage({type:'ca-save',slug:'helicopter',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.state){highScore=e.data.state.highScore||0;}});
resize();
</script>
</body>
</html>
