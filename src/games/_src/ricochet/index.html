<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ricochet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;width:100%;max-width:480px}
canvas{display:block;width:100%;border:2px solid #6366f1;max-width:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
.overlay button,.ctrl-btn{background:#6366f1;color:#fff;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin-top:0.5rem}
.ctrl-btn{background:#334155;margin:0.3rem;font-size:0.9rem;padding:0.4rem 1rem}
#hud{display:flex;justify-content:space-between;width:100%;max-width:480px;padding:0.2rem 0.5rem;font-size:0.85rem}
#controls{display:flex;justify-content:center;gap:0.5rem;margin-top:0.3rem;flex-wrap:wrap}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Ricochet</h1>
<div id="hud"><span id="hud-level">Level: 1/10</span><span id="hud-shots">Shots: 3</span><span id="hud-targets">Targets: 3</span><span id="hud-hi">Hi: 0</span></div>
<div id="game-wrap">
<canvas id="c" width="480" height="480"></canvas>
<div class="overlay" id="start-overlay">
<h2>Ricochet</h2>
<p>Shoot a ball that bounces off walls!</p>
<p>Hit all targets with limited shots.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="end-overlay">
<h2 id="end-title">Game Over</h2>
<p id="end-msg"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<div id="controls">
<button class="ctrl-btn" onclick="resetLevel()">Reset Level</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let level,targets,walls,shots,ball,aiming,aimEnd,running=false,highScore=0,trail=[];

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='ricochet'){highScore=e.data.state?.highScore||0;document.getElementById('hud-hi').textContent='Hi: '+highScore}});

const levels=[
  {targets:[{x:400,y:80},{x:240,y:80},{x:80,y:240}],walls:[{x:200,y:150,w:80,h:10}],shots:5,start:{x:240,y:420}},
  {targets:[{x:100,y:60},{x:380,y:60},{x:380,y:300}],walls:[{x:220,y:100,w:10,h:200}],shots:5,start:{x:60,y:420}},
  {targets:[{x:60,y:60},{x:420,y:60},{x:240,y:200}],walls:[{x:150,y:120,w:10,h:100},{x:320,y:120,w:10,h:100}],shots:4,start:{x:240,y:420}},
  {targets:[{x:60,y:420},{x:420,y:60},{x:60,y:60},{x:420,y:420}],walls:[{x:200,y:200,w:80,h:80}],shots:5,start:{x:240,y:240}},
  {targets:[{x:240,y:40},{x:40,y:240},{x:440,y:240}],walls:[{x:180,y:150,w:120,h:10},{x:180,y:300,w:120,h:10}],shots:4,start:{x:240,y:440}},
  {targets:[{x:80,y:80},{x:400,y:80},{x:80,y:400},{x:400,y:400}],walls:[{x:220,y:100,w:40,h:280}],shots:5,start:{x:240,y:240}},
  {targets:[{x:120,y:120},{x:360,y:120},{x:240,y:360}],walls:[{x:100,y:200,w:120,h:10},{x:260,y:200,w:120,h:10}],shots:3,start:{x:240,y:440}},
  {targets:[{x:60,y:60},{x:240,y:60},{x:420,y:60}],walls:[{x:160,y:130,w:10,h:150},{x:310,y:130,w:10,h:150},{x:160,y:280,w:160,h:10}],shots:4,start:{x:240,y:440}},
  {targets:[{x:80,y:240},{x:400,y:240},{x:240,y:80}],walls:[{x:180,y:160,w:120,h:10},{x:180,y:300,w:10,h:80},{x:290,y:300,w:10,h:80}],shots:3,start:{x:240,y:440}},
  {targets:[{x:60,y:60},{x:420,y:60},{x:60,y:300},{x:420,y:300},{x:240,y:180}],walls:[{x:200,y:100,w:80,h:10},{x:200,y:250,w:80,h:10},{x:140,y:160,w:10,h:100},{x:330,y:160,w:10,h:100}],shots:5,start:{x:240,y:440}}
];

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  level=0;running=true;loadLevel();
}

function loadLevel(){
  const l=levels[level];
  targets=l.targets.map(t=>({...t,r:12,hit:false}));
  walls=l.walls;shots=l.shots;ball=null;aiming=false;trail=[];
  document.getElementById('hud-level').textContent='Level: '+(level+1)+'/10';
  updateHUD();draw();
}

function resetLevel(){if(running)loadLevel()}

function updateHUD(){
  document.getElementById('hud-shots').textContent='Shots: '+shots;
  document.getElementById('hud-targets').textContent='Targets: '+targets.filter(t=>!t.hit).length;
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,480,480);
  // walls
  ctx.fillStyle='#475569';
  walls.forEach(w=>{ctx.fillRect(w.x,w.y,w.w,w.h)});
  // targets
  targets.forEach(t=>{
    if(t.hit){ctx.fillStyle='rgba(34,197,94,0.3)'}
    else{ctx.fillStyle='#ef4444'}
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();
    if(!t.hit){ctx.strokeStyle='#facc15';ctx.lineWidth=2;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.stroke()}
  });
  // trail
  ctx.strokeStyle='rgba(99,102,241,0.3)';ctx.lineWidth=2;
  if(trail.length>1){ctx.beginPath();ctx.moveTo(trail[0].x,trail[0].y);trail.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke()}
  // ball
  if(ball){
    ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(ball.x,ball.y,6,0,Math.PI*2);ctx.fill();
  }
  // start position
  if(!ball){
    const l=levels[level];
    ctx.fillStyle='rgba(99,102,241,0.5)';ctx.beginPath();ctx.arc(l.start.x,l.start.y,8,0,Math.PI*2);ctx.fill();
    // aim line
    if(aiming&&aimEnd){
      ctx.strokeStyle='rgba(250,204,21,0.6)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(l.start.x,l.start.y);ctx.lineTo(aimEnd.x,aimEnd.y);ctx.stroke();ctx.setLineDash([]);
    }
  }
}

function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(480/r.width),y:(t.clientY-r.top)*(480/r.height)};
}

canvas.addEventListener('mousedown',e=>{if(!running||ball||shots<=0)return;aiming=true;aimEnd=getCanvasPos(e)});
canvas.addEventListener('mousemove',e=>{if(aiming)aimEnd=getCanvasPos(e);draw()});
canvas.addEventListener('mouseup',e=>{if(!aiming)return;fireBall(getCanvasPos(e))});
canvas.addEventListener('touchstart',e=>{if(!running||ball||shots<=0)return;e.preventDefault();aiming=true;aimEnd=getCanvasPos(e)},{passive:false});
canvas.addEventListener('touchmove',e=>{if(aiming){e.preventDefault();aimEnd=getCanvasPos(e);draw()}},{passive:false});
canvas.addEventListener('touchend',e=>{if(aiming&&aimEnd)fireBall(aimEnd)});

function fireBall(pos){
  aiming=false;
  const l=levels[level];
  const dx=pos.x-l.start.x,dy=pos.y-l.start.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<5)return;
  const speed=6;
  ball={x:l.start.x,y:l.start.y,vx:dx/dist*speed,vy:dy/dist*speed,bounces:0};
  trail=[{x:ball.x,y:ball.y}];
  shots--;updateHUD();
  requestAnimationFrame(simulate);
}

function simulate(){
  if(!ball)return;
  for(let i=0;i<3;i++){
    ball.x+=ball.vx;ball.y+=ball.vy;
    trail.push({x:ball.x,y:ball.y});
    // wall bounces
    if(ball.x<=6||ball.x>=474){ball.vx*=-1;ball.bounces++}
    if(ball.y<=6||ball.y>=474){ball.vy*=-1;ball.bounces++}
    // obstacle bounces
    walls.forEach(w=>{
      if(ball.x>w.x-6&&ball.x<w.x+w.w+6&&ball.y>w.y-6&&ball.y<w.y+w.h+6){
        const fromLeft=ball.x-(w.x-6),fromRight=(w.x+w.w+6)-ball.x;
        const fromTop=ball.y-(w.y-6),fromBottom=(w.y+w.h+6)-ball.y;
        const min=Math.min(fromLeft,fromRight,fromTop,fromBottom);
        if(min===fromLeft||min===fromRight)ball.vx*=-1;
        else ball.vy*=-1;
        ball.bounces++;
      }
    });
    // target hits
    targets.forEach(t=>{
      if(!t.hit){
        const dx=ball.x-t.x,dy=ball.y-t.y;
        if(Math.sqrt(dx*dx+dy*dy)<t.r+6){t.hit=true;updateHUD()}
      }
    });
    if(ball.bounces>20){ball=null;break}
  }
  draw();
  if(ball)requestAnimationFrame(simulate);
  else checkLevel();
}

function checkLevel(){
  const remaining=targets.filter(t=>!t.hit).length;
  if(remaining===0){
    level++;
    if(level>=10){
      if(level>highScore){highScore=level;parent.postMessage({type:'ca-save',slug:'ricochet',state:{highScore}},'*')}
      document.getElementById('hud-hi').textContent='Hi: '+highScore;
      document.getElementById('end-title').textContent='You Win!';
      document.getElementById('end-msg').textContent='All 10 levels complete!';
      document.getElementById('end-overlay').classList.remove('hidden');
      running=false;
    }else{loadLevel()}
  }else if(shots<=0){
    document.getElementById('end-title').textContent='Out of Shots!';
    document.getElementById('end-msg').textContent='Reached level '+(level+1)+'/10';
    document.getElementById('end-overlay').classList.remove('hidden');
    running=false;
    if(level>highScore){highScore=level;parent.postMessage({type:'ca-save',slug:'ricochet',state:{highScore}},'*')}
    document.getElementById('hud-hi').textContent='Hi: '+highScore;
  }
}
</script>
</body>
</html>
