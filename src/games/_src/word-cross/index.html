<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Cross</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#info{font-size:0.8rem;color:#94a3b8;text-align:center;margin-bottom:0.25rem}
#grid{display:inline-grid;border:2px solid #6366f1;gap:2px;background:#6366f1;margin:0 auto}
.gcell{display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:bold;background:#1e293b;color:#e2e8f0;user-select:none;text-transform:uppercase}
.gcell.blank{background:#0f172a}
.gcell.filled{background:#22c55e;color:#fff}
.gcell.active{background:#6366f1;color:#fff}
#letters{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;justify-content:center}
.letter-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:#334155;color:#e2e8f0;font-size:1.2rem;font-weight:bold;cursor:pointer;border:2px solid #475569;border-radius:0;text-transform:uppercase}
.letter-btn.used{opacity:0.3;cursor:default}
.letter-btn:hover:not(.used){background:#475569}
#word-display{font-size:1.1rem;color:#facc15;margin:4px 0;min-height:1.5em;letter-spacing:0.15em;text-transform:uppercase}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
.overlay h2{color:#facc15;font-size:1.5rem;margin-bottom:1rem}
.overlay p{color:#e2e8f0;margin-bottom:1rem;text-align:center}
button{background:#6366f1;color:#fff;border:none;padding:12px 28px;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{background:#4f46e5}
#action-btns{display:flex;gap:8px;margin:4px 0}
#action-btns button{padding:8px 16px;font-size:0.85rem;background:#334155}
#hud{font-size:0.85rem;color:#94a3b8;margin:0.25rem 0}
</style>
</head>
<body>
<h1>Word Cross</h1>
<div id="hud">Level <span id="level-num">1</span>/10</div>
<div id="grid"></div>
<div id="word-display"></div>
<div id="letters"></div>
<div id="action-btns">
<button onclick="clearWord()">Clear</button>
<button onclick="submitWord()">Submit</button>
<button onclick="shuffleLetters()">Shuffle</button>
</div>

<div class="overlay" id="start-overlay">
<h2>Word Cross</h2>
<p>Form words from the given letters that fit<br>into the cross pattern. Words interlock<br>at shared letter positions.</p>
<button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="win-overlay">
<h2>Level Complete!</h2>
<p id="win-msg"></p>
<button onclick="nextLevel()">Next Level</button>
</div>

<div class="overlay hidden" id="gameover-overlay">
<h2>All Levels Done!</h2>
<p>Congratulations! You completed all 10 levels!</p>
<button onclick="resetGame()">Play Again</button>
</div>

<script>
let currentLevel=0,highScore=0,currentWord='',foundWords=new Set();

// Each level: words array, grid layout (positions of each word on grid)
// Grid is defined by cells: {r,c} for each word's letters
const LEVELS=[
  {words:['CAT','COT','ACE','TEA'],letters:'ACOTEAC',gridSize:5,
   layout:[{word:'CAT',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'COT',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'ACE',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'TEA',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['DOG','DIG','GOD','ODD'],letters:'DOGIDOD',gridSize:5,
   layout:[{word:'DOG',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'DIG',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'GOD',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'ODD',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['SUN','SET','NET','NUT'],letters:'SUNETNT',gridSize:5,
   layout:[{word:'SUN',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'SET',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'NET',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'NUT',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['HAT','HOP','TAP','POT'],letters:'HATOPTP',gridSize:5,
   layout:[{word:'HAT',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'HOP',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'TAP',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'POT',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['BED','BAD','END','DAN'],letters:'BEDANDN',gridSize:5,
   layout:[{word:'BED',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'BAD',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'END',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'DAN',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['RAT','RUG','TAG','GUM'],letters:'RATUGMG',gridSize:5,
   layout:[{word:'RAT',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'RUG',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'TAG',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'GUM',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['PEN','PIE','NET','EEL'],letters:'PENIEEL',gridSize:5,
   layout:[{word:'PEN',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'PIE',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'NET',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'EEL',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['MAP','MOP','PAD','POD'],letters:'MAPDOPD',gridSize:5,
   layout:[{word:'MAP',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'MOP',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'PAD',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'POD',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['FAN','FIG','NAP','GAP'],letters:'FANIGPG',gridSize:5,
   layout:[{word:'FAN',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'FIG',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'NAP',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'GAP',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]},
  {words:['JAM','JET','MAT','TEN'],letters:'JAMETTN',gridSize:5,
   layout:[{word:'JAM',cells:[{r:0,c:1},{r:1,c:1},{r:2,c:1}]},{word:'JET',cells:[{r:0,c:1},{r:0,c:2},{r:0,c:3}]},{word:'MAT',cells:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},{word:'TEN',cells:[{r:0,c:3},{r:1,c:3},{r:2,c:3}]}]}
];

let gridState={},availLetters=[];

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='word-cross'){const s=e.data.state;if(s&&s.highScore)highScore=s.highScore}});
function save(){try{parent.postMessage({type:'ca-save',slug:'word-cross',state:{highScore}},'*')}catch(e){}}

function loadLevel(idx){
  const lvl=LEVELS[idx%LEVELS.length];
  foundWords=new Set();
  currentWord='';
  gridState={};
  availLetters=lvl.letters.split('').map((l,i)=>({ch:l,used:false,id:i}));
  // init grid cells
  lvl.layout.forEach(w=>{
    w.cells.forEach((c,i)=>{
      const key=c.r+','+c.c;
      if(!gridState[key])gridState[key]={letter:'',revealed:false};
    });
  });
  document.getElementById('level-num').textContent=idx+1;
  render();
}

function render(){
  const lvl=LEVELS[currentLevel%LEVELS.length];
  const gs=lvl.gridSize;
  const gridEl=document.getElementById('grid');
  const maxW=Math.min(window.innerWidth-20,300);
  const cs=Math.floor(maxW/gs);
  gridEl.style.gridTemplateColumns='repeat('+gs+','+cs+'px)';
  gridEl.innerHTML='';
  for(let r=0;r<gs;r++)for(let c=0;c<gs;c++){
    const cell=document.createElement('div');
    cell.className='gcell';
    cell.style.width=cs+'px';cell.style.height=cs+'px';
    const key=r+','+c;
    if(gridState[key]){
      if(gridState[key].revealed){
        cell.classList.add('filled');
        cell.textContent=gridState[key].letter;
      }
    } else {
      cell.classList.add('blank');
    }
    gridEl.appendChild(cell);
  }
  // letters
  const letEl=document.getElementById('letters');
  letEl.innerHTML='';
  availLetters.forEach((l,i)=>{
    const btn=document.createElement('div');
    btn.className='letter-btn'+(l.used?' used':'');
    btn.textContent=l.ch;
    btn.onclick=()=>{if(!l.used){l.used=true;currentWord+=l.ch;updateWordDisplay();renderLetters()}};
    letEl.appendChild(btn);
  });
  updateWordDisplay();
}

function renderLetters(){
  const letEl=document.getElementById('letters');
  const btns=letEl.children;
  availLetters.forEach((l,i)=>{
    if(btns[i])btns[i].className='letter-btn'+(l.used?' used':'');
  });
}

function updateWordDisplay(){
  document.getElementById('word-display').textContent=currentWord||'_';
}

function clearWord(){
  currentWord='';
  availLetters.forEach(l=>l.used=false);
  renderLetters();
  updateWordDisplay();
}

function shuffleLetters(){
  for(let i=availLetters.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[availLetters[i],availLetters[j]]=[availLetters[j],availLetters[i]]}
  render();
}

function submitWord(){
  const lvl=LEVELS[currentLevel%LEVELS.length];
  const w=currentWord.toUpperCase();
  const match=lvl.layout.find(l=>l.word===w&&!foundWords.has(w));
  if(match){
    foundWords.add(w);
    match.cells.forEach((c,i)=>{
      const key=c.r+','+c.c;
      gridState[key]={letter:w[i],revealed:true};
    });
    clearWord();
    render();
    if(foundWords.size===lvl.words.length){
      const score=currentLevel+1;
      if(score>highScore){highScore=score;save()}
      setTimeout(()=>{
        if(currentLevel>=LEVELS.length-1){
          document.getElementById('gameover-overlay').classList.remove('hidden');
        } else {
          document.getElementById('win-msg').textContent='All words found!';
          document.getElementById('win-overlay').classList.remove('hidden');
        }
      },300);
    }
  } else {
    // flash wrong
    const disp=document.getElementById('word-display');
    disp.style.color='#ef4444';
    setTimeout(()=>{disp.style.color='#facc15';clearWord()},500);
  }
}

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  currentLevel=0;loadLevel(0);
}
function nextLevel(){
  document.getElementById('win-overlay').classList.add('hidden');
  currentLevel++;loadLevel(currentLevel);
}
function resetGame(){
  document.getElementById('gameover-overlay').classList.add('hidden');
  currentLevel=0;loadLevel(0);
}
</script>
</body>
</html>
