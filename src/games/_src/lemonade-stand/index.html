<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lemonade Stand</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;touch-action:manipulation}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#1e293b;border:2px solid #6366f1;border-radius:12px;padding:2rem;text-align:center;max-width:420px;width:90%}
.overlay-box h2{font-size:1.8rem;margin-bottom:.8rem;color:#facc15}
.overlay-box p{margin-bottom:.5rem;color:#94a3b8;font-size:.95rem}
.overlay-box .score{font-size:1.4rem;color:#22c55e;margin:.8rem 0}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:.6rem 1.4rem;font-size:1rem;font-weight:600;transition:transform .1s}
button:active{transform:scale(.96)}
.btn-play{background:#6366f1;color:#fff;font-size:1.2rem;padding:.8rem 2rem;margin-top:1rem}
.btn-play:hover{background:#818cf8}
#game{max-width:500px;width:100%;display:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.top-bar span{font-size:.95rem;color:#94a3b8}
.top-bar .money{color:#22c55e;font-weight:700;font-size:1.1rem}
.day-header{text-align:center;margin-bottom:1rem}
.day-header h3{font-size:1.3rem;color:#facc15}
.weather{display:flex;align-items:center;justify-content:center;gap:.5rem;margin:.5rem 0;font-size:1.1rem}
.weather .icon{font-size:1.8rem}
.controls{background:#1e293b;border-radius:10px;padding:1.2rem;margin-bottom:1rem}
.control-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:.4rem}
.control-row label{font-size:.95rem;color:#94a3b8}
.control-row .val{font-size:1.1rem;font-weight:700;color:#e2e8f0;min-width:60px;text-align:right}
input[type=range]{width:160px;accent-color:#6366f1}
.cost-info{text-align:center;color:#94a3b8;font-size:.9rem;margin-bottom:.8rem}
.btn-sell{background:#22c55e;color:#0f172a;width:100%;padding:.7rem;font-size:1.1rem}
.report{background:#1e293b;border-radius:10px;padding:1.2rem;margin-bottom:1rem;display:none}
.report h4{color:#6366f1;margin-bottom:.6rem;font-size:1.1rem}
.report-row{display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid #334155;font-size:.95rem}
.report-row:last-child{border:none}
.report-row .label{color:#94a3b8}
.report-row .positive{color:#22c55e}
.report-row .negative{color:#ef4444}
.btn-next{background:#3b82f6;color:#fff;width:100%;padding:.6rem;margin-top:.6rem}
.history{max-height:150px;overflow-y:auto;background:#1e293b;border-radius:10px;padding:.8rem;font-size:.85rem;color:#94a3b8}
.history h4{color:#6366f1;margin-bottom:.4rem}
.hist-row{display:flex;justify-content:space-between;padding:.15rem 0}
</style>
</head>
<body>
<h1 style="font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center">Lemonade Stand</h1>

<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>Lemonade Stand</h2>
<p>Run your lemonade stand for 14 days! Set your price and cups to make each day. Weather affects customers.</p>
<p style="color:#facc15">Cost: $0.25 per cup to make</p>
<button class="btn-play" onclick="startGame()">Play</button>
</div>
</div>

<div class="overlay" id="endOverlay" style="display:none">
<div class="overlay-box">
<h2 id="endTitle">Game Over!</h2>
<div class="score" id="endScore"></div>
<p id="endDetail" style="color:#94a3b8"></p>
<div id="endHighScore" style="color:#facc15;margin:.5rem 0"></div>
<button class="btn-play" onclick="startGame()">Play Again</button>
</div>
</div>

<div id="game">
<div class="top-bar">
<span>Day <strong id="dayNum">1</strong>/14</span>
<span class="money">$<span id="money">20.00</span></span>
</div>
<div class="day-header">
<h3 id="weatherText">Today's Forecast</h3>
<div class="weather"><span class="icon" id="weatherIcon"></span><span id="weatherName"></span></div>
</div>
<div class="controls" id="controls">
<div class="control-row">
<label>Price per cup</label>
<div><input type="range" id="priceSlider" min="25" max="200" step="5" value="100" oninput="updateUI()"><span class="val" id="priceVal">$1.00</span></div>
</div>
<div class="control-row">
<label>Cups to make</label>
<div><input type="range" id="cupsSlider" min="0" max="100" step="1" value="20" oninput="updateUI()"><span class="val" id="cupsVal">20</span></div>
</div>
<div class="cost-info" id="costInfo">Production cost: $5.00</div>
<button class="btn-sell" id="sellBtn" onclick="sellDay()">Open for Business!</button>
</div>
<div class="report" id="report">
<h4>Daily Report</h4>
<div id="reportRows"></div>
<button class="btn-next" id="nextBtn" onclick="nextDay()">Next Day</button>
</div>
<div class="history" id="history" style="display:none">
<h4>History</h4>
<div id="histRows"></div>
</div>
</div>

<script>
const SLUG='lemonade-stand', COST_PER_CUP=0.25, TOTAL_DAYS=14;
const WEATHERS=[
  {name:'Sunny',icon:'☀️',demand:1.3},
  {name:'Partly Cloudy',icon:'⛅',demand:1.0},
  {name:'Cloudy',icon:'☁️',demand:0.7},
  {name:'Rainy',icon:'🌧️',demand:0.4}
];
let day,money,highScore,historyLog,weather;

function save(){
  try{window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore}},'*')}catch(e){}
}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    if(e.data.state.highScore!=null)highScore=e.data.state.highScore;
  }
});

function pickWeather(){return WEATHERS[Math.floor(Math.random()*WEATHERS.length)]}

function startGame(){
  document.getElementById('startOverlay').style.display='none';
  document.getElementById('endOverlay').style.display='none';
  document.getElementById('game').style.display='block';
  day=1;money=20;historyLog=[];
  if(!highScore)highScore=0;
  weather=pickWeather();
  showDay();
}

function showDay(){
  document.getElementById('dayNum').textContent=day;
  document.getElementById('money').textContent=money.toFixed(2);
  document.getElementById('weatherIcon').textContent=weather.icon;
  document.getElementById('weatherName').textContent=weather.name;
  document.getElementById('controls').style.display='block';
  document.getElementById('report').style.display='none';
  let maxCups=Math.floor(money/COST_PER_CUP);
  document.getElementById('cupsSlider').max=Math.max(maxCups,0);
  if(parseInt(document.getElementById('cupsSlider').value)>maxCups)document.getElementById('cupsSlider').value=maxCups;
  updateUI();
}

function updateUI(){
  let price=(parseInt(document.getElementById('priceSlider').value)/100);
  let cups=parseInt(document.getElementById('cupsSlider').value);
  document.getElementById('priceVal').textContent='$'+price.toFixed(2);
  document.getElementById('cupsVal').textContent=cups;
  document.getElementById('costInfo').textContent='Production cost: $'+(cups*COST_PER_CUP).toFixed(2);
  document.getElementById('sellBtn').disabled=(cups===0&&money<COST_PER_CUP);
}

function sellDay(){
  let price=parseInt(document.getElementById('priceSlider').value)/100;
  let cupsMade=parseInt(document.getElementById('cupsSlider').value);
  let prodCost=cupsMade*COST_PER_CUP;
  // demand based on weather and price
  let baseDemand=Math.round(30*weather.demand);
  let priceFactor=Math.max(0,1.5-price);
  let demand=Math.round(baseDemand*priceFactor+Math.random()*8-4);
  demand=Math.max(0,demand);
  let cupsSold=Math.min(cupsMade,demand);
  let revenue=cupsSold*price;
  let profit=revenue-prodCost;
  money+=profit;
  money=Math.round(money*100)/100;

  let rows=`
    <div class="report-row"><span class="label">Weather</span><span>${weather.icon} ${weather.name}</span></div>
    <div class="report-row"><span class="label">Price</span><span>$${price.toFixed(2)}</span></div>
    <div class="report-row"><span class="label">Cups Made</span><span>${cupsMade}</span></div>
    <div class="report-row"><span class="label">Demand</span><span>${demand}</span></div>
    <div class="report-row"><span class="label">Cups Sold</span><span>${cupsSold}</span></div>
    <div class="report-row"><span class="label">Revenue</span><span class="positive">$${revenue.toFixed(2)}</span></div>
    <div class="report-row"><span class="label">Cost</span><span class="negative">-$${prodCost.toFixed(2)}</span></div>
    <div class="report-row"><span class="label">Profit</span><span class="${profit>=0?'positive':'negative'}">$${profit.toFixed(2)}</span></div>
  `;
  document.getElementById('reportRows').innerHTML=rows;
  document.getElementById('controls').style.display='none';
  document.getElementById('report').style.display='block';
  document.getElementById('money').textContent=money.toFixed(2);

  historyLog.push({day,weather:weather.name,sold:cupsSold,profit});
  let hhtml='';
  historyLog.forEach(h=>{
    hhtml+=`<div class="hist-row"><span>Day ${h.day} (${h.weather})</span><span class="${h.profit>=0?'positive':'negative'}">$${h.profit.toFixed(2)}</span></div>`;
  });
  document.getElementById('histRows').innerHTML=hhtml;
  document.getElementById('history').style.display='block';

  if(day>=TOTAL_DAYS){
    document.getElementById('nextBtn').textContent='See Final Results';
  }
}

function nextDay(){
  if(day>=TOTAL_DAYS||money<=0){
    endGame();return;
  }
  day++;
  weather=pickWeather();
  showDay();
  document.getElementById('nextBtn').textContent='Next Day';
}

function endGame(){
  let finalMoney=money;
  let profit=finalMoney-20;
  if(finalMoney>highScore){highScore=finalMoney;save();}
  document.getElementById('endTitle').textContent=profit>=0?'Great Job!':'Better Luck Next Time!';
  document.getElementById('endScore').textContent='Final Balance: $'+finalMoney.toFixed(2);
  document.getElementById('endDetail').textContent='Profit: $'+profit.toFixed(2)+' over '+Math.min(day,TOTAL_DAYS)+' days';
  document.getElementById('endHighScore').textContent='High Score: $'+highScore.toFixed(2);
  document.getElementById('endOverlay').style.display='flex';
  document.getElementById('game').style.display='none';
  save();
}
</script>
</body>
</html>
