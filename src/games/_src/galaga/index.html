<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galaga</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;display:inline-block}
canvas{display:block;max-width:100%;border:2px solid #6366f1}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
.overlay h2{color:#facc15;font-size:1.5rem;margin-bottom:0.5rem}
.overlay p{color:#e2e8f0;margin:0.25rem 0}
.diff-select{display:flex;gap:4px;justify-content:center;margin:8px 0}
.diff-btn{padding:6px 16px;font-size:0.85rem;background:#334155;color:#e2e8f0;border:1px solid #475569;cursor:pointer;border-radius:0}
.diff-btn.active{background:#6366f1;border-color:#6366f1}
button{border:none;padding:0.5rem 1.5rem;font-size:1rem;cursor:pointer;color:#e2e8f0;border-radius:0;font-family:inherit}
.btn-primary{background:#6366f1}
.btn-secondary{background:#334155}
.btn-primary:hover{background:#818cf8}
.btn-secondary:hover{background:#475569}
#controls{display:flex;gap:0.5rem;margin:0.5rem 0}
#score-bar{display:flex;justify-content:space-between;width:100%;max-width:400px;padding:0.25rem 0;font-size:0.85rem}
.touch-row{display:flex;gap:0.5rem;margin:0.25rem 0}
</style>
</head>
<body>
<h1>Galaga</h1>
<div id="score-bar"><span id="hud-score">Score: 0</span><span id="hud-lives">Lives: 3</span><span id="hud-level">Level: 1</span></div>
<div id="game-wrap">
<canvas id="c" width="400" height="500"></canvas>
<div class="overlay" id="start-overlay">
<h2>Galaga</h2>
<p>Arrow keys / touch to move</p>
<p>Space / tap to shoot</p>
<div class="diff-select">
  <button class="diff-btn" onclick="setDiff('easy')">Easy</button>
  <button class="diff-btn active" onclick="setDiff('medium')">Medium</button>
  <button class="diff-btn" onclick="setDiff('hard')">Hard</button>
</div>
<button class="btn-primary" onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="over-overlay">
<h2>Game Over</h2>
<p id="final-score"></p>
<p id="high-score-msg"></p>
<button class="btn-primary" onclick="startGame()" style="margin-top:0.5rem">Play Again</button>
</div>
</div>
<div id="controls">
<button class="btn-secondary" id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<div class="touch-row">
<button class="btn-secondary" id="tl" style="width:60px;height:50px;font-size:1.5rem">◀</button>
<button class="btn-primary" id="tf" style="width:80px;height:50px;font-size:1rem">FIRE</button>
<button class="btn-secondary" id="tr" style="width:60px;height:50px;font-size:1.5rem">▶</button>
</div>
<script>
var difficulty='medium';
function setDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(function(b){b.classList.toggle('active',b.textContent.toLowerCase()===d);});
}
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=400,H=500,gameRunning=false,paused=false,animId=null;
let ship,bullets,aliens,alienBullets,score,lives,level,highScore=0;
let alienDir,alienDropTimer,alienShootTimer,diveAliens;
let keys={};

function resize(){
  const maxW=Math.min(window.innerWidth-16,400);
  const scale=maxW/400;
  canvas.style.width=maxW+'px';
  canvas.style.height=(500*scale)+'px';
}
resize();
window.addEventListener('resize',resize);

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.slug==='galaga'){
    if(e.data.state&&e.data.state.highScore) highScore=e.data.state.highScore;
  }
});

function saveState(){
  try{parent.postMessage({type:'ca-save',slug:'galaga',state:{highScore}},'*');}catch(e){}
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='p'||e.key==='P')togglePause();if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch controls
const tl=document.getElementById('tl'),tr=document.getElementById('tr'),tf=document.getElementById('tf');
tl.addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowLeft']=true;});
tl.addEventListener('touchend',e=>{e.preventDefault();keys['ArrowLeft']=false;});
tr.addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowRight']=true;});
tr.addEventListener('touchend',e=>{e.preventDefault();keys['ArrowRight']=false;});
tf.addEventListener('touchstart',e=>{e.preventDefault();keys[' ']=true;});
tf.addEventListener('touchend',e=>{e.preventDefault();keys[' ']=false;});

function togglePause(){
  if(!gameRunning)return;
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(!paused)loop();
  else saveState();
}

function createAliens(lvl){
  aliens=[];
  const rowBase=difficulty==='easy'?3:difficulty==='hard'?5:4;
  const colBase=difficulty==='easy'?6:difficulty==='hard'?10:8;
  const rows=Math.min(rowBase+Math.floor(lvl/2),6);
  const cols=Math.min(colBase+Math.floor(lvl/3),10);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      aliens.push({
        x:30+c*38,y:40+r*32,w:24,h:20,
        hp:r===0?2:1,
        type:r===0?2:r<2?1:0,
        alive:true,diving:false,
        diveX:0,diveY:0,diveSpeed:0,
        baseX:30+c*38,baseY:40+r*32,
        color:r===0?'#ef4444':r<2?'#facc15':'#22c55e'
      });
    }
  }
  alienDir=1;
  alienDropTimer=0;
  alienShootTimer=0;
  diveAliens=[];
}

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('over-overlay').classList.add('hidden');
  score=0;lives=3;level=1;
  ship={x:W/2-15,y:H-40,w:30,h:24,speed:4,shootCd:0};
  bullets=[];alienBullets=[];
  createAliens(level);
  gameRunning=true;paused=false;
  document.getElementById('pause-btn').textContent='⏸';
  updateHUD();
  if(animId)cancelAnimationFrame(animId);
  loop();
}

function updateHUD(){
  document.getElementById('hud-score').textContent='Score: '+score;
  document.getElementById('hud-lives').textContent='Lives: '+lives;
  document.getElementById('hud-level').textContent='Level: '+level;
}

function shoot(){
  if(ship.shootCd>0)return;
  bullets.push({x:ship.x+ship.w/2-2,y:ship.y-8,w:4,h:10,speed:7});
  ship.shootCd=12;
}

function loop(){
  if(!gameRunning||paused)return;
  update();
  draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  // Ship movement
  if(keys['ArrowLeft']&&ship.x>0)ship.x-=ship.speed;
  if(keys['ArrowRight']&&ship.x<W-ship.w)ship.x+=ship.speed;
  if(keys[' '])shoot();
  if(ship.shootCd>0)ship.shootCd--;

  // Bullets
  bullets.forEach(b=>b.y-=b.speed);
  bullets=bullets.filter(b=>b.y>-10);

  // Alien movement
  let aliveAliens=aliens.filter(a=>a.alive&&!a.diving);
  let minX=W,maxX=0;
  aliveAliens.forEach(a=>{
    if(a.x<minX)minX=a.x;
    if(a.x+a.w>maxX)maxX=a.x+a.w;
  });

  let speedMult=difficulty==='easy'?0.7:difficulty==='hard'?1.4:1;
  let speed=(1+level*0.3+((aliens.length-aliveAliens.length)/aliens.length)*2)*speedMult;
  aliveAliens.forEach(a=>{
    a.x+=alienDir*speed;
  });

  if(maxX>=W-5||minX<=5){
    alienDir*=-1;
    aliveAliens.forEach(a=>a.y+=8);
  }

  // Diving aliens
  alienShootTimer++;
  if(alienShootTimer>Math.max(30,80-level*5)){
    alienShootTimer=0;
    let candidates=aliens.filter(a=>a.alive&&!a.diving);
    if(candidates.length>0){
      let diver=candidates[Math.floor(Math.random()*candidates.length)];
      diver.diving=true;
      diver.diveSpeed=2+level*0.5;
      diver.diveX=(ship.x-diver.x)*0.02;
    }
  }

  aliens.filter(a=>a.alive&&a.diving).forEach(a=>{
    a.y+=a.diveSpeed;
    a.x+=a.diveX;
    // Shoot while diving
    if(Math.random()<0.03){
      alienBullets.push({x:a.x+a.w/2-2,y:a.y+a.h,w:4,h:8,speed:4});
    }
    if(a.y>H+20){
      a.diving=false;
      a.x=a.baseX;
      a.y=a.baseY;
    }
  });

  // Random alien shooting
  if(Math.random()<0.01*level){
    let shooters=aliens.filter(a=>a.alive&&!a.diving);
    if(shooters.length>0){
      let s=shooters[Math.floor(Math.random()*shooters.length)];
      alienBullets.push({x:s.x+s.w/2-2,y:s.y+s.h,w:4,h:8,speed:3+level*0.3});
    }
  }

  alienBullets.forEach(b=>b.y+=b.speed);
  alienBullets=alienBullets.filter(b=>b.y<H+10);

  // Collision: bullets vs aliens
  bullets.forEach(b=>{
    aliens.filter(a=>a.alive).forEach(a=>{
      if(b.x<a.x+a.w&&b.x+b.w>a.x&&b.y<a.y+a.h&&b.y+b.h>a.y){
        a.hp--;
        b.y=-99;
        if(a.hp<=0){
          a.alive=false;
          score+=a.type===2?100:a.type===1?50:30;
          updateHUD();
        }
      }
    });
  });

  // Collision: alien bullets vs ship
  alienBullets.forEach(b=>{
    if(b.x<ship.x+ship.w&&b.x+b.w>ship.x&&b.y<ship.y+ship.h&&b.y+b.h>ship.y){
      b.y=H+99;
      loseLife();
    }
  });

  // Collision: diving aliens vs ship
  aliens.filter(a=>a.alive&&a.diving).forEach(a=>{
    if(a.x<ship.x+ship.w&&a.x+a.w>ship.x&&a.y<ship.y+ship.h&&a.y+a.h>ship.y){
      a.alive=false;
      score+=a.type===2?100:50;
      loseLife();
    }
  });

  // Check level complete
  if(aliens.filter(a=>a.alive).length===0){
    level++;
    createAliens(level);
    updateHUD();
  }
}

function loseLife(){
  lives--;
  updateHUD();
  if(lives<=0)gameOver();
  else{
    ship.x=W/2-15;
    alienBullets=[];
  }
}

function gameOver(){
  gameRunning=false;
  if(score>highScore)highScore=score;
  document.getElementById('final-score').textContent='Score: '+score;
  document.getElementById('high-score-msg').textContent='High Score: '+highScore;
  document.getElementById('over-overlay').classList.remove('hidden');
  saveState();
}

function draw(){
  ctx.fillStyle='#0f172a';
  ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='#334155';
  for(let i=0;i<30;i++){
    let sx=(i*137+score)%W,sy=(i*97+i*i)%H;
    ctx.fillRect(sx,sy,1,1);
  }

  // Ship
  ctx.fillStyle='#3b82f6';
  ctx.beginPath();
  ctx.moveTo(ship.x+ship.w/2,ship.y);
  ctx.lineTo(ship.x,ship.y+ship.h);
  ctx.lineTo(ship.x+ship.w,ship.y+ship.h);
  ctx.closePath();
  ctx.fill();
  ctx.fillRect(ship.x+ship.w/2-2,ship.y-4,4,6);

  // Bullets
  ctx.fillStyle='#22c55e';
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  // Alien bullets
  ctx.fillStyle='#ef4444';
  alienBullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  // Aliens
  aliens.filter(a=>a.alive).forEach(a=>{
    ctx.fillStyle=a.color;
    if(a.type===2){
      // Boss alien
      ctx.fillRect(a.x+2,a.y+4,a.w-4,a.h-8);
      ctx.fillRect(a.x,a.y+8,a.w,a.h-12);
      ctx.fillStyle='#0f172a';
      ctx.fillRect(a.x+5,a.y+8,4,4);
      ctx.fillRect(a.x+15,a.y+8,4,4);
    } else if(a.type===1){
      ctx.fillRect(a.x+4,a.y,a.w-8,a.h);
      ctx.fillRect(a.x,a.y+4,a.w,a.h-8);
    } else {
      ctx.fillRect(a.x+2,a.y+2,a.w-4,a.h-4);
      ctx.fillRect(a.x+6,a.y,a.w-12,a.h);
    }
  });
}
</script>
</body>
</html>
