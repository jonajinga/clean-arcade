<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volleyball</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
canvas{border:2px solid #6366f1;max-width:100%;display:block}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#e2e8f0}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit;margin:0.3rem}
button:hover{opacity:0.85}
.pause-btn{background:#334155}
#controls{display:flex;gap:0.5rem;margin:0.4rem 0;flex-wrap:wrap;justify-content:center}
.ctrl-btn{background:#334155;padding:0.5rem 1rem;font-size:1.2rem;min-width:50px}
#wrap{position:relative;display:inline-block}
#hud{display:flex;justify-content:space-between;width:100%;padding:0.2rem 0.5rem;font-size:0.9rem}
</style>
</head>
<body>
<h1>Volleyball</h1>
<div id="hud"><span id="p-sc">You: 0</span><span id="ai-sc">AI: 0</span></div>
<div id="wrap">
<canvas id="c" width="600" height="400"></canvas>
<div class="overlay" id="start-overlay">
<h2>Volleyball</h2>
<p>Jump and spike! First to 15 wins.</p>
<p>Arrow keys / on-screen buttons</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay" id="over-overlay" style="display:none">
<h2 id="over-title">Game Over</h2>
<p id="over-msg"></p>
<p id="over-hs"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<div id="controls">
<button class="ctrl-btn" onclick="pMove=-1" aria-label="Left">&#9664;</button>
<button class="ctrl-btn" onclick="pJump()" aria-label="Jump">&#9650;</button>
<button class="ctrl-btn" onclick="pMove=1" aria-label="Right">&#9654;</button>
<button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=600,H=400,GROUND=H-40,NET_X=W/2,NET_H=120,GRAVITY=0.4;
let highScore=0,paused=false,running=false,pMove=0;
let player,aiP,ball,pScore,aiScore,gameOver,serving;

function init(){
  player={x:120,y:GROUND,w:30,h:50,vy:0,onGround:true};
  aiP={x:W-150,y:GROUND,w:30,h:50,vy:0,onGround:true};
  pScore=0;aiScore=0;gameOver=false;serving=true;
  resetBall(true);
}

function resetBall(playerSide){
  let sx=playerSide?150:W-150;
  ball={x:sx,y:GROUND-100,vx:0,vy:0,r:10};
  serving=true;
}

function pJump(){
  if(!running||paused||gameOver)return;
  if(player.onGround){player.vy=-10;player.onGround=false;}
}

function score(playerWon){
  if(playerWon)pScore++;else aiScore++;
  document.getElementById('p-sc').textContent='You: '+pScore;
  document.getElementById('ai-sc').textContent='AI: '+aiScore;
  if(pScore>=15||aiScore>=15){
    gameOver=true;
    let won=pScore>=15;
    let sc=won?pScore:0;
    if(sc>highScore){highScore=sc;save();}
    showOver(won?'You Win!':'You Lose!',pScore+' - '+aiScore);
    return;
  }
  resetBall(!playerWon);
}

function aiLogic(){
  if(!ball)return;
  let tx=ball.x>NET_X?ball.x-20:W-150;
  if(aiP.x<tx-5)aiP.x+=3;
  else if(aiP.x>tx+5)aiP.x-=3;
  aiP.x=Math.max(NET_X+20,Math.min(W-aiP.w-5,aiP.x));
  if(ball.x>NET_X&&ball.y<GROUND-80&&Math.abs(ball.x-aiP.x)<60&&aiP.onGround&&Math.random()<0.15){
    aiP.vy=-10;aiP.onGround=false;
  }
}

function collide(p){
  let cx=p.x+p.w/2,cy=p.y-p.h/2;
  let dx=ball.x-cx,dy=ball.y-cy;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<ball.r+30){
    let ang=Math.atan2(dy,dx);
    let sp=8;
    ball.vx=Math.cos(ang)*sp;
    ball.vy=Math.sin(ang)*sp;
    if(ball.vy>-3)ball.vy=-5;
    serving=false;
  }
}

function update(){
  if(paused||!running||gameOver)return;
  if(pMove){player.x+=pMove*4;pMove=0;}
  player.x=Math.max(5,Math.min(NET_X-player.w-10,player.x));
  player.vy+=GRAVITY;player.y+=player.vy;
  if(player.y>=GROUND){player.y=GROUND;player.vy=0;player.onGround=true;}
  aiP.vy+=GRAVITY;aiP.y+=aiP.vy;
  if(aiP.y>=GROUND){aiP.y=GROUND;aiP.vy=0;aiP.onGround=true;}
  aiLogic();
  if(!serving||ball.vy!==0||ball.vx!==0){
    ball.vy+=GRAVITY*0.5;ball.x+=ball.vx;ball.y+=ball.vy;
  }
  collide(player);collide(aiP);
  // net collision
  if(ball.y>GROUND-NET_H&&ball.y<GROUND&&Math.abs(ball.x-NET_X)<8){
    ball.vx*=-0.5;ball.x=ball.x<NET_X?NET_X-ball.r:NET_X+ball.r;
  }
  // walls
  if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.5;}
  if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx*=-0.5;}
  if(ball.y<ball.r){ball.y=ball.r;ball.vy*=-0.5;}
  // ground
  if(ball.y>=GROUND-ball.r){
    if(ball.x<NET_X)score(false);else score(true);
  }
}

function draw(){
  ctx.fillStyle='#1e3a5f';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#d2a679';ctx.fillRect(0,GROUND,W,H-GROUND);
  // net
  ctx.fillStyle='#e2e8f0';ctx.fillRect(NET_X-3,GROUND-NET_H,6,NET_H);
  // player
  ctx.fillStyle='#3b82f6';ctx.fillRect(player.x,player.y-player.h,player.w,player.h);
  // ai
  ctx.fillStyle='#ef4444';ctx.fillRect(aiP.x,aiP.y-aiP.h,aiP.w,aiP.h);
  // ball
  ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
}

function loop(){update();draw();if(running)requestAnimationFrame(loop);}

function startGame(){
  document.getElementById('start-overlay').style.display='none';
  document.getElementById('over-overlay').style.display='none';
  init();running=true;paused=false;
  document.getElementById('pause-btn').textContent='⏸';
  document.getElementById('p-sc').textContent='You: 0';
  document.getElementById('ai-sc').textContent='AI: 0';
  loop();
}

function showOver(t,m){
  document.getElementById('over-title').textContent=t;
  document.getElementById('over-msg').textContent=m;
  document.getElementById('over-hs').textContent='High Score: '+highScore;
  document.getElementById('over-overlay').style.display='flex';running=false;
}

function togglePause(){
  if(!running)return;paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(!paused)loop();
}

function save(){try{parent.postMessage({type:'ca-save',slug:'volleyball',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='volleyball'&&e.data.state){highScore=e.data.state.highScore||0;}});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')pMove=-1;
  else if(e.key==='ArrowRight')pMove=1;
  else if(e.key==='ArrowUp'||e.key===' ')pJump();
  else if(e.key.toLowerCase()==='p')togglePause();
});

canvas.addEventListener('click',e=>{
  let rect=canvas.getBoundingClientRect();
  let cx=(e.clientX-rect.left)/(rect.width/W);
  if(cx<W/3)pMove=-1;else if(cx>2*W/3)pMove=1;else pJump();
});

init();draw();
</script>
</body>
</html>
