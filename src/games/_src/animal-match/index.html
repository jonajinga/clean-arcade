<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Animal Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;touch-action:manipulation}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.stats{display:flex;gap:1.5rem;margin:.75rem 0;font-size:1rem;color:#94a3b8}
.stats span{color:#e2e8f0;font-weight:600}
.grid{display:grid;gap:.5rem;max-width:480px;width:100%;margin:0 auto}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
.grid.cols-5{grid-template-columns:repeat(5,1fr)}
.grid.cols-6{grid-template-columns:repeat(6,1fr)}
.card{aspect-ratio:1;perspective:600px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-back{background:linear-gradient(135deg,#ef4444,#facc15);font-size:2rem}
.card-back::after{content:'🐾';opacity:.5}
.card-front{transform:rotateY(180deg);background:#1e293b;border:2px solid #6366f1;font-size:2.5rem}
.card-front .name{font-size:.65rem;color:#94a3b8;margin-top:.15rem;opacity:0;transition:opacity .3s}
.card.matched .card-front{border-color:#22c55e;background:#14532d33}
.card.matched .card-front .name{opacity:1}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay.hidden{display:none}
.overlay-box{background:#1e293b;border:2px solid #6366f1;border-radius:12px;padding:2rem;text-align:center;max-width:400px;width:90%;max-height:90vh;overflow-y:auto}
.overlay-box h2{font-size:1.6rem;color:#facc15;margin-bottom:.75rem}
.overlay-box p{margin:.5rem 0;color:#94a3b8}
.overlay-box p span{color:#e2e8f0;font-weight:600}
.btn{display:inline-block;padding:.7rem 1.8rem;border:none;border-radius:0;font-size:1.1rem;font-weight:600;cursor:pointer;margin:.4rem;color:#0f172a;background:#22c55e}
.btn:hover{background:#16a34a}
.opt-label{color:#94a3b8;font-size:.85rem;margin:1rem 0 .4rem;text-align:left}
.opt-group{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center}
.opt-btn{padding:.5rem .85rem;border:2px solid #475569;background:#334155;color:#e2e8f0;border-radius:0;font-size:.85rem;cursor:pointer;transition:background .2s,border-color .2s}
.opt-btn:hover{border-color:#6366f1}
.opt-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
.pause-wrap{text-align:center;margin-top:.75rem}
.pause-btn{padding:.5rem 1.2rem;border:2px solid #6366f1;background:#334155;color:#e2e8f0;border-radius:0;font-size:1.3rem;cursor:pointer}
.pause-btn:hover{background:#6366f1}
</style>
</head>
<body>

<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>Animal Match 🐾</h2>
<p>Flip cards to find matching animal pairs!</p>
<div class="opt-label">Grid Size</div>
<div class="opt-group" id="sizeGroup">
<button class="opt-btn" data-size="3x2" onclick="selectSize('3x2',this)">3x2 (3)</button>
<button class="opt-btn active" data-size="4x4" onclick="selectSize('4x4',this)">4x4 (8)</button>
<button class="opt-btn" data-size="5x4" onclick="selectSize('5x4',this)">5x4 (10)</button>
<button class="opt-btn" data-size="6x5" onclick="selectSize('6x5',this)">6x5 (15)</button>
</div>
<div class="opt-label">Category</div>
<div class="opt-group" id="catGroup">
<button class="opt-btn active" data-cat="animals" onclick="selectCat('animals',this)">Animals</button>
<button class="opt-btn" data-cat="sea" onclick="selectCat('sea',this)">Sea Creatures</button>
<button class="opt-btn" data-cat="insects" onclick="selectCat('insects',this)">Insects</button>
<button class="opt-btn" data-cat="birds" onclick="selectCat('birds',this)">Birds</button>
<button class="opt-btn" data-cat="farm" onclick="selectCat('farm',this)">Farm Animals</button>
</div>
<button class="btn" onclick="startGame()">Play</button>
</div>
</div>

<div class="overlay hidden" id="endOverlay">
<div class="overlay-box">
<h2 id="endTitle">Great Job!</h2>
<p>Moves: <span id="endMoves">0</span></p>
<p>Pairs Found: <span id="endPairs">0</span>/<span id="endTotal">8</span></p>
<p>Best Score: <span id="endHigh">0</span> moves</p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
</div>

<h1>Animal Match</h1>
<div class="stats">
<div>Moves: <span id="moves">0</span></div>
<div>Pairs: <span id="pairs">0</span>/<span id="totalPairs">8</span></div>
</div>
<div class="grid cols-4" id="grid"></div>
<div class="pause-wrap">
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
</div>

<script>
const SLUG='animal-match';

const CATEGORIES={
  animals:[
    {emoji:'🐶',name:'Dog'},{emoji:'🐱',name:'Cat'},{emoji:'🐸',name:'Frog'},{emoji:'🐵',name:'Monkey'},
    {emoji:'🐮',name:'Cow'},{emoji:'🐷',name:'Pig'},{emoji:'🐔',name:'Chicken'},{emoji:'🐴',name:'Horse'},
    {emoji:'🦁',name:'Lion'},{emoji:'🐯',name:'Tiger'},{emoji:'🐻',name:'Bear'},{emoji:'🐼',name:'Panda'},
    {emoji:'🦊',name:'Fox'},{emoji:'🐰',name:'Rabbit'},{emoji:'🐨',name:'Koala'},{emoji:'🐘',name:'Elephant'}
  ],
  sea:[
    {emoji:'🐙',name:'Octopus'},{emoji:'🦑',name:'Squid'},{emoji:'🐠',name:'Fish'},{emoji:'🐟',name:'Bluefish'},
    {emoji:'🐬',name:'Dolphin'},{emoji:'🐳',name:'Whale'},{emoji:'🦈',name:'Shark'},{emoji:'🐡',name:'Puffer'},
    {emoji:'🦐',name:'Shrimp'},{emoji:'🦞',name:'Lobster'},{emoji:'🦀',name:'Crab'},{emoji:'🐚',name:'Shell'},
    {emoji:'🪸',name:'Coral'},{emoji:'🐊',name:'Croc'},{emoji:'🦭',name:'Seal'},{emoji:'🐋',name:'Humpback'}
  ],
  insects:[
    {emoji:'🐛',name:'Bug'},{emoji:'🦋',name:'Butterfly'},{emoji:'🐞',name:'Ladybug'},{emoji:'🐜',name:'Ant'},
    {emoji:'🪲',name:'Beetle'},{emoji:'🪳',name:'Roach'},{emoji:'🦗',name:'Cricket'},{emoji:'🕷',name:'Spider'},
    {emoji:'🦂',name:'Scorpion'},{emoji:'🐝',name:'Bee'},{emoji:'🪰',name:'Fly'},{emoji:'🐌',name:'Snail'},
    {emoji:'🦠',name:'Microbe'},{emoji:'🪱',name:'Worm'},{emoji:'🫎',name:'Moose'},{emoji:'🦟',name:'Mosquito'}
  ],
  birds:[
    {emoji:'🦅',name:'Eagle'},{emoji:'🦆',name:'Duck'},{emoji:'🦉',name:'Owl'},{emoji:'🦜',name:'Parrot'},
    {emoji:'🐧',name:'Penguin'},{emoji:'🦩',name:'Flamingo'},{emoji:'🦚',name:'Peacock'},{emoji:'🕊',name:'Dove'},
    {emoji:'🦤',name:'Dodo'},{emoji:'🦢',name:'Swan'},{emoji:'🐓',name:'Rooster'},{emoji:'🦃',name:'Turkey'},
    {emoji:'🦡',name:'Badger'},{emoji:'🪶',name:'Feather'},{emoji:'🐦',name:'Bird'},{emoji:'🦨',name:'Skunk'}
  ],
  farm:[
    {emoji:'🐄',name:'Cow'},{emoji:'🐖',name:'Pig'},{emoji:'🐑',name:'Sheep'},{emoji:'🐓',name:'Rooster'},
    {emoji:'🐴',name:'Horse'},{emoji:'🐐',name:'Goat'},{emoji:'🦃',name:'Turkey'},{emoji:'🐇',name:'Rabbit'},
    {emoji:'🐕',name:'Dog'},{emoji:'🐈',name:'Cat'},{emoji:'🦆',name:'Duck'},{emoji:'🐂',name:'Ox'},
    {emoji:'🐎',name:'Stallion'},{emoji:'🐪',name:'Camel'},{emoji:'🦙',name:'Llama'},{emoji:'🐃',name:'Buffalo'}
  ]
};

const SIZES={
  '3x2':{cols:3,rows:2,pairs:3},
  '4x4':{cols:4,rows:4,pairs:8},
  '5x4':{cols:5,rows:4,pairs:10},
  '6x5':{cols:6,rows:5,pairs:15}
};

let gridSize='4x4',category='animals';
let moves=0,pairsFound=0,totalPairsCount=8,firstCard=null,secondCard=null,locked=false,paused=false,highScores={},gameStarted=false;

function selectSize(s,btn){
  gridSize=s;
  document.querySelectorAll('#sizeGroup .opt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function selectCat(c,btn){
  category=c;
  document.querySelectorAll('#catGroup .opt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  const cfg=SIZES[gridSize];
  totalPairsCount=cfg.pairs;
  moves=0;pairsFound=0;firstCard=null;secondCard=null;locked=false;paused=false;gameStarted=true;
  document.getElementById('moves').textContent='0';
  document.getElementById('pairs').textContent='0';
  document.getElementById('totalPairs').textContent=totalPairsCount;
  document.getElementById('pauseBtn').textContent='⏸';

  const pool=shuffle([...CATEGORIES[category]]).slice(0,totalPairsCount);
  const cards=shuffle([...pool,...pool].map((a,i)=>({...a,id:i})));

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  grid.className='grid cols-'+cfg.cols;
  cards.forEach(a=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.name=a.name;
    card.innerHTML='<div class="card-inner"><div class="card-back"></div><div class="card-front">'+a.emoji+'<div class="name">'+a.name+'</div></div></div>';
    card.addEventListener('click',function(){flipCard(card);});
    grid.appendChild(card);
  });
}

function flipCard(card){
  if(locked||paused||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  if(!firstCard){firstCard=card;return;}
  secondCard=card;locked=true;moves++;
  document.getElementById('moves').textContent=moves;
  if(firstCard.dataset.name===secondCard.dataset.name){
    firstCard.classList.add('matched');secondCard.classList.add('matched');
    pairsFound++;document.getElementById('pairs').textContent=pairsFound;
    firstCard=null;secondCard=null;locked=false;
    if(pairsFound===totalPairsCount)endGame();
  }else{
    setTimeout(function(){firstCard.classList.remove('flipped');secondCard.classList.remove('flipped');firstCard=null;secondCard=null;locked=false;},800);
  }
}

function endGame(){
  gameStarted=false;
  var key=category+'-'+gridSize;
  if(!highScores[key]||moves<highScores[key])highScores[key]=moves;
  document.getElementById('endMoves').textContent=moves;
  document.getElementById('endPairs').textContent=pairsFound;
  document.getElementById('endTotal').textContent=totalPairsCount;
  document.getElementById('endHigh').textContent=highScores[key];
  document.getElementById('endOverlay').classList.remove('hidden');
  saveState();
}

function togglePause(){
  if(!gameStarted)return;
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
  if(paused)saveState();
}

function saveState(){
  try{window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScores:highScores}},'*');}catch(e){}
}
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    if(e.data.state.highScores)highScores=e.data.state.highScores;
  }
});
document.addEventListener('keydown',function(e){if(e.key==='p'||e.key==='P')togglePause();});
</script>
</body>
</html>
