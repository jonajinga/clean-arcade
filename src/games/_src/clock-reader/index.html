<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clock Reader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.game-area{border:2px solid #6366f1;max-width:100%;width:360px;padding:16px;position:relative;min-height:440px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:20px;text-align:center}
.overlay.hidden{display:none}
button{background:#6366f1;color:#e2e8f0;border:none;padding:10px 24px;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{opacity:0.9}
.score-bar{display:flex;justify-content:space-between;font-size:0.85rem;color:#94a3b8;margin-bottom:8px}
.clock-wrap{text-align:center;margin:8px 0}
.input-area{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:12px}
.input-area input{background:#1e293b;border:2px solid #334155;color:#e2e8f0;padding:8px;font-size:1.2rem;width:50px;text-align:center;font-family:inherit;border-radius:0}
.input-area span{font-size:1.4rem;font-weight:bold}
.feedback{text-align:center;font-size:0.9rem;margin-top:10px;min-height:22px}
</style>
</head>
<body>
<h1>Clock Reader</h1>
<div class="game-area">
<div class="overlay" id="startOverlay">
<p style="margin-bottom:12px;font-size:1.1rem">Clock Reader</p>
<p style="margin-bottom:16px;font-size:0.85rem;color:#94a3b8">Read the analog clock and type the time!</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<p style="margin-bottom:8px;font-size:1.2rem">Complete!</p>
<p style="margin-bottom:8px" id="goScore"></p>
<p style="margin-bottom:4px" id="goAccuracy"></p>
<p style="margin-bottom:16px;color:#94a3b8" id="goHigh"></p>
<button onclick="startGame()">Play Again</button>
</div>
<div class="score-bar"><span>Round: <b id="round">1</b>/20</span><span>Correct: <b id="score">0</b></span><span>Best: <b id="best">0</b></span></div>
<div class="clock-wrap"><canvas id="clock" width="200" height="200"></canvas></div>
<div class="input-area">
<input type="number" id="hourInput" min="1" max="12" placeholder="HH" onkeydown="if(event.key==='Enter')document.getElementById('minInput').focus()">
<span>:</span>
<input type="number" id="minInput" min="0" max="59" placeholder="MM" onkeydown="if(event.key==='Enter')submitTime()">
<button onclick="submitTime()">OK</button>
</div>
<div class="feedback" id="feedback"></div>
</div>
<script>
let currentRound=0,score=0,highScore=0,totalAttempts=0,targetH=0,targetM=0;

function drawClock(h,m){
  const cv=document.getElementById('clock'),cx=cv.getContext('2d');
  const cx0=100,cy0=100,r=85;
  cx.clearRect(0,0,200,200);
  // face
  cx.beginPath();cx.arc(cx0,cy0,r,0,Math.PI*2);cx.fillStyle='#1e293b';cx.fill();cx.strokeStyle='#6366f1';cx.lineWidth=3;cx.stroke();
  // numbers
  cx.fillStyle='#e2e8f0';cx.font='bold 14px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  for(let i=1;i<=12;i++){
    const angle=-Math.PI/2+(i/12)*Math.PI*2;
    cx.fillText(i,cx0+Math.cos(angle)*(r-15),cy0+Math.sin(angle)*(r-15));
  }
  // tick marks
  for(let i=0;i<60;i++){
    const angle=(i/60)*Math.PI*2-Math.PI/2;
    const len=i%5===0?10:5;
    cx.beginPath();cx.moveTo(cx0+Math.cos(angle)*(r-2),cy0+Math.sin(angle)*(r-2));
    cx.lineTo(cx0+Math.cos(angle)*(r-2-len),cy0+Math.sin(angle)*(r-2-len));
    cx.strokeStyle=i%5===0?'#e2e8f0':'#475569';cx.lineWidth=i%5===0?2:1;cx.stroke();
  }
  // hour hand
  const hAngle=-Math.PI/2+((h%12)+m/60)/12*Math.PI*2;
  cx.beginPath();cx.moveTo(cx0,cy0);cx.lineTo(cx0+Math.cos(hAngle)*45,cy0+Math.sin(hAngle)*45);
  cx.strokeStyle='#facc15';cx.lineWidth=4;cx.lineCap='round';cx.stroke();
  // minute hand
  const mAngle=-Math.PI/2+(m/60)*Math.PI*2;
  cx.beginPath();cx.moveTo(cx0,cy0);cx.lineTo(cx0+Math.cos(mAngle)*65,cy0+Math.sin(mAngle)*65);
  cx.strokeStyle='#e2e8f0';cx.lineWidth=3;cx.lineCap='round';cx.stroke();
  // center dot
  cx.beginPath();cx.arc(cx0,cy0,4,0,Math.PI*2);cx.fillStyle='#facc15';cx.fill();
}

function setupRound(){
  if(currentRound>=20){endGame();return}
  targetH=Math.floor(Math.random()*12)+1;
  targetM=Math.floor(Math.random()*12)*5; // 5-min increments
  drawClock(targetH,targetM);
  document.getElementById('round').textContent=currentRound+1;
  document.getElementById('feedback').textContent='';
  document.getElementById('hourInput').value='';
  document.getElementById('minInput').value='';
  document.getElementById('hourInput').focus();
}

function submitTime(){
  const h=parseInt(document.getElementById('hourInput').value);
  const m=parseInt(document.getElementById('minInput').value)||0;
  if(isNaN(h)){document.getElementById('feedback').textContent='Enter the hour';return}
  totalAttempts++;
  const correct=(h===targetH||(h===0&&targetH===12))&&m===targetM;
  if(correct){
    score++;document.getElementById('score').textContent=score;
    document.getElementById('feedback').textContent='Correct!';document.getElementById('feedback').style.color='#22c55e';
  } else {
    const mm=targetM.toString().padStart(2,'0');
    document.getElementById('feedback').textContent='It was '+targetH+':'+mm;document.getElementById('feedback').style.color='#ef4444';
  }
  currentRound++;setTimeout(setupRound,1200);
}

function endGame(){
  if(score>highScore){highScore=score;saveState()}
  const acc=totalAttempts?Math.round(score/totalAttempts*100):0;
  document.getElementById('goScore').textContent='Score: '+score+'/20';
  document.getElementById('goAccuracy').textContent='Accuracy: '+acc+'%';
  document.getElementById('goHigh').textContent='Best: '+highScore;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  score=0;currentRound=0;totalAttempts=0;
  document.getElementById('score').textContent=0;
  document.getElementById('best').textContent=highScore;
  setupRound();
}

function saveState(){try{parent.postMessage({type:'ca-save',slug:'clock-reader',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='clock-reader'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
