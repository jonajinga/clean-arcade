<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zombie Defense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
canvas{border:2px solid #6366f1;max-width:100%;display:block}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
.overlay h2{color:#facc15;font-size:1.5rem;margin-bottom:1rem}
.overlay p{color:#e2e8f0;margin-bottom:1rem;text-align:center;max-width:320px}
button{background:#6366f1;color:#fff;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;margin:0.25rem}
button:hover{opacity:0.9}
.controls{display:flex;gap:0.5rem;margin:0.5rem;justify-content:center}
.pause-btn{background:#334155}
#info{color:#e2e8f0;font-size:0.85rem;margin:0.25rem;text-align:center}
</style>
</head>
<body>
<h1>Zombie Defense</h1>
<canvas id="game" width="400" height="400"></canvas>
<div id="info">Click/tap to shoot zombies!</div>
<div class="controls">
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
</div>
<div class="overlay" id="startOverlay">
<h2>Zombie Defense</h2>
<p>Top-down shooter! Zombies approach from all edges. Click to shoot. Survive the waves!</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="overOverlay">
<h2 id="winMsg">Game Over</h2>
<p id="winDetail"></p>
<button onclick="startGame()">Play Again</button>
</div>
<script>
const C=document.getElementById('game'),ctx=C.getContext('2d');
const W=400;
let highScore=0,paused=false,gameStarted=false,gameOver=false;

let player,zombies,bullets,wave,killCount,hp,lastTime,spawnTimer,waveTimer,mouseX,mouseY;

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  player={x:W/2,y:W/2,angle:0};
  zombies=[];bullets=[];wave=1;killCount=0;hp=100;
  spawnTimer=0;waveTimer=0;mouseX=W/2;mouseY=0;
  gameStarted=true;gameOver=false;lastTime=performance.now();
  requestAnimationFrame(update);
}

function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';}

function spawnZombie(){
  let side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-15;}
  else if(side===1){x=W+15;y=Math.random()*W;}
  else if(side===2){x=Math.random()*W;y=W+15;}
  else{x=-15;y=Math.random()*W;}
  let speed=0.8+Math.random()*0.5+wave*0.1;
  let health=1+Math.floor(wave/3);
  zombies.push({x,y,speed,health,maxHealth:health});
}

function shoot(tx,ty){
  if(!gameStarted||gameOver||paused)return;
  let dx=tx-player.x,dy=ty-player.y;
  let d=Math.hypot(dx,dy)||1;
  bullets.push({x:player.x,y:player.y,vx:dx/d*8,vy:dy/d*8,life:50});
  player.angle=Math.atan2(dy,dx);
}

function update(now){
  if(!gameStarted||gameOver)return;
  if(!paused){
    let dt=Math.min((now-lastTime)/16,3);lastTime=now;

    // Spawn
    spawnTimer+=dt;
    let spawnRate=Math.max(20,60-wave*5);
    if(spawnTimer>=spawnRate){spawnTimer=0;spawnZombie();}

    // Wave timer
    waveTimer+=dt;
    if(waveTimer>300){waveTimer=0;wave++;document.getElementById('info').textContent=`Wave ${wave}!`;}

    // Move zombies toward player
    zombies.forEach(z=>{
      let dx=player.x-z.x,dy=player.y-z.y;
      let d=Math.hypot(dx,dy)||1;
      z.x+=dx/d*z.speed*dt;z.y+=dy/d*z.speed*dt;
      // Damage player
      if(d<18){hp-=0.5*dt;z.x-=dx/d*2;z.y-=dy/d*2;}
    });

    // Move bullets
    bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;});
    bullets=bullets.filter(b=>b.life>0&&b.x>-10&&b.x<W+10&&b.y>-10&&b.y<W+10);

    // Bullet-zombie collision
    for(let b of bullets){
      for(let z of zombies){
        if(Math.hypot(b.x-z.x,b.y-z.y)<14){
          z.health--;b.life=0;
          if(z.health<=0){killCount++;z.dead=true;}
          break;
        }
      }
    }
    zombies=zombies.filter(z=>!z.dead);

    // Player angle toward mouse
    player.angle=Math.atan2(mouseY-player.y,mouseX-player.x);

    if(hp<=0){endGame();return;}

  } else lastTime=now;
  draw();requestAnimationFrame(update);
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,W);

  // Ground texture
  ctx.fillStyle='#1a1a2e';
  for(let i=0;i<20;i++)for(let j=0;j<20;j++){
    if((i+j)%2)ctx.fillRect(i*20,j*20,20,20);
  }

  // Zombies
  zombies.forEach(z=>{
    let angle=Math.atan2(player.y-z.y,player.x-z.x);
    ctx.save();ctx.translate(z.x,z.y);ctx.rotate(angle);
    ctx.fillStyle='#22c55e';ctx.fillRect(-8,-6,16,12);
    // Arms
    ctx.fillStyle='#15803d';ctx.fillRect(8,-3,6,3);ctx.fillRect(8,0,6,3);
    ctx.restore();
    // Health bar
    if(z.maxHealth>1){
      ctx.fillStyle='#334155';ctx.fillRect(z.x-8,z.y-14,16,3);
      ctx.fillStyle='#ef4444';ctx.fillRect(z.x-8,z.y-14,16*(z.health/z.maxHealth),3);
    }
  });

  // Bullets
  ctx.fillStyle='#facc15';
  bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();});

  // Player
  ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);
  ctx.fillStyle='#3b82f6';ctx.fillRect(-8,-8,16,16);
  // Gun
  ctx.fillStyle='#64748b';ctx.fillRect(8,-2,10,4);
  ctx.restore();

  // HP bar
  ctx.fillStyle='#334155';ctx.fillRect(10,10,120,12);
  ctx.fillStyle=hp>30?'#22c55e':'#ef4444';
  ctx.fillRect(10,10,Math.max(0,hp/100)*120,12);
  ctx.fillStyle='#fff';ctx.font='9px system-ui';ctx.textAlign='left';
  ctx.fillText(`HP: ${Math.ceil(hp)}`,14,20);

  // Stats
  ctx.fillStyle='#facc15';ctx.font='bold 14px system-ui';ctx.textAlign='right';
  ctx.fillText(`Wave ${wave} | Kills: ${killCount}`,W-10,22);
}

C.addEventListener('mousemove',e=>{
  let rect=C.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*W/rect.width;
  mouseY=(e.clientY-rect.top)*W/rect.height;
});

C.addEventListener('click',e=>{
  let rect=C.getBoundingClientRect();
  let tx=(e.clientX-rect.left)*W/rect.width;
  let ty=(e.clientY-rect.top)*W/rect.height;
  shoot(tx,ty);
});

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  let t=e.touches[0];
  let rect=C.getBoundingClientRect();
  let tx=(t.clientX-rect.left)*W/rect.width;
  let ty=(t.clientY-rect.top)*W/rect.height;
  mouseX=tx;mouseY=ty;shoot(tx,ty);
},{passive:false});

// WASD movement
let keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='p'||e.key==='P')togglePause();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Move player with keys in update
let origUpdate=update;
(function moveLoop(){
  if(gameStarted&&!gameOver&&!paused){
    let spd=3;
    if(keys.w||keys.ArrowUp)player.y=Math.max(10,player.y-spd);
    if(keys.s||keys.ArrowDown)player.y=Math.min(W-10,player.y+spd);
    if(keys.a||keys.ArrowLeft)player.x=Math.max(10,player.x-spd);
    if(keys.d||keys.ArrowRight)player.x=Math.min(W-10,player.x+spd);
  }
  requestAnimationFrame(moveLoop);
})();

function endGame(){
  gameOver=true;
  highScore=Math.max(highScore,killCount);
  document.getElementById('winMsg').textContent='Game Over!';
  document.getElementById('winDetail').textContent=`Wave: ${wave} | Kills: ${killCount} | Best: ${highScore}`;
  document.getElementById('overOverlay').classList.remove('hidden');
  parent.postMessage({type:'ca-save',slug:'zombie-defense',state:{highScore}},'*');
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.slug==='zombie-defense'&&e.data.state)
    highScore=e.data.state.highScore||0;
});
</script>
</body>
</html>
