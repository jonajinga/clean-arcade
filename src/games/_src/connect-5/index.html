<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connect 5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-area{position:relative;width:90vw;max-width:450px;border:2px solid #6366f1;background:#1e293b}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
.hidden{display:none!important}
canvas{display:block;width:100%;cursor:pointer}
#info{text-align:center;margin:0.5rem;font-size:0.85rem;color:#94a3b8}
</style>
</head>
<body>
<h1>Connect 5</h1>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="start-overlay" class="overlay">
    <h2>Connect 5</h2>
    <p>Get 5 in a row on a 15x15 grid</p>
    <p style="color:#94a3b8">You are blue, AI is red</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="end-overlay" class="overlay hidden">
    <h2 id="end-title">Game Over</h2>
    <p id="end-msg"></p>
    <p id="hs" style="color:#facc15"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="info">Click to place your stone</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const SIZE=15;let W,SZ,board,playerTurn,highScore=0,gameActive;
function resize(){const r=canvas.parentElement.getBoundingClientRect();W=r.width;SZ=W/SIZE;canvas.width=W;canvas.height=W}
resize();window.addEventListener('resize',()=>{resize();draw()});

function startGame(){
  board=Array(SIZE).fill(null).map(()=>Array(SIZE).fill(0));
  playerTurn=true;gameActive=true;
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  draw();
}
canvas.addEventListener('click',e=>{
  if(!playerTurn||!gameActive)return;
  const r=canvas.getBoundingClientRect();
  const col=Math.floor((e.clientX-r.left)/r.width*SIZE);
  const row=Math.floor((e.clientY-r.top)/r.height*SIZE);
  if(row<0||row>=SIZE||col<0||col>=SIZE||board[row][col]!==0)return;
  board[row][col]=1;
  draw();
  if(checkWin(1)){endGame(true);return}
  if(isFull()){endGame(false,'Draw!');return}
  playerTurn=false;
  setTimeout(aiMove,200);
});
function isFull(){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(board[r][c]===0)return false;return true}
function checkWin(p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(board[r][c]!==p)continue;
    for(const[dr,dc]of dirs){
      let count=1;
      for(let i=1;i<5;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===p)count++;else break}
      if(count>=5)return true;
    }
  }
  return false;
}
function aiMove(){
  // Evaluate positions: prioritize blocking and winning
  let bestScore=-Infinity,bestR=0,bestC=0;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(board[r][c]!==0)continue;
    const s=evalPos(r,c,2)*1.1+evalPos(r,c,1); // slightly prefer offense
    if(s>bestScore){bestScore=s;bestR=r;bestC=c}
  }
  board[bestR][bestC]=2;
  draw();
  if(checkWin(2)){endGame(false,'AI wins!');return}
  if(isFull()){endGame(false,'Draw!')}
  playerTurn=true;
}
function evalPos(r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  let total=0;
  board[r][c]=p;
  for(const[dr,dc]of dirs){
    let count=1;
    for(let i=1;i<5;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===p)count++;else break}
    for(let i=1;i<5;i++){const nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===p)count++;else break}
    if(count>=5)total+=10000;
    else if(count===4)total+=500;
    else if(count===3)total+=50;
    else if(count===2)total+=5;
    else total+=1;
  }
  // Proximity bonus
  const cx=SIZE/2;
  total+=Math.max(0,7-Math.abs(r-cx)-Math.abs(c-cx));
  board[r][c]=0;
  return total;
}
function draw(){
  ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,W);
  // Grid
  ctx.strokeStyle='#334155';ctx.lineWidth=1;
  for(let i=0;i<SIZE;i++){
    ctx.beginPath();ctx.moveTo(SZ/2,i*SZ+SZ/2);ctx.lineTo(W-SZ/2,i*SZ+SZ/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(i*SZ+SZ/2,SZ/2);ctx.lineTo(i*SZ+SZ/2,W-SZ/2);ctx.stroke();
  }
  // Stones
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(board[r][c]===0)continue;
    ctx.beginPath();ctx.arc(c*SZ+SZ/2,r*SZ+SZ/2,SZ*0.4,0,Math.PI*2);
    ctx.fillStyle=board[r][c]===1?'#3b82f6':'#ef4444';ctx.fill();
    ctx.strokeStyle=board[r][c]===1?'#93c5fd':'#fca5a5';ctx.lineWidth=2;ctx.stroke();
  }
}
function endGame(won,msg){
  gameActive=false;
  if(won){highScore++;saveScore()}
  document.getElementById('end-title').textContent=won?'You Win!':'Game Over';
  document.getElementById('end-msg').textContent=msg||'';
  document.getElementById('hs').textContent='Wins: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
function saveScore(){try{parent.postMessage({type:'ca-save',slug:'connect-5',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='connect-5'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
