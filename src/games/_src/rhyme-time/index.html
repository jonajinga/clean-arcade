<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rhyme Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;width:100%;max-width:480px}
#game-area{width:100%;min-height:380px;border:2px solid #6366f1;padding:1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
.overlay button{background:#6366f1;color:#fff;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin-top:0.5rem}
#hud{display:flex;justify-content:space-between;width:100%;max-width:480px;padding:0.2rem 0.5rem;font-size:0.85rem}
.hidden{display:none!important}
#prompt-word{font-size:2rem;color:#6366f1;margin-bottom:1rem;font-weight:bold}
.choice-btn{background:#1e293b;border:2px solid #475569;color:#e2e8f0;padding:0.7rem 1.5rem;margin:0.3rem;font-size:1rem;cursor:pointer;border-radius:0;width:200px}
.choice-btn:hover{border-color:#6366f1;background:#334155}
.choice-btn.correct{background:#22c55e;border-color:#22c55e;color:#fff}
.choice-btn.wrong{background:#ef4444;border-color:#ef4444;color:#fff}
#feedback{margin-top:0.5rem;font-size:1rem;min-height:1.5rem}
</style>
</head>
<body>
<h1>Rhyme Time</h1>
<div id="hud"><span id="hud-round">1/30</span><span id="hud-score">Score: 0</span><span id="hud-hi">Hi: 0</span></div>
<div id="game-wrap">
<div id="game-area">
<div id="prompt-word"></div>
<div id="choices"></div>
<div id="feedback"></div>
</div>
<div class="overlay" id="start-overlay">
<h2>Rhyme Time</h2>
<p>Find the word that rhymes!</p>
<p>Pick from 4 choices each round.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="end-overlay">
<h2>Game Over!</h2>
<p id="final-score"></p>
<p id="final-hi"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<script>
const rhymePairs=[
  ['cat','hat','dog','run'],['light','night','dark','sun'],['tree','free','leaf','wood'],
  ['moon','soon','star','sky'],['rain','train','wet','cloud'],['cake','lake','pie','food'],
  ['king','ring','queen','crown'],['book','cook','page','read'],['day','play','time','work'],
  ['boat','coat','ship','sail'],['bear','hair','wolf','cave'],['wall','tall','brick','short'],
  ['sand','band','beach','wave'],['cold','gold','warm','hot'],['dream','stream','sleep','wake'],
  ['mice','dice','rats','trap'],['bone','phone','meat','dog'],['fish','dish','swim','sea'],
  ['bell','well','ring','chime'],['rock','clock','stone','hard'],['face','place','head','nose'],
  ['door','floor','gate','wall'],['hill','still','top','low'],['maze','blaze','path','lost'],
  ['peak','week','top','high'],['cart','start','wheel','road'],['pine','wine','tree','oak'],
  ['hop','stop','jump','run'],['blue','true','red','green'],['sing','thing','song','tune'],
  ['park','dark','bench','walk'],['rope','hope','knot','tie'],['flame','game','fire','burn'],
  ['nail','tail','hammer','head'],['corn','horn','wheat','farm'],['ride','hide','bike','car'],
  ['lime','time','fruit','sour'],['nest','best','bird','egg'],['mouse','house','rat','cheese'],
  ['state','late','country','early']
];

let score=0,highScore=0,round=0,shuffled=[],answered=false;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='rhyme-time'){highScore=e.data.state?.highScore||0;document.getElementById('hud-hi').textContent='Hi: '+highScore}});

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  score=0;round=0;shuffled=shuffle(rhymePairs).slice(0,30);
  nextRound();
}

function nextRound(){
  if(round>=30){endGame();return}
  answered=false;
  const pair=shuffled[round];
  document.getElementById('prompt-word').textContent=pair[0];
  document.getElementById('feedback').textContent='';
  document.getElementById('hud-round').textContent=(round+1)+'/30';
  document.getElementById('hud-score').textContent='Score: '+score;
  const choices=shuffle([pair[1],pair[2],pair[3],rhymePairs[(round+5)%rhymePairs.length][2]]);
  const container=document.getElementById('choices');
  container.innerHTML='';
  choices.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=ch;
    btn.onclick=()=>answer(ch,pair[1],btn);
    container.appendChild(btn);
  });
}

function answer(choice,correct,btn){
  if(answered)return;answered=true;
  const buttons=document.querySelectorAll('.choice-btn');
  if(choice===correct){
    score+=10;btn.classList.add('correct');
    document.getElementById('feedback').textContent='Correct!';
  }else{
    btn.classList.add('wrong');
    buttons.forEach(b=>{if(b.textContent===correct)b.classList.add('correct')});
    document.getElementById('feedback').textContent='Wrong! It rhymes with: '+correct;
  }
  round++;
  setTimeout(nextRound,1200);
}

function endGame(){
  if(score>highScore){highScore=score;parent.postMessage({type:'ca-save',slug:'rhyme-time',state:{highScore}},'*')}
  document.getElementById('hud-hi').textContent='Hi: '+highScore;
  document.getElementById('final-score').textContent='Score: '+score+'/300';
  document.getElementById('final-hi').textContent='High Score: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
</script>
</body>
</html>
