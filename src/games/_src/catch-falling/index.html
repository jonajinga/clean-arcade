<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catch Falling</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.4rem;margin:.5rem 0;color:#facc15}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{color:#e2e8f0}
.btn{background:#6366f1;color:#e2e8f0;border:none;padding:.7rem 1.8rem;font-size:1rem;border-radius:.5rem;cursor:pointer;font-family:inherit}
.btn:hover{background:#818cf8}
.hidden{display:none!important}
#game{display:flex;flex-direction:column;align-items:center;width:100%;max-width:500px;padding:.5rem}
.hud{display:flex;justify-content:space-between;width:100%;font-size:.85rem;margin-bottom:.3rem}
.hud span{background:#1e293b;padding:.2rem .6rem;border-radius:.25rem}
canvas{background:#1e293b;border-radius:.5rem;display:block;max-width:100%;touch-action:none}
.pause-row{margin-top:.75rem}
.pause-btn{background:#334155;color:#e2e8f0;border:none;padding:.5rem 1.5rem;font-size:1.2rem;border-radius:.5rem;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="overlay" id="startOverlay">
<h2>Catch Falling</h2>
<p>Move the basket to catch fruits and coins.<br>Avoid bombs! 60-second rounds.<br>Arrow keys or touch to move.</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="endOverlay">
<h2>Time's Up!</h2>
<p id="endMsg"></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
<div id="game">
<h1>Catch Falling</h1>
<div class="hud">
<span>Score: <b id="score">0</b></span>
<span>Time: <b id="timer">60</b></span>
<span>High: <b id="high">0</b></span>
</div>
<canvas id="canvas" width="400" height="500"></canvas>
<div class="pause-row"><button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button></div>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W=400,H=500,score,timeLeft,highScore=0,paused=false,gameActive=false,items,basket,keys={},raf,lastTime,spawnTimer;
const ITEMS=[
  {emoji:'🍎',pts:10,bad:false},{emoji:'🍊',pts:10,bad:false},{emoji:'🍋',pts:10,bad:false},
  {emoji:'🍇',pts:15,bad:false},{emoji:'🪙',pts:25,bad:false},{emoji:'💣',pts:-30,bad:true}
];
function resize(){
  let w=Math.min(500,window.innerWidth-16);
  canvas.style.width=w+'px';canvas.style.height=(w*H/W)+'px';
}
window.addEventListener('resize',resize);
function spawnItem(){
  let it=ITEMS[Math.random()*ITEMS.length|0];
  let speed=2+Math.random()*2+(60-timeLeft)*0.03;
  items.push({x:Math.random()*(W-30)+15,y:-20,w:28,h:28,speed,emoji:it.emoji,pts:it.pts,bad:it.bad});
}
function update(dt){
  // basket movement
  let speed=300*dt;
  if(keys.ArrowLeft||keys.left)basket.x-=speed;
  if(keys.ArrowRight||keys.right)basket.x+=speed;
  basket.x=Math.max(0,Math.min(W-basket.w,basket.x));
  // items
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];it.y+=it.speed;
    // catch?
    if(it.y+it.h>basket.y&&it.y<basket.y+basket.h&&it.x+it.w>basket.x&&it.x<basket.x+basket.w){
      score+=it.pts;if(score<0)score=0;
      items.splice(i,1);continue;
    }
    if(it.y>H+20)items.splice(i,1);
  }
  // spawn
  spawnTimer-=dt;
  if(spawnTimer<=0){spawnItem();spawnTimer=0.4+Math.random()*0.5;}
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // basket
  ctx.fillStyle='#facc15';
  ctx.beginPath();
  ctx.moveTo(basket.x,basket.y+basket.h);
  ctx.lineTo(basket.x+10,basket.y);
  ctx.lineTo(basket.x+basket.w-10,basket.y);
  ctx.lineTo(basket.x+basket.w,basket.y+basket.h);
  ctx.closePath();ctx.fill();
  // items
  ctx.font='24px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  items.forEach(it=>{ctx.fillText(it.emoji,it.x+it.w/2,it.y+it.h/2);});
  document.getElementById('score').textContent=score;
  document.getElementById('timer').textContent=Math.ceil(timeLeft);
  document.getElementById('high').textContent=highScore;
}
let tickTimer=0;
function loop(ts){
  if(!gameActive)return;
  if(!lastTime)lastTime=ts;
  let dt=(ts-lastTime)/1000;lastTime=ts;
  if(!paused){
    tickTimer+=dt;
    if(tickTimer>=1){tickTimer-=1;timeLeft--;if(timeLeft<=0){endGame();return;}}
    update(dt);
  }
  draw();
  raf=requestAnimationFrame(loop);
}
function endGame(){
  gameActive=false;
  if(score>highScore)highScore=score;
  document.getElementById('endMsg').textContent=`Score: ${score} | High Score: ${highScore}`;
  document.getElementById('endOverlay').classList.remove('hidden');
  saveState();
}
function togglePause(){
  if(!gameActive)return;
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
  if(paused)saveState();
}
function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  score=0;timeLeft=60;paused=false;items=[];spawnTimer=1;tickTimer=0;lastTime=0;
  basket={x:W/2-30,y:H-50,w:60,h:30};
  gameActive=true;document.getElementById('pauseBtn').textContent='⏸';
  lastTime=0;
  raf=requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='p'||e.key==='P')togglePause();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
// Touch
let touchX=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  let rect=canvas.getBoundingClientRect();
  let scale=W/rect.width;
  let cx=e.touches[0].clientX;
  let dx=(cx-touchX)*scale;touchX=cx;
  basket.x+=dx;
  basket.x=Math.max(0,Math.min(W-basket.w,basket.x));
},{passive:false});
canvas.addEventListener('touchend',()=>{touchX=null;});
function saveState(){try{window.parent.postMessage({type:'ca-save',slug:'catch-falling',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.state){highScore=e.data.state.highScore||0;}});
resize();
</script>
</body>
</html>
