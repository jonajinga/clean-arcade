<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match Three</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:.8rem}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#1e293b;border:2px solid #6366f1;border-radius:12px;padding:2rem;text-align:center;max-width:420px;width:90%}
.overlay-box h2{font-size:1.8rem;margin-bottom:.8rem;color:#facc15}
.overlay-box p{margin-bottom:.5rem;color:#94a3b8;font-size:.95rem}
.overlay-box .score{font-size:1.4rem;color:#22c55e;margin:.8rem 0}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:.6rem 1.2rem;font-size:1rem;font-weight:600;transition:transform .1s}
button:active{transform:scale(.96)}
.btn-play{background:#6366f1;color:#fff;font-size:1.2rem;padding:.8rem 2rem;margin-top:1rem}
.btn-play:hover{background:#818cf8}
#game{display:none;text-align:center;max-width:420px;width:100%}
.top-bar{display:flex;justify-content:space-between;margin-bottom:.6rem;font-size:.95rem}
.top-bar .score-val{color:#22c55e;font-weight:700;font-size:1.1rem}
.top-bar .time-val{color:#ef4444;font-weight:700;font-size:1.1rem}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-width:380px;margin:0 auto;touch-action:none}
.gem{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:transform .15s,opacity .2s;border:2px solid transparent;user-select:none;-webkit-user-select:none}
.gem:hover{transform:scale(1.1)}
.gem.selected{border-color:#fff;transform:scale(1.15);box-shadow:0 0 10px rgba(255,255,255,.3)}
.gem.matched{opacity:0;transform:scale(.5)}
.pause-wrap{margin:.8rem 0}
.btn-pause{background:#334155;color:#e2e8f0;padding:.5rem 1.2rem;font-size:1.1rem}
@media(max-width:420px){
  .gem{font-size:1.1rem;border-radius:4px}
  .grid{gap:2px}
}
</style>
</head>
<body>
<h1 style="font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center">Match Three</h1>

<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>Match Three</h2>
<p>Swap adjacent gems to create rows or columns of 3 or more matching gems. Score as many points as you can in 60 seconds!</p>
<button class="btn-play" onclick="startGame()">Play</button>
</div>
</div>

<div class="overlay" id="endOverlay" style="display:none">
<div class="overlay-box">
<h2>Time's Up!</h2>
<div class="score" id="endScore"></div>
<div id="endHigh" style="color:#facc15;margin:.5rem 0"></div>
<button class="btn-play" onclick="startGame()">Play Again</button>
</div>
</div>

<div id="game">
<div class="top-bar">
<span>Score: <span class="score-val" id="scoreVal">0</span></span>
<span>Time: <span class="time-val" id="timeVal">60</span></span>
</div>
<div class="grid" id="grid"></div>
<div class="pause-wrap">
<button class="btn-pause" id="pauseBtn" onclick="togglePause()">&#9208;</button>
</div>
</div>

<script>
const SLUG='match-three',ROWS=8,COLS=8;
const GEMS=['🔴','🔵','🟢','🟡','🟣','🟠','⚪'];
let board,selected,score,timeLeft,timerInterval,paused,animating,highScore=0;

function save(){try{window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.state){highScore=e.data.state.highScore||0;}});

document.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P')togglePause();});

function randomGem(){return Math.floor(Math.random()*GEMS.length);}

function initBoard(){
  board=[];
  for(let r=0;r<ROWS;r++){
    board[r]=[];
    for(let c=0;c<COLS;c++){
      let g;
      do{
        g=randomGem();
      }while(
        (c>=2&&board[r][c-1]===g&&board[r][c-2]===g)||
        (r>=2&&board[r-1][c]===g&&board[r-2][c]===g)
      );
      board[r][c]=g;
    }
  }
}

function renderBoard(){
  let h='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let sel=selected&&selected.r===r&&selected.c===c;
      let gem=board[r][c];
      h+=`<div class="gem${sel?' selected':''}" data-r="${r}" data-c="${c}" onclick="clickGem(${r},${c})">${gem>=0?GEMS[gem]:''}</div>`;
    }
  }
  document.getElementById('grid').innerHTML=h;
}

function startGame(){
  document.getElementById('startOverlay').style.display='none';
  document.getElementById('endOverlay').style.display='none';
  document.getElementById('game').style.display='block';
  score=0;timeLeft=60;selected=null;paused=false;animating=false;
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('timeVal').textContent=60;
  document.getElementById('pauseBtn').innerHTML='&#9208;';
  initBoard();renderBoard();
  clearInterval(timerInterval);
  timerInterval=setInterval(tick,1000);
}

function tick(){
  if(paused)return;
  timeLeft--;
  document.getElementById('timeVal').textContent=timeLeft;
  if(timeLeft<=0){
    clearInterval(timerInterval);
    endGame();
  }
}

function togglePause(){
  if(timeLeft<=0)return;
  paused=!paused;
  document.getElementById('pauseBtn').innerHTML=paused?'&#9654;':'&#9208;';
  if(paused)save();
}

function clickGem(r,c){
  if(paused||animating||timeLeft<=0)return;
  if(!selected){
    selected={r,c};renderBoard();return;
  }
  let dr=Math.abs(selected.r-r),dc=Math.abs(selected.c-c);
  if((dr===1&&dc===0)||(dr===0&&dc===1)){
    swap(selected.r,selected.c,r,c);
    let matches=findMatches();
    if(matches.length>0){
      selected=null;
      processMatches(matches);
    } else {
      swap(selected.r,selected.c,r,c);
      selected=null;renderBoard();
    }
  } else {
    selected={r,c};renderBoard();
  }
}

function swap(r1,c1,r2,c2){
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
}

function findMatches(){
  let matched=new Set();
  // Horizontal
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<=COLS-3;c++){
      if(board[r][c]>=0&&board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]){
        let g=board[r][c],end=c+2;
        while(end+1<COLS&&board[r][end+1]===g)end++;
        for(let i=c;i<=end;i++)matched.add(r*COLS+i);
      }
    }
  }
  // Vertical
  for(let c=0;c<COLS;c++){
    for(let r=0;r<=ROWS-3;r++){
      if(board[r][c]>=0&&board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]){
        let g=board[r][c],end=r+2;
        while(end+1<ROWS&&board[end+1][c]===g)end++;
        for(let i=r;i<=end;i++)matched.add(i*COLS+c);
      }
    }
  }
  return [...matched];
}

function processMatches(matches){
  animating=true;
  score+=matches.length*10;
  document.getElementById('scoreVal').textContent=score;
  // Remove matched
  for(let m of matches){
    let r=Math.floor(m/COLS),c=m%COLS;
    board[r][c]=-1;
  }
  renderBoard();
  setTimeout(()=>{
    dropGems();
    fillGems();
    renderBoard();
    let newMatches=findMatches();
    if(newMatches.length>0){
      setTimeout(()=>processMatches(newMatches),250);
    } else {
      animating=false;
    }
  },300);
}

function dropGems(){
  for(let c=0;c<COLS;c++){
    let write=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(board[r][c]>=0){
        board[write][c]=board[r][c];
        if(write!==r)board[r][c]=-1;
        write--;
      }
    }
    for(let r=write;r>=0;r--)board[r][c]=-1;
  }
}

function fillGems(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(board[r][c]<0)board[r][c]=randomGem();
    }
  }
}

function endGame(){
  if(score>highScore){highScore=score;save();}
  document.getElementById('endScore').textContent='Score: '+score;
  document.getElementById('endHigh').textContent='High Score: '+highScore;
  document.getElementById('endOverlay').style.display='flex';
  save();
}
</script>
</body>
</html>
