<!DOCTYPE html>
<html lang="en">

<title>Word Bomb</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;width:100%;max-width:480px}
#game-area{width:100%;min-height:380px;border:2px solid #6366f1;padding:1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
.overlay button{background:#6366f1;color:#fff;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin-top:0.5rem}
#hud{display:flex;justify-content:space-between;width:100%;max-width:480px;padding:0.2rem 0.5rem;font-size:0.85rem}
.hidden{display:none!important}
#bomb{font-size:3rem;margin:0.5rem 0}
#letters{font-size:2.5rem;color:#ef4444;font-weight:bold;letter-spacing:0.2rem;margin-bottom:0.5rem}
#timer-bar{width:80%;max-width:300px;height:12px;background:#334155;margin:0.5rem 0}
#timer-fill{height:100%;background:#ef4444;transition:width 0.1s linear}
#input-box{background:#1e293b;border:2px solid #6366f1;color:#e2e8f0;font-size:1.3rem;padding:0.5rem 1rem;text-align:center;width:80%;max-width:300px;border-radius:0;outline:none}
#input-box:focus{border-color:#facc15}
#feedback{margin-top:0.5rem;font-size:1rem;min-height:1.5rem}
.correct{color:#22c55e}
.wrong{color:#ef4444}

<body>
<h1>Word Bomb</h1>
<div id="hud"><span id="hud-score">Score: 0</span><span id="hud-lives">Lives: 3</span><span id="hud-hi">Hi: 0</span></div>
<div id="game-wrap">
<div id="game-area">
<div id="bomb">💣</div>
<div id="letters"></div>
<div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>
<input id="input-box" type="text" autocomplete="off" autocapitalize="off" placeholder="Type a word...">
<div id="feedback"></div>
</div>
<div class="overlay" id="start-overlay">
<h2>Word Bomb</h2>
<p>Given 2-3 letters, type a word containing them!</p>
<p>5-second fuse - be quick!</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="end-overlay">
<h2>BOOM!</h2>
<p id="final-score"></p>
<p id="final-hi"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>

let score=0,highScore=0,lives=3,currentFragment='',timerVal=100,timerInterval=null,running=false;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='word-bomb'){highScore=e.data.state?.highScore||0;document.getElementById('hud-hi').textContent='Hi: '+highScore}});

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  score=0;lives=3;running=true;
  nextRound();
}

function nextRound(){
  if(!running)return;
  currentFragment=fragments[Math.floor(Math.random()*fragments.length)];
  document.getElementById('letters').textContent=currentFragment.toUpperCase();
  document.getElementById('input-box').value='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  document.getElementById('input-box').focus();
  document.getElementById('bomb').textContent='💣';
  timerVal=100;
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('timer-fill').style.background='#ef4444';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerVal-=2;
    document.getElementById('timer-fill').style.width=timerVal+'%';
    if(timerVal<=30)document.getElementById('timer-fill').style.background='#ef4444';
    if(timerVal<=0){
      clearInterval(timerInterval);
      bombExplode();
    }
  },100);
  updateHUD();
}

function bombExplode(){
  document.getElementById('bomb').textContent='💥';
  lives--;
  document.getElementById('feedback').textContent='BOOM! Too slow!';
  document.getElementById('feedback').className='wrong';
  updateHUD();
  if(lives<=0){setTimeout(endGame,800)}
  else{setTimeout(nextRound,1000)}
}

function checkWord(word){
  const w=word.toLowerCase().trim();
  if(w.length<3)return{valid:false,reason:'Too short (3+ letters)'};
  if(!w.includes(currentFragment.toLowerCase()))return{valid:false,reason:'Must contain "'+currentFragment.toUpperCase()+'"'};
  if(!validWords.has(w))return{valid:false,reason:'Not in word list'};
  return{valid:true};
}

document.getElementById('input-box').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&running){
    const result=checkWord(e.target.value);
    if(result.valid){
      clearInterval(timerInterval);
      score+=10+Math.floor(timerVal/10);
      document.getElementById('feedback').textContent='Correct! +'+( 10+Math.floor(timerVal/10));
      document.getElementById('feedback').className='correct';
      document.getElementById('bomb').textContent='✅';
      updateHUD();
      setTimeout(nextRound,800);
    }else{
      document.getElementById('feedback').textContent=result.reason;
      document.getElementById('feedback').className='wrong';
    }
  }
});

function updateHUD(){
  document.getElementById('hud-score').textContent='Score: '+score;
  document.getElementById('hud-lives').textContent='Lives: '+lives;
}

function endGame(){
  running=false;clearInterval(timerInterval);
  if(score>highScore){highScore=score;parent.postMessage({type:'ca-save',slug:'word-bomb',state:{highScore}},'*')}
  document.getElementById('hud-hi').textContent='Hi: '+highScore;
  document.getElementById('final-score').textContent='Score: '+score;
  document.getElementById('final-hi').textContent='High Score: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
