<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penalty Kicks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;touch-action:manipulation}
h1{font-size:1.4rem;margin:12px 0 4px}
#hud{display:flex;gap:20px;font-size:1.05rem;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
#hud span{color:#facc15}
#gameArea{position:relative;max-width:500px;width:95vw}
#goal{position:relative;width:100%;aspect-ratio:3/2;background:#22c55e;border:4px solid #e2e8f0;border-radius:0 8px 0 0;overflow:hidden;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
.zone{display:flex;align-items:center;justify-content:center;border:1px dashed rgba(226,232,240,0.2);cursor:pointer;transition:background .15s;font-size:1.1rem;user-select:none;position:relative}
.zone:hover{background:rgba(99,102,241,0.25)}
.zone.scored{background:rgba(34,197,94,0.5)}
.zone.saved{background:rgba(239,68,68,0.4)}
.zone .label{pointer-events:none;color:rgba(226,232,240,0.5);font-weight:600}
#keeper{position:absolute;width:22%;height:40%;background:#ef4444;border-radius:0;transition:all .4s ease;display:flex;align-items:center;justify-content:center;font-size:2rem;pointer-events:none;z-index:2}
#ball{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:12%;aspect-ratio:1;background:#e2e8f0;border-radius:50%;z-index:3;pointer-events:none;transition:all .5s ease}
#ball.kicked{width:8%;bottom:auto}
#result{font-size:1.6rem;font-weight:700;margin:12px 0;min-height:2rem;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:2rem;margin-bottom:12px;color:#facc15}
.overlay p{font-size:1.15rem;margin-bottom:6px}
.overlay button{padding:14px 40px;font-size:1.2rem;background:#6366f1;color:#e2e8f0;border:none;border-radius:0;cursor:pointer;margin-top:12px}
.overlay button:hover{background:#818cf8}
.hidden{display:none!important}
#roundDots{display:flex;gap:8px;margin:8px 0;justify-content:center}
.dot{width:20px;height:20px;border-radius:50%;border:2px solid #e2e8f0;background:transparent}
.dot.goal{background:#22c55e}.dot.miss{background:#ef4444}
</style>
</head>
<body>
<h1>Penalty Kicks</h1>
<div id="hud">
  <span>Round: <b id="roundEl">1</b>/5</span>
  <span>Score: <b id="scoreEl">0</b></span>
  <span>Wins: <b id="winsEl">0</b></span>
</div>
<div id="roundDots"></div>
<div id="gameArea">
  <div id="goal">
    <div class="zone" data-zone="0"><span class="label">TL</span></div>
    <div class="zone" data-zone="1"><span class="label">TC</span></div>
    <div class="zone" data-zone="2"><span class="label">TR</span></div>
    <div class="zone" data-zone="3"><span class="label">BL</span></div>
    <div class="zone" data-zone="4"><span class="label">BC</span></div>
    <div class="zone" data-zone="5"><span class="label">BR</span></div>
    <div id="keeper">🧤</div>
    <div id="ball">⚽</div>
  </div>
</div>
<div id="result"></div>

<div class="overlay" id="startOverlay">
  <h2>Penalty Kicks</h2>
  <p>Click a zone to shoot. Score more than the keeper saves!</p>
  <p>Best of 5 rounds.</p>
  <button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="endOverlay">
  <h2 id="endTitle">Result</h2>
  <p>You scored <b id="finalScore">0</b> out of 5</p>
  <p>Total wins: <b id="finalWins">0</b></p>
  <button onclick="startGame()">Play Again</button>
</div>

<script>
const SLUG='penalty-kicks';
let round=0,score=0,wins=0,animating=false,results=[];
const zones=document.querySelectorAll('.zone');
const keeper=document.getElementById('keeper');
const ball=document.getElementById('ball');
const resultEl=document.getElementById('result');

// Keeper positions for each zone
const keeperPos=[
  {left:'5%',top:'5%'},{left:'39%',top:'5%'},{left:'73%',top:'5%'},
  {left:'5%',top:'50%'},{left:'39%',top:'50%'},{left:'73%',top:'50%'}
];

function updateHud(){
  document.getElementById('roundEl').textContent=Math.min(round+1,5);
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('winsEl').textContent=wins;
}
function renderDots(){
  const c=document.getElementById('roundDots');c.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');d.className='dot';
    if(i<results.length)d.classList.add(results[i]?'goal':'miss');
    c.appendChild(d);
  }
}

zones.forEach(z=>{
  z.addEventListener('click',()=>{
    if(animating||round>=5)return;
    const playerZone=parseInt(z.dataset.zone);
    const keeperZone=Math.floor(Math.random()*6);
    animating=true;

    // Reset zones
    zones.forEach(zz=>{zz.classList.remove('scored','saved');});

    // Animate ball to zone
    const goalRect=document.getElementById('goal');
    const col=playerZone%3,row=Math.floor(playerZone/3);
    ball.classList.add('kicked');
    ball.style.left=(col*33.3+16.6)+'%';
    ball.style.top=(row*50+25)+'%';
    ball.style.transform='translate(-50%,-50%) scale(0.7)';

    // Keeper dives
    keeper.style.left=keeperPos[keeperZone].left;
    keeper.style.top=keeperPos[keeperZone].top;

    setTimeout(()=>{
      const scored=playerZone!==keeperZone;
      if(scored){score++;z.classList.add('scored');resultEl.textContent='⚽ GOAL!';resultEl.style.color='#22c55e';}
      else{z.classList.add('saved');resultEl.textContent='🧤 SAVED!';resultEl.style.color='#ef4444';}
      results.push(scored);
      round++;
      updateHud();renderDots();

      setTimeout(()=>{
        // Reset ball
        ball.classList.remove('kicked');
        ball.style.left='50%';ball.style.top='';ball.style.bottom='5%';ball.style.transform='translateX(-50%)';
        keeper.style.left='39%';keeper.style.top='25%';
        animating=false;
        if(round>=5)endGame();
      },1000);
    },500);
  });
});

function endGame(){
  const won=score>=3;
  if(won)wins++;
  document.getElementById('endTitle').textContent=won?'You Win!':'You Lose!';
  document.getElementById('endTitle').style.color=won?'#22c55e':'#ef4444';
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalWins').textContent=wins;
  document.getElementById('endOverlay').classList.remove('hidden');
  save();
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  round=0;score=0;results=[];animating=false;
  resultEl.textContent='';
  zones.forEach(z=>{z.classList.remove('scored','saved');});
  keeper.style.left='39%';keeper.style.top='25%';
  ball.classList.remove('kicked');ball.style.left='50%';ball.style.top='';ball.style.bottom='5%';ball.style.transform='translateX(-50%)';
  updateHud();renderDots();
}

function save(){window.parent.postMessage({type:'ca-save',slug:SLUG,state:{wins}},'*');}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    wins=e.data.state.wins||0;
    document.getElementById('winsEl').textContent=wins;
  }
});
</script>
</body>
</html>
