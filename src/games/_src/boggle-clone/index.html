<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boggle Clone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
.overlay p{color:#e2e8f0;font-size:1.1rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{opacity:0.9}
.hidden{display:none}
.top-bar{display:flex;gap:1rem;align-items:center;margin:0.25rem}
.timer{color:#ef4444;font-size:1.2rem;font-weight:bold}
.score-display{color:#22c55e;font-size:1.1rem;font-weight:bold}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;border:2px solid #6366f1;padding:4px;margin:0.5rem;width:280px}
.cell{width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:bold;background:#1e293b;border:1px solid #334155;cursor:pointer;user-select:none;text-transform:uppercase;transition:background 0.1s}
.cell.selected{background:#6366f1;color:#fff}
.cell.adjacent{background:#334155}
.word-display{font-size:1.2rem;min-height:2rem;background:#1e293b;padding:0.4rem 1rem;min-width:200px;text-align:center;letter-spacing:3px;border:1px solid #334155;text-transform:uppercase}
.controls{display:flex;gap:0.5rem;margin:0.25rem}
.msg{font-size:0.85rem;min-height:1.1rem;text-align:center}
.found-words{max-height:150px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:0.25rem;justify-content:center;width:90%;max-width:400px;padding:0.25rem}
.fw{background:#1e293b;padding:0.15rem 0.4rem;font-size:0.75rem;border:1px solid #334155}
.pause-btn{background:#334155}
</style>
</head>
<body>
<h1>Boggle Clone</h1>
<div class="top-bar">
<div class="timer">Time: <span id="timer">180</span>s</div>
<div class="score-display">Score: <span id="score">0</span></div>
</div>
<div class="word-display" id="currentWord"></div>
<div class="board" id="board"></div>
<div class="controls">
<button onclick="clearSelection()">Clear</button>
<button onclick="submitWord()" style="background:#22c55e">Submit</button>
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
</div>
<div class="msg" id="msg"></div>
<div class="found-words" id="foundWords"></div>

<div class="overlay" id="startOverlay">
<h2>Boggle Clone</h2>
<p>Find words in the letter grid</p>
<p style="font-size:0.9rem;color:#94a3b8;max-width:300px;text-align:center">Trace words by connecting adjacent letters (including diagonals). 3+ letters. 3 minute timer. Longer words = more points.</p>
<button id="startBtn">Play</button>
</div>
<div class="overlay hidden" id="overOverlay">
<h2>Time's Up!</h2>
<p>Score: <span id="finalScore">0</span></p>
<p>Words: <span id="finalWords">0</span></p>
<button id="againBtn">Play Again</button>
</div>
<div class="overlay hidden" id="pauseOverlay">
<h2>Paused</h2>
<button onclick="togglePause()">Resume</button>
</div>

<script>

odds","odor","offs","ogle","oink","oils","oily","okay","omen","omit","once","ones","only","onto","ooze","opal","open","opts","opus","oral","orca","ores","ouch","ours","oust","outs","oval","oven","over","owed","owes","owls","owns","oxen","pace","pack","pact","page","paid","pail","pain","pair","pale","palm","pane","pang","pant","pare","park","part","pass","past","path","pave","pawn","peak","peal","pear","peas","peck","peel","peep","peer","pelt","pend","pens","pent","perk","perm","pest","pets","pick","pier","pigs","pike","pile","pill","pine","pink","pins","pint","pipe","pits","pity","plan","play","plea","plod","plot","plow","ploy","plug","plum","plus","pock","pods","poem","poet","poke","pole","poll","polo","pomp","pond","pony","pool","poor","pope","pops","pore","pork","port","pose","posh","post","pour","pout","pray","prep","prey","prig","prim","prod","prom","prop","prow","pubs","puck","puff","pull","pulp","pump","punk","puns","pure","push","puts","putt"];

const DICE=['AAEEGN','ABBJOO','ACHOPS','AFFKPS','AOOTTW','CIMOTU','DEILRX','DELRVY','DISTTY','EEGHNW','EEINSU','EHRTVW','EIOSST','ELRTTY','HIMNQU','HLNNRZ'];
let board=[];
let selected=[];
let currentWord='';
let foundSet=new Set();
let score=0;
let highScore=0;
let timeLeft=180;
let timer=null;
let paused=false;
let gameActive=false;

function isAdjacent(a,b){
const ar=Math.floor(a/4),ac=a%4,br=Math.floor(b/4),bc=b%4;
return Math.abs(ar-br)<=1&&Math.abs(ac-bc)<=1&&a!==b;
}

function generateBoard(){
const dice=[...DICE];
for(let i=dice.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dice[i],dice[j]]=[dice[j],dice[i]];}
board=dice.map(d=>d[Math.floor(Math.random()*d.length)]);
}

function renderBoard(){
const el=document.getElementById('board');
el.innerHTML='';
board.forEach((l,i)=>{
const c=document.createElement('div');
c.className='cell';
if(selected.includes(i))c.classList.add('selected');
c.textContent=l==='Q'?'Qu':l;
c.addEventListener('click',()=>selectCell(i));
c.addEventListener('touchstart',e=>{e.preventDefault();selectCell(i);},{passive:false});
el.appendChild(c);
});
}

function selectCell(i){
if(!gameActive||paused)return;
if(selected.length===0||(isAdjacent(selected[selected.length-1],i)&&!selected.includes(i))){
selected.push(i);
currentWord+=board[i]==='Q'?'QU':board[i];
document.getElementById('currentWord').textContent=currentWord;
renderBoard();
}
}

function clearSelection(){
selected=[];currentWord='';
document.getElementById('currentWord').textContent='';
renderBoard();
}

function submitWord(){
if(!gameActive||paused)return;
const w=currentWord.toLowerCase();
const msg=document.getElementById('msg');
if(w.length<3){msg.textContent='Too short (3+ letters)';msg.style.color='#ef4444';}
else if(foundSet.has(w)){msg.textContent='Already found';msg.style.color='#ef4444';}
else if(!DICT.includes(w)){msg.textContent='Not in dictionary';msg.style.color='#ef4444';}
else{
foundSet.add(w);
const pts=w.length<=4?1:w.length<=5?2:w.length<=6?3:w.length<=7?5:11;
score+=pts;
document.getElementById('score').textContent=score;
msg.textContent=`+${pts} "${w.toUpperCase()}"`;msg.style.color='#22c55e';
const el=document.createElement('span');el.className='fw';el.textContent=w;
document.getElementById('foundWords').appendChild(el);
}
clearSelection();
setTimeout(()=>{msg.textContent='';},1500);
}

function togglePause(){
if(!gameActive)return;
paused=!paused;
document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
document.getElementById('pauseOverlay').classList.toggle('hidden',!paused);
if(paused)clearInterval(timer);
else startTimer();
}

function startTimer(){
timer=setInterval(()=>{
if(--timeLeft<=0){clearInterval(timer);endGame();}
document.getElementById('timer').textContent=timeLeft;
},1000);
}

function endGame(){
gameActive=false;
if(score>highScore){highScore=score;save();}
document.getElementById('finalScore').textContent=score;
document.getElementById('finalWords').textContent=foundSet.size;
document.getElementById('overOverlay').classList.remove('hidden');
}

function startGame(){
generateBoard();
selected=[];currentWord='';score=0;timeLeft=180;foundSet=new Set();paused=false;
document.getElementById('score').textContent='0';
document.getElementById('timer').textContent='180';
document.getElementById('currentWord').textContent='';
document.getElementById('msg').textContent='';
document.getElementById('foundWords').innerHTML='';
document.getElementById('pauseBtn').textContent='⏸';
document.getElementById('startOverlay').classList.add('hidden');
document.getElementById('overOverlay').classList.add('hidden');
document.getElementById('pauseOverlay').classList.add('hidden');
if(timer)clearInterval(timer);
gameActive=true;
renderBoard();
startTimer();
}

document.addEventListener('keydown',e=>{
if(e.key==='p'||e.key==='P')togglePause();
if(e.key==='Enter')submitWord();
if(e.key==='Escape')clearSelection();
});

function save(){try{parent.postMessage({type:'ca-save',slug:'boggle-clone',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{
if(e.data&&e.data.type==='ca-load'&&e.data.slug==='boggle-clone'){
if(e.data.state&&e.data.state.highScore)highScore=e.data.state.highScore;
}
});

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);
</script>
</body>
</html>
