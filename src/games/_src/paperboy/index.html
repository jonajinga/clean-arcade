<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paperboy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0.5rem}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
canvas{border:2px solid #6366f1;max-width:100%;display:block}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{color:#facc15;font-size:1.5rem;margin-bottom:0.5rem}
.overlay p{color:#e2e8f0;margin:0.25rem 0;font-size:0.9rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin:0.3rem}
button:hover{opacity:0.85}
.pause-btn{background:#334155}
#game-wrapper{position:relative;display:inline-block;margin:0.25rem 0}
.hud{display:flex;gap:1rem;font-size:0.8rem;color:#e2e8f0;margin:0.25rem 0;flex-wrap:wrap;justify-content:center}
.hud span{color:#22c55e}
.game-controls{display:flex;gap:0.3rem;margin:0.25rem 0;flex-wrap:wrap;justify-content:center}
.game-controls button{font-size:1rem;padding:0.5rem 0.7rem;background:#334155;min-width:44px;min-height:44px}
.ctrl-grid{display:flex;flex-direction:column;gap:0.3rem;align-items:center}
.ctrl-row{display:flex;gap:0.3rem}
</style>
</head>
<body>
<h1>Paperboy</h1>
<div class="hud">
  Papers: <span id="papers">20</span> | Score: <span id="score">0</span> | Lives: <span id="lives">3</span> | High: <span id="hi">0</span>
</div>
<div id="game-wrapper">
  <canvas id="c" width="480" height="500"></canvas>
  <div class="overlay" id="start-overlay">
    <h2>Paperboy</h2>
    <p>Deliver papers to subscriber houses!</p>
    <p>Up/Down to move, Space to throw</p>
    <p>Hit mailboxes for bonus, avoid obstacles</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div class="overlay" id="over-overlay" style="display:none">
    <h2>Game Over</h2>
    <p>Score: <span id="final-score">0</span></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸</button>
<div class="game-controls">
  <div class="ctrl-grid">
    <div class="ctrl-row"><button ontouchstart="keys.up=true" ontouchend="keys.up=false" onmousedown="keys.up=true" onmouseup="keys.up=false">▲</button></div>
    <div class="ctrl-row">
      <button ontouchstart="keys.down=true" ontouchend="keys.down=false" onmousedown="keys.down=true" onmouseup="keys.down=false">▼</button>
    </div>
  </div>
  <button ontouchstart="throwPaper()" style="background:#facc15;color:#0f172a;align-self:center">📰 Throw</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=480,H=500;
let player,houses,papers,obstacles,scrollX,score,lives,papersLeft,highScore=0,gameState='start',paused=false,houseTimer=0,obstTimer=0;
let keys={up:false,down:false};

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='paperboy'){highScore=e.data.state?.highScore||0;document.getElementById('hi').textContent=highScore}});
function save(){try{parent.postMessage({type:'ca-save',slug:'paperboy',state:{highScore}},'*')}catch(e){}}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w')keys.up=true;
  if(e.key==='ArrowDown'||e.key==='s')keys.down=true;
  if(e.key===' '){throwPaper();e.preventDefault()}
  if(e.key==='p'||e.key==='P')togglePause();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp'||e.key==='w')keys.up=false;
  if(e.key==='ArrowDown'||e.key==='s')keys.down=false;
});

function throwPaper(){
  if(gameState!=='play'||paused||papersLeft<=0)return;
  papersLeft--;
  papers.push({x:player.x+20,y:player.y,vx:4,vy:-2,active:true});
}

function startGame(){
  document.getElementById('start-overlay').style.display='none';
  document.getElementById('over-overlay').style.display='none';
  player={x:60,y:H-120,w:20,h:28};
  houses=[];papers=[];obstacles=[];scrollX=0;score=0;lives=3;papersLeft=25;houseTimer=0;obstTimer=0;
  gameState='play';paused=false;
  document.getElementById('pause-btn').textContent='⏸';
  loop();
}

function togglePause(){if(gameState!=='play')return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused)loop()}

function update(){
  if(keys.up)player.y-=3;
  if(keys.down)player.y+=3;
  player.y=Math.max(200,Math.min(H-40,player.y));
  scrollX+=3;

  // Spawn houses
  houseTimer++;
  if(houseTimer>80){
    houseTimer=0;
    let subscriber=Math.random()<0.6;
    houses.push({x:W+20,y:40+Math.random()*100,w:60,h:50,subscriber,hasMailbox:true,mbx:W+60,mby:170,delivered:false});
  }

  // Spawn obstacles
  obstTimer++;
  if(obstTimer>90+Math.random()*60){
    obstTimer=0;
    let oy=220+Math.random()*(H-280);
    let type=Math.floor(Math.random()*3); // 0=car,1=dog,2=skater
    obstacles.push({x:W+20,y:oy,w:type===0?30:16,h:type===0?18:16,type,speed:type===0?4:2});
  }

  // Move houses
  for(let i=houses.length-1;i>=0;i--){
    houses[i].x-=3;houses[i].mbx-=3;
    if(houses[i].x<-80)houses.splice(i,1);
  }

  // Move obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=obstacles[i].speed;
    if(obstacles[i].x<-40){obstacles.splice(i,1);continue}
    // Collision with player
    let o=obstacles[i];
    if(Math.abs(o.x-player.x)<(o.w+player.w)/2&&Math.abs(o.y-player.y)<(o.h+player.h)/2){
      lives--;obstacles.splice(i,1);
      if(lives<=0){endGame();return}
    }
  }

  // Move papers
  for(let i=papers.length-1;i>=0;i--){
    let p=papers[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;
    if(p.y>H||p.x>W+20){papers.splice(i,1);continue}
    // Check house/mailbox hits
    for(let h of houses){
      if(!h.delivered&&h.subscriber){
        // Mailbox hit
        if(Math.abs(p.x-h.mbx)<20&&Math.abs(p.y-h.mby)<25){
          score+=100;h.delivered=true;papers.splice(i,1);break;
        }
        // Porch hit
        if(p.x>h.x&&p.x<h.x+h.w&&p.y>h.y&&p.y<h.y+h.h){
          score+=50;h.delivered=true;papers.splice(i,1);break;
        }
      }
    }
  }

  if(papersLeft<=0&&papers.length===0){
    score+=lives*50;
    papersLeft=25;// Next round
  }

  document.getElementById('papers').textContent=papersLeft;
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
}

function endGame(){
  gameState='over';
  if(score>highScore){highScore=score;save()}
  document.getElementById('hi').textContent=highScore;
  document.getElementById('final-score').textContent=score;
  document.getElementById('over-overlay').style.display='flex';
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  // Sidewalk
  ctx.fillStyle='#334155';ctx.fillRect(0,180,W,10);
  // Road
  ctx.fillStyle='#1e293b';ctx.fillRect(0,190,W,H-190);
  // Road lines
  ctx.strokeStyle='#facc15';ctx.lineWidth=2;ctx.setLineDash([15,15]);
  ctx.beginPath();ctx.moveTo(0,H-100);ctx.lineTo(W,H-100);ctx.stroke();
  ctx.setLineDash([]);
  // Houses
  for(let h of houses){
    ctx.fillStyle=h.subscriber?'#3b82f6':'#64748b';
    ctx.fillRect(h.x,h.y,h.w,h.h);
    // Roof
    ctx.fillStyle='#ef4444';
    ctx.beginPath();ctx.moveTo(h.x-5,h.y);ctx.lineTo(h.x+h.w/2,h.y-20);ctx.lineTo(h.x+h.w+5,h.y);ctx.fill();
    // Mailbox
    if(h.subscriber){
      ctx.fillStyle=h.delivered?'#22c55e':'#facc15';
      ctx.fillRect(h.mbx-4,h.mby-15,8,15);
      ctx.fillRect(h.mbx-8,h.mby-20,16,8);
    }
    // Door
    ctx.fillStyle='#0f172a';ctx.fillRect(h.x+h.w/2-5,h.y+h.h-18,10,18);
  }
  // Obstacles
  for(let o of obstacles){
    if(o.type===0){ctx.fillStyle='#ef4444';ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)} // car
    else if(o.type===1){ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(o.x,o.y,8,0,Math.PI*2);ctx.fill()} // dog
    else{ctx.fillStyle='#6366f1';ctx.fillRect(o.x-5,o.y-12,10,24)} // skater
  }
  // Papers in flight
  ctx.fillStyle='#e2e8f0';
  for(let p of papers){ctx.fillRect(p.x-4,p.y-3,8,6)}
  // Player (bike)
  ctx.fillStyle='#22c55e';
  ctx.fillRect(player.x-player.w/2,player.y-player.h/2,player.w,player.h);
  // Wheels
  ctx.fillStyle='#e2e8f0';
  ctx.beginPath();ctx.arc(player.x-5,player.y+player.h/2,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(player.x+5,player.y+player.h/2,5,0,Math.PI*2);ctx.fill();
}

function loop(){if(gameState!=='play'||paused)return;update();draw();requestAnimationFrame(loop)}
ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
