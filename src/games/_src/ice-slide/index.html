<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ice Slide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
canvas{border:2px solid #6366f1;max-width:100%;display:block}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay.hidden{display:none}
.overlay h2{color:#facc15;font-size:1.5rem;margin-bottom:1rem}
.overlay p{color:#e2e8f0;margin-bottom:1rem;text-align:center;max-width:300px}
button{background:#6366f1;color:#fff;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;margin:0.25rem}
button:hover{opacity:0.9}
.controls{display:flex;gap:0.5rem;margin:0.5rem;justify-content:center;flex-wrap:wrap}
.pause-btn{background:#334155}
.dir-btn{background:#334155;font-size:1.2rem;padding:0.6rem 1rem}
#info{color:#e2e8f0;font-size:0.85rem;margin:0.25rem;text-align:center}
</style>
</head>
<body>
<h1>Ice Slide</h1>
<canvas id="game" width="400" height="400"></canvas>
<div id="info">Level 1 - Slide to the exit!</div>
<div class="controls">
<button class="dir-btn" onclick="slide(0,-1)">Up</button>
<button class="dir-btn" onclick="slide(-1,0)">Left</button>
<button class="dir-btn" onclick="slide(1,0)">Right</button>
<button class="dir-btn" onclick="slide(0,1)">Down</button>
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
</div>
<div class="overlay" id="startOverlay">
<h2>Ice Slide</h2>
<p>Slide on ice until hitting a wall. Reach the green exit square. 15 levels!</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="overOverlay">
<h2 id="winMsg">All Levels Complete!</h2>
<p id="winDetail"></p>
<button onclick="startGame()">Play Again</button>
</div>
<script>
const C=document.getElementById('game'),ctx=C.getContext('2d');
const W=400;
let highScore=0,paused=false,gameStarted=false,gameOver=false;
let level,grid,playerR,playerC,exitR,exitC,GS,moves,sliding;

// 15 levels: 0=ice,1=wall,2=exit,3=start
const LEVELS=[
  {s:8,map:"00000000,01000100,00000000,00010000,00000000,01000010,00000000,00000000",sr:0,sc:0,er:7,ec:7},
  {s:8,map:"00000000,00100010,00000000,01000000,00001000,00000100,00100000,00000000",sr:0,sc:3,er:7,ec:4},
  {s:8,map:"01000010,00000000,00010000,00000000,00100100,00000000,01000010,00000000",sr:0,sc:0,er:7,ec:7},
  {s:8,map:"00000000,00100000,00001000,01000010,00000000,00010000,00000000,00000010",sr:7,sc:0,er:0,ec:7},
  {s:8,map:"00001000,01000000,00000100,00010000,01000010,00000000,00100000,00000000",sr:0,sc:0,er:7,ec:3},
  {s:9,map:"000000000,010001000,000000000,001000100,000010000,010000010,000000000,000100000,000000000",sr:0,sc:4,er:8,ec:4},
  {s:9,map:"000100000,000000100,010000000,000001000,000000000,001000010,000000000,010000000,000000100",sr:0,sc:0,er:8,ec:8},
  {s:8,map:"00000000,01010100,00000000,00101010,00000000,01010100,00000000,00000000",sr:0,sc:0,er:7,ec:7},
  {s:8,map:"00000000,00100100,00000000,01001000,00000010,00100000,00000100,00000000",sr:3,sc:0,er:3,ec:7},
  {s:9,map:"000000000,010010010,000000000,001001000,000000000,010000100,000010000,001000010,000000000",sr:4,sc:0,er:4,ec:8},
  {s:10,map:"0000000000,0100001000,0000000000,0010010000,0000000100,0100000000,0001000010,0000001000,0010000000,0000000000",sr:0,sc:0,er:9,ec:9},
  {s:10,map:"0000100000,0000000000,0010000100,0000010000,0100000000,0000001000,0010000000,0000000010,0001000000,0000000000",sr:0,sc:5,er:9,ec:5},
  {s:10,map:"0000000000,0010010000,0000000100,0100001000,0000000000,0001010000,0000000010,0100000000,0000100000,0000000000",sr:9,sc:0,er:0,ec:9},
  {s:10,map:"0000010000,0010000000,0000001000,0100000010,0000100000,0001000000,0000000100,0010010000,0000000000,0000000000",sr:5,sc:5,er:0,ec:0},
  {s:10,map:"0000000000,0101010100,0000000000,0010101010,0000000000,0101010100,0000000000,0010101010,0000000000,0000000000",sr:0,sc:0,er:9,ec:9}
];

function loadLevel(n){
  let lv=LEVELS[n];
  GS=W/lv.s;
  grid=lv.map.split(',').map(r=>[...r].map(Number));
  playerR=lv.sr;playerC=lv.sc;exitR=lv.er;exitC=lv.ec;
  moves=0;sliding=false;
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  level=0;gameStarted=true;gameOver=false;
  loadLevel(0);draw();updateInfo();
}

function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';}

function slide(dc,dr){
  if(!gameStarted||gameOver||paused||sliding)return;
  let r=playerR,c=playerC;
  while(true){
    let nr=r+dr,nc=c+dc;
    if(nr<0||nr>=grid.length||nc<0||nc>=grid[0].length||grid[nr][nc]===1)break;
    r=nr;c=nc;
    if(r===exitR&&c===exitC)break;
  }
  if(r===playerR&&c===playerC)return;
  // Animate slide
  sliding=true;moves++;
  animateSlide(playerR,playerC,r,c);
}

function animateSlide(fr,fc,tr,tc){
  let steps=Math.max(Math.abs(tr-fr),Math.abs(tc-fc));
  let step=0;
  let dr=tr>fr?1:tr<fr?-1:0;
  let dc=tc>fc?1:tc<fc?-1:0;
  function tick(){
    step++;
    playerR=fr+dr*step;playerC=fc+dc*step;
    draw();
    if(step<steps)requestAnimationFrame(tick);
    else{
      sliding=false;
      if(playerR===exitR&&playerC===exitC){
        level++;
        if(level>=LEVELS.length){endGame();return;}
        setTimeout(()=>{loadLevel(level);draw();updateInfo();},400);
      }
    }
  }
  requestAnimationFrame(tick);
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,W);
  let s=grid.length;
  for(let r=0;r<s;r++)for(let c=0;c<s;c++){
    let x=c*GS,y=r*GS;
    if(grid[r][c]===1){ctx.fillStyle='#475569';ctx.fillRect(x,y,GS,GS);}
    else{ctx.fillStyle='#1e293b';ctx.fillRect(x,y,GS-1,GS-1);}
    // Ice pattern
    if(grid[r][c]===0){
      ctx.strokeStyle='rgba(147,197,253,0.15)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+GS,y+GS);ctx.stroke();
    }
  }
  // Exit
  ctx.fillStyle='#22c55e';ctx.fillRect(exitC*GS+2,exitR*GS+2,GS-4,GS-4);
  ctx.fillStyle='#fff';ctx.font=`${GS/3}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('EXIT',exitC*GS+GS/2,exitR*GS+GS/2);
  // Player
  ctx.fillStyle='#3b82f6';ctx.beginPath();
  ctx.arc(playerC*GS+GS/2,playerR*GS+GS/2,GS/3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#93c5fd';ctx.lineWidth=2;ctx.stroke();
}

function updateInfo(){
  document.getElementById('info').textContent=`Level ${level+1}/15 | Moves: ${moves}`;
}

function endGame(){
  gameOver=true;highScore=Math.max(highScore,level+1);
  document.getElementById('winMsg').textContent='All Levels Complete!';
  document.getElementById('winDetail').textContent=`Total moves: ${moves} | Best level: ${highScore}`;
  document.getElementById('overOverlay').classList.remove('hidden');
  parent.postMessage({type:'ca-save',slug:'ice-slide',state:{highScore}},'*');
}

document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'){togglePause();return;}
  if(e.key==='ArrowUp')slide(0,-1);
  else if(e.key==='ArrowDown')slide(0,1);
  else if(e.key==='ArrowLeft')slide(-1,0);
  else if(e.key==='ArrowRight')slide(1,0);
});

// Touch swipe
let tx,ty;
C.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
C.addEventListener('touchend',e=>{
  let dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){slide(dx>0?1:-1,0);}
  else if(Math.abs(dy)>20){slide(0,dy>0?1:-1);}
},{passive:true});

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.slug==='ice-slide'&&e.data.state)
    highScore=e.data.state.highScore||0;
});
</script>
</body>
</html>
