<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Flash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.4rem;margin:.5rem 0;color:#facc15}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1rem;padding:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{color:#e2e8f0;max-width:400px}
.btn{background:#6366f1;color:#e2e8f0;border:none;padding:.7rem 1.8rem;font-size:1rem;border-radius:.5rem;cursor:pointer;font-family:inherit;margin:.2rem}
.btn:hover{background:#818cf8}
.btn.active{background:#22c55e}
.hidden{display:none!important}
#game{max-width:500px;width:100%;padding:1rem;display:flex;flex-direction:column;align-items:center}
.hud{display:flex;justify-content:space-between;width:100%;font-size:.85rem;margin-bottom:1rem;flex-wrap:wrap;gap:.3rem}
.hud span{background:#1e293b;padding:.25rem .6rem;border-radius:.25rem}
.problem{font-size:3rem;color:#facc15;margin:1.5rem 0;font-weight:700}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:360px}
.choice{background:#1e293b;color:#e2e8f0;border:2px solid #334155;padding:1rem;font-size:1.3rem;border-radius:.5rem;cursor:pointer;font-family:inherit;text-align:center;transition:background .15s,border-color .15s}
.choice:hover{border-color:#6366f1}
.choice.correct{background:#22c55e;border-color:#22c55e;color:#0f172a}
.choice.wrong{background:#ef4444;border-color:#ef4444}
.feedback{font-size:1.2rem;min-height:1.8rem;margin:.5rem 0}
.progress{width:100%;height:6px;background:#1e293b;border-radius:3px;margin-top:1rem;overflow:hidden}
.progress-bar{height:100%;background:#6366f1;transition:width .3s}
.diff-select{display:flex;gap:.5rem;margin:.5rem 0}
</style>
</head>
<body>
<div class="overlay" id="startOverlay">
<h2>Math Flash</h2>
<p>30 random math problems. Pick the right answer from 4 choices. Track your speed and accuracy!</p>
<div class="diff-select">
<button class="btn active" id="dEasy" onclick="setDiff('easy')">Easy</button>
<button class="btn" id="dMed" onclick="setDiff('medium')">Medium</button>
<button class="btn" id="dHard" onclick="setDiff('hard')">Hard</button>
</div>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="endOverlay">
<h2>Results</h2>
<p id="endMsg"></p>
<button class="btn" onclick="showStart()">Play Again</button>
</div>
<div id="game" class="hidden">
<h1>Math Flash</h1>
<div class="hud">
<span>Q: <b id="qNum">1</b>/30</span>
<span>Correct: <b id="correct">0</b></span>
<span>Wrong: <b id="wrong">0</b></span>
<span>Time: <b id="timer">0</b>s</span>
</div>
<div class="problem" id="problem">?</div>
<div class="choices" id="choices"></div>
<div class="feedback" id="feedback"></div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
</div>
<script>
let difficulty='easy',qIndex,correctCount,wrongCount,startTime,timerInterval,problems,answered,highScore=0;
function setDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-select .btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('d'+d.charAt(0).toUpperCase()+d.slice(1)).classList.add('active');
}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function genProblem(){
  let ops,maxN;
  if(difficulty==='easy'){ops=['+','-'];maxN=20;}
  else if(difficulty==='medium'){ops=['+','-','×'];maxN=50;}
  else{ops=['+','-','×','÷'];maxN=100;}
  let op=ops[randInt(0,ops.length-1)],a,b,ans;
  if(op==='+'){a=randInt(1,maxN);b=randInt(1,maxN);ans=a+b;}
  else if(op==='-'){a=randInt(1,maxN);b=randInt(1,a);ans=a-b;}
  else if(op==='×'){a=randInt(1,Math.min(maxN,12));b=randInt(1,Math.min(maxN,12));ans=a*b;}
  else{b=randInt(1,12);ans=randInt(1,12);a=b*ans;}
  return{text:`${a} ${op} ${b}`,answer:ans};
}
function genChoices(ans){
  let choices=new Set([ans]);
  while(choices.size<4){
    let off=randInt(1,Math.max(10,Math.abs(ans)));
    choices.add(ans+(Math.random()<.5?off:-off));
  }
  return[...choices].sort(()=>Math.random()-.5);
}
function showProblem(){
  if(qIndex>=30){endGame();return;}
  let p=problems[qIndex];answered=false;
  document.getElementById('problem').textContent=p.text+' = ?';
  document.getElementById('qNum').textContent=qIndex+1;
  document.getElementById('feedback').textContent='';
  let choices=genChoices(p.answer);
  let cd=document.getElementById('choices');cd.innerHTML='';
  choices.forEach(c=>{
    let btn=document.createElement('button');btn.className='choice';btn.textContent=c;
    btn.onclick=()=>answer(c,p.answer,btn);
    cd.appendChild(btn);
  });
  document.getElementById('progressBar').style.width=((qIndex/30)*100)+'%';
}
function answer(picked,correct,btn){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice').forEach(b=>{
    if(parseInt(b.textContent)===correct)b.classList.add('correct');
    b.style.pointerEvents='none';
  });
  if(picked===correct){correctCount++;document.getElementById('feedback').textContent='Correct!';document.getElementById('feedback').style.color='#22c55e';}
  else{wrongCount++;btn.classList.add('wrong');document.getElementById('feedback').textContent=`Wrong! Answer: ${correct}`;document.getElementById('feedback').style.color='#ef4444';}
  document.getElementById('correct').textContent=correctCount;
  document.getElementById('wrong').textContent=wrongCount;
  qIndex++;
  setTimeout(showProblem,1000);
}
function endGame(){
  clearInterval(timerInterval);
  let elapsed=((Date.now()-startTime)/1000).toFixed(1);
  let pct=Math.round(correctCount/30*100);
  if(correctCount>highScore)highScore=correctCount;
  document.getElementById('endMsg').innerHTML=`Difficulty: ${difficulty}<br>Correct: ${correctCount}/30 (${pct}%)<br>Time: ${elapsed}s<br>High score: ${highScore}/30`;
  document.getElementById('endOverlay').classList.remove('hidden');
  document.getElementById('game').classList.add('hidden');
  saveState();
}
function showStart(){
  document.getElementById('endOverlay').classList.add('hidden');
  document.getElementById('startOverlay').classList.remove('hidden');
}
function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  qIndex=0;correctCount=0;wrongCount=0;
  problems=[];for(let i=0;i<30;i++)problems.push(genProblem());
  startTime=Date.now();
  timerInterval=setInterval(()=>{document.getElementById('timer').textContent=((Date.now()-startTime)/1000|0);},500);
  showProblem();
}
function saveState(){try{window.parent.postMessage({type:'ca-save',slug:'math-flash',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.state){highScore=e.data.state.highScore||0;}});
</script>
</body>
</html>
