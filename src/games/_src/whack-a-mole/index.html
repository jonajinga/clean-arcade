<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0f172a;
    overflow-x: hidden;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: #e2e8f0;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 10px;
  }
  #hud {
    display: flex;
    gap: 1rem;
    padding: 0.5rem;
    font-size: 0.85rem;
    color: #94a3b8;
    flex-wrap: wrap;
    justify-content: center;
  }
  #hud span { color: #e2e8f0; font-weight: 700; }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 360px;
    width: 100%;
    padding: 10px;
  }
  .hole {
    aspect-ratio: 1;
    background: #1e293b;
    border: 2px solid #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .hole.active {
    background: #334155;
  }
  .hole.whacked {
    background: #22c55e22;
    border-color: #22c55e;
  }
  .mole { display: none; }
  .hole.active .mole { display: block; }
  #timer-bar {
    width: 100%;
    max-width: 360px;
    height: 6px;
    background: #1e293b;
    margin-top: 10px;
    overflow: hidden;
  }
  #timer-fill {
    height: 100%;
    background: #ef4444;
    width: 100%;
    transition: width 0.2s linear;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    background: rgba(15,23,42,0.92);
    color: #e2e8f0;
    text-align: center;
    z-index: 10;
  }
  #overlay h1 { font-size: 2rem; }
  #overlay p { font-size: 1rem; color: #94a3b8; }
  .final-score { font-size: 1.25rem; color: #6366f1; }
  .hidden { display: none !important; }
  .pause-wrap { text-align: center; padding: 6px 0; }
  #pauseBtn {
    width: 40px; height: 40px;
    background: #1e293b; color: #e2e8f0;
    border: 1px solid #475569;
    font-size: 16px; cursor: pointer;
  }
  #pauseBtn:hover { background: #334155; }
  .play-again {
    margin-top: 0.5rem;
    padding: 0.5rem 1.5rem;
    background: #6366f1;
    color: #fff;
    border: none;
    font-size: 1rem;
    cursor: pointer;
  }
  .play-again:hover { background: #4f46e5; }
</style>
</head>
<body>
<div id="hud">
  SCORE: <span id="scoreEl">0</span> &nbsp; BEST: <span id="hiEl">0</span> &nbsp; TIME: <span id="timeEl">30</span>
</div>
<div id="board"></div>
<div id="timer-bar"><div id="timer-fill"></div></div>
<div class="pause-wrap" id="pause-wrap">
  <button id="pauseBtn" onclick="window._togglePause()">&#9208;</button>
</div>
<div id="overlay">
  <h1 id="overlayTitle">Whack-a-Mole</h1>
  <p class="final-score hidden" id="finalScore"></p>
  <p id="overlayMsg">Click to Start. Whack the moles!</p>
  <button class="play-again hidden" id="playAgain" onclick="window._restart()">Play Again</button>
</div>
<script>
(function(){
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('scoreEl');
  const hiEl = document.getElementById('hiEl');
  const timeEl = document.getElementById('timeEl');
  const timerFill = document.getElementById('timer-fill');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const finalScoreEl = document.getElementById('finalScore');
  const playAgainBtn = document.getElementById('playAgain');
  const pauseBtn = document.getElementById('pauseBtn');

  const DURATION = 30;
  const HOLES = 9;
  let holes = [];
  let score, highScore = 0, gameState, paused, startTime, remaining;
  let moleTimer, tickTimer, activeMole = -1;

  function buildBoard() {
    boardEl.innerHTML = '';
    holes = [];
    for (let i = 0; i < HOLES; i++) {
      const el = document.createElement('div');
      el.className = 'hole';
      el.dataset.index = i;
      const mole = document.createElement('span');
      mole.className = 'mole';
      mole.textContent = '🐹';
      el.appendChild(mole);
      el.addEventListener('click', function() { whack(i, el); });
      el.addEventListener('touchstart', function(e) { e.preventDefault(); whack(i, el); }, { passive: false });
      boardEl.appendChild(el);
      holes.push(el);
    }
  }

  function init() {
    clearInterval(moleTimer);
    clearInterval(tickTimer);
    score = 0; remaining = DURATION;
    paused = false;
    activeMole = -1;
    scoreEl.textContent = '0';
    timeEl.textContent = DURATION;
    timerFill.style.width = '100%';
    gameState = 'ready';
    overlay.classList.remove('hidden');
    overlayTitle.textContent = 'Whack-a-Mole';
    overlayMsg.textContent = 'Click to Start. Whack the moles!';
    finalScoreEl.classList.add('hidden');
    playAgainBtn.classList.add('hidden');
    pauseBtn.innerHTML = '&#9208;';
    buildBoard();
  }

  function startGame() {
    gameState = 'playing';
    overlay.classList.add('hidden');
    startTime = Date.now();
    showMole();
    tickTimer = setInterval(tick, 200);
  }

  function showMole() {
    if (gameState !== 'playing' || paused) return;
    // hide previous
    if (activeMole >= 0) holes[activeMole].classList.remove('active');
    let next;
    do { next = Math.floor(Math.random() * HOLES); } while (next === activeMole);
    activeMole = next;
    holes[activeMole].classList.remove('whacked');
    holes[activeMole].classList.add('active');
    const delay = Math.max(500, 1200 - score * 20);
    moleTimer = setTimeout(showMole, delay);
  }

  function whack(i, el) {
    if (gameState === 'ready') { startGame(); return; }
    if (gameState !== 'playing' || paused) return;
    if (i === activeMole) {
      score++;
      scoreEl.textContent = score;
      el.classList.remove('active');
      el.classList.add('whacked');
      activeMole = -1;
      clearTimeout(moleTimer);
      setTimeout(showMole, 300);
    }
  }

  function tick() {
    if (paused) return;
    const elapsed = (Date.now() - startTime) / 1000;
    remaining = Math.max(0, DURATION - elapsed);
    timeEl.textContent = Math.ceil(remaining);
    timerFill.style.width = (remaining / DURATION * 100) + '%';
    if (remaining <= 0) gameOver();
  }

  function gameOver() {
    clearInterval(tickTimer);
    clearTimeout(moleTimer);
    gameState = 'over';
    if (activeMole >= 0) holes[activeMole].classList.remove('active');
    if (score > highScore) highScore = score;
    hiEl.textContent = highScore;
    overlayTitle.textContent = 'Time\'s Up!';
    finalScoreEl.textContent = 'Score: ' + score;
    finalScoreEl.classList.remove('hidden');
    overlayMsg.textContent = '';
    playAgainBtn.classList.remove('hidden');
    overlay.classList.remove('hidden');
    save();
  }

  function save() {
    parent.postMessage({ type: 'ca-save', slug: 'whack-a-mole', state: { highScore } }, '*');
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ca-load' && e.data.state) {
      highScore = e.data.state.highScore || 0;
      hiEl.textContent = highScore;
    }
  });

  window._togglePause = function() {
    if (gameState !== 'playing') return;
    paused = !paused;
    pauseBtn.innerHTML = paused ? '&#9654;' : '&#9208;';
    if (paused) {
      clearTimeout(moleTimer);
      save();
    } else {
      startTime = Date.now() - (DURATION - remaining) * 1000;
      showMole();
    }
  };

  window._restart = function() { init(); };

  document.addEventListener('keydown', function(e) {
    if (e.code === 'KeyP' && gameState === 'playing') window._togglePause();
  });

  overlay.addEventListener('click', function(e) {
    if (gameState === 'ready' && e.target.tagName !== 'BUTTON') startGame();
  });

  init();
})();
</script>
</body>
</html>
