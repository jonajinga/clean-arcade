<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Dodge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
canvas{display:block;border:2px solid #6366f1;max-width:100%;touch-action:none}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:1rem}
.overlay h1{font-size:2rem;margin-bottom:.5rem;color:#facc15}
.overlay h2{font-size:1.5rem;margin-bottom:.5rem;color:#facc15}
.overlay p{font-size:1.1rem;margin-bottom:1rem;color:#e2e8f0}
.btn{padding:.75rem 2rem;font-size:1.2rem;border:none;border-radius:0;cursor:pointer;background:#6366f1;color:#fff;font-family:inherit;margin:.25rem}
.btn:hover{background:#4f46e5}
.pause-btn{margin-top:.75rem;padding:.5rem 1.5rem;font-size:1.3rem;border:none;border-radius:0;cursor:pointer;background:#334155;color:#fff;font-family:inherit}
.pause-btn:hover{background:#2563eb}
#score-display{font-size:1rem;margin-top:.5rem;color:#facc15}
.hidden{display:none}
</style>
</head>
<body>
<h1 style="font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center">Car Dodge</h1>
<div id="start-overlay" class="overlay">
<h1>Car Dodge</h1>
<p>Dodge oncoming cars!<br>Arrow keys / swipe to change lanes.<br>Speed increases over time.</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div id="gameover-overlay" class="overlay hidden">
<h2>Game Over</h2>
<p>Score: <span id="final-score">0</span></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
<canvas id="c"></canvas>
<button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸</button>
<div id="score-display">Score: 0</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=360,H=600;
canvas.width=W;canvas.height=H;
const LANE_W=W/3;
const CAR_W=50,CAR_H=80;
const COLORS=['#ef4444','#3b82f6','#22c55e','#facc15','#6366f1'];

let player,enemies,score,speed,paused,running,animId;
let touchStartX=0,touchStartY=0;

function init(){
  player={lane:1,x:0,y:H-CAR_H-30,w:CAR_W,h:CAR_H};
  player.x=LANE_W*player.lane+LANE_W/2-CAR_W/2;
  enemies=[];score=0;speed=3;paused=false;running=true;
  document.getElementById('pause-btn').textContent='⏸';
  document.getElementById('score-display').textContent='Score: 0';
}

function spawnEnemy(){
  /* Find which lanes are blocked near the top of the screen */
  var blocked=[];
  for(var i=0;i<enemies.length;i++){
    if(enemies[i].y<CAR_H*2){blocked.push(enemies[i].lane);}
  }
  /* Pick available lanes — always keep at least one lane open */
  var available=[];
  for(var l=0;l<3;l++){if(blocked.indexOf(l)===-1)available.push(l);}
  if(available.length<=1)return; /* don't spawn if only 1 lane open */
  var lane=available[Math.floor(Math.random()*available.length)];
  enemies.push({lane:lane,x:LANE_W*lane+LANE_W/2-CAR_W/2,y:-CAR_H,w:CAR_W,h:CAR_H,color:COLORS[Math.floor(Math.random()*COLORS.length)]});
}

function drawRoad(){
  ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.setLineDash([20,20]);
  for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(LANE_W*i,0);ctx.lineTo(LANE_W*i,H);ctx.stroke();}
  ctx.setLineDash([]);
}

function drawCar(x,y,w,h,color,isPlayer){
  ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
  ctx.fillStyle=isPlayer?'#e2e8f0':'#0f172a';
  ctx.fillRect(x+5,y+5,w-10,15);
  ctx.fillRect(x+5,y+h-20,w-10,15);
}

function update(){
  score+=Math.floor(speed);
  speed+=0.003;
  if(Math.random()<0.02+speed*0.002)spawnEnemy();
  for(let i=enemies.length-1;i>=0;i--){
    enemies[i].y+=speed;
    if(enemies[i].y>H){enemies.splice(i,1);continue;}
    if(rectsCollide(player,enemies[i])){gameOver();return;}
  }
  document.getElementById('score-display').textContent='Score: '+score;
}

function rectsCollide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function draw(){
  drawRoad();
  drawCar(player.x,player.y,player.w,player.h,'#22c55e',true);
  enemies.forEach(e=>drawCar(e.x,e.y,e.w,e.h,e.color,false));
  ctx.fillStyle='#facc15';ctx.font='bold 18px system-ui';ctx.fillText('Score: '+score,10,25);
}

function loop(){
  if(!running)return;
  if(!paused){update();draw();}
  animId=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  init();
  cancelAnimationFrame(animId);
  loop();
}

function gameOver(){
  running=false;
  document.getElementById('final-score').textContent=score;
  document.getElementById('gameover-overlay').classList.remove('hidden');
  sendSave();
}

function togglePause(){
  if(!running)return;
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(paused)sendSave();
}

function sendSave(){
  window.parent.postMessage({type:'ca-save',slug:'car-dodge',state:{score,speed}},'*');
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    score=e.data.state.score||0;speed=e.data.state.speed||3;
  }
});

function moveLane(dir){
  if(paused||!running)return;
  player.lane=Math.max(0,Math.min(2,player.lane+dir));
  player.x=LANE_W*player.lane+LANE_W/2-CAR_W/2;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')moveLane(-1);
  else if(e.key==='ArrowRight')moveLane(1);
  else if(e.key==='p'||e.key==='P')togglePause();
});

canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>30&&Math.abs(dx)>Math.abs(dy)){moveLane(dx>0?1:-1);}
},{passive:true});
</script>
</body>
</html>
