<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Balloon Flight</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-area{position:relative;width:90vw;max-width:500px;height:450px;border:2px solid #6366f1;background:#0c1222;overflow:hidden}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
.hidden{display:none!important}
canvas{display:block;width:100%;height:100%}
#controls{display:flex;gap:0.5rem;margin-top:0.5rem;justify-content:center}
#fly-btn{background:#3b82f6;padding:1rem 3rem;font-size:1rem}
#pause-btn{background:#334155;padding:0.5rem 1.5rem;font-size:1rem}
</style>
</head>
<body>
<h1>Balloon Flight</h1>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="start-overlay" class="overlay">
    <h2>Balloon Flight</h2>
    <p>Hold to rise, release to descend</p>
    <p style="color:#94a3b8">Navigate through the gaps!</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="end-overlay" class="overlay hidden">
    <h2>Game Over</h2>
    <p id="final-score"></p>
    <p id="hs" style="color:#facc15"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="controls">
  <button id="fly-btn" onmousedown="rising=true" onmouseup="rising=false" ontouchstart="rising=true;event.preventDefault()" ontouchend="rising=false">Rise</button>
  <button id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
let W,H,balloonY,vy,score,highScore=0,pipes,dist,gameOver,paused,rising=false,animId;
const GRAVITY=0.12,LIFT=-0.25,GAP=140,PIPE_W=50,SPEED=2;
function resize(){const r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;W=canvas.width;H=canvas.height}
resize();window.addEventListener('resize',resize);
function startGame(){
  balloonY=H/2;vy=0;score=0;dist=0;pipes=[];gameOver=false;paused=false;
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  document.getElementById('pause-btn').textContent='⏸';
  addPipe();loop();
}
function addPipe(){
  const gapY=80+Math.random()*(H-GAP-160);
  pipes.push({x:W+20,gapY,scored:false});
}
function togglePause(){
  if(gameOver)return;paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(!paused)loop();
}
function loop(){
  if(paused||gameOver)return;
  update();draw();animId=requestAnimationFrame(loop);
}
function update(){
  if(rising)vy+=LIFT;
  vy+=GRAVITY;
  vy=Math.max(-4,Math.min(4,vy));
  balloonY+=vy;
  dist++;
  score=Math.floor(dist/10);
  // Pipes
  pipes.forEach(p=>p.x-=SPEED);
  if(pipes.length===0||pipes[pipes.length-1].x<W-200)addPipe();
  pipes=pipes.filter(p=>p.x>-PIPE_W);
  // Collision
  const bx=60,by=balloonY,br=18;
  if(by<0||by>H){die();return}
  for(const p of pipes){
    if(bx+br>p.x&&bx-br<p.x+PIPE_W){
      if(by-br<p.gapY||by+br>p.gapY+GAP){die();return}
    }
  }
}
function draw(){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1e3a5f');g.addColorStop(1,'#0c1222');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Clouds
  ctx.fillStyle='rgba(148,163,184,0.15)';
  for(let i=0;i<3;i++){
    const cx=((dist*0.3+i*200)%((W+100)))-50;
    ctx.beginPath();ctx.arc(cx,50+i*80,30,0,Math.PI*2);ctx.arc(cx+25,45+i*80,25,0,Math.PI*2);ctx.fill();
  }
  // Pipes
  pipes.forEach(p=>{
    ctx.fillStyle='#22c55e';
    ctx.fillRect(p.x,0,PIPE_W,p.gapY);
    ctx.fillRect(p.x,p.gapY+GAP,PIPE_W,H-p.gapY-GAP);
    ctx.fillStyle='#16a34a';
    ctx.fillRect(p.x-5,p.gapY-20,PIPE_W+10,20);
    ctx.fillRect(p.x-5,p.gapY+GAP,PIPE_W+10,20);
  });
  // Balloon
  ctx.fillStyle='#ef4444';
  ctx.beginPath();ctx.arc(60,balloonY,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#facc15';
  ctx.beginPath();ctx.moveTo(52,balloonY+16);ctx.lineTo(68,balloonY+16);ctx.lineTo(64,balloonY+28);ctx.lineTo(56,balloonY+28);ctx.fill();
  // Strings
  ctx.strokeStyle='#94a3b8';ctx.beginPath();ctx.moveTo(56,balloonY+16);ctx.lineTo(58,balloonY+28);ctx.moveTo(64,balloonY+16);ctx.lineTo(62,balloonY+28);ctx.stroke();
  // HUD
  ctx.fillStyle='#facc15';ctx.font='bold 16px system-ui';
  ctx.fillText('Score: '+score,10,25);
  ctx.fillText('Best: '+highScore,W-100,25);
}
function die(){
  gameOver=true;
  if(score>highScore){highScore=score;saveScore()}
  document.getElementById('final-score').textContent='Distance: '+score;
  document.getElementById('hs').textContent='Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();rising=true}
  if(e.code==='KeyP')togglePause();
});
document.addEventListener('keyup',e=>{if(e.code==='Space')rising=false});
function saveScore(){try{parent.postMessage({type:'ca-save',slug:'balloon-flight',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='balloon-flight'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
