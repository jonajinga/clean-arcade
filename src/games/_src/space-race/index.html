<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Race</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;width:100%;max-width:360px}
canvas{display:block;width:100%;border:2px solid #6366f1;max-width:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
.overlay button,.ctrl-btn{background:#6366f1;color:#fff;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin-top:0.5rem}
.ctrl-btn{background:#334155;margin:0.3rem;font-size:0.9rem;padding:0.4rem 1rem}
#hud{display:flex;justify-content:space-between;width:100%;max-width:360px;padding:0.2rem 0.5rem;font-size:0.85rem}
#controls{display:flex;justify-content:center;gap:0.5rem;margin-top:0.3rem;flex-wrap:wrap}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Space Race</h1>
<div id="hud"><span id="hud-dist">Dist: 0</span><span id="hud-boost">Boost: 100%</span><span id="hud-hi">Hi: 0</span></div>
<div id="game-wrap">
<canvas id="c" width="320" height="480"></canvas>
<div class="overlay" id="start-overlay">
<h2>Space Race</h2>
<p>Dodge asteroids in deep space!</p>
<p>Left/Right to move, Up to boost.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="end-overlay">
<h2>Destroyed!</h2>
<p id="final-dist"></p>
<p id="final-hi"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<div id="controls">
<button class="ctrl-btn" ontouchstart="keys.left=true" ontouchend="keys.left=false" onmousedown="keys.left=true" onmouseup="keys.left=false">◀ Left</button>
<button class="ctrl-btn" ontouchstart="keys.boost=true" ontouchend="keys.boost=false" onmousedown="keys.boost=true" onmouseup="keys.boost=false">▲ Boost</button>
<button class="ctrl-btn" ontouchstart="keys.right=true" ontouchend="keys.right=false" onmousedown="keys.right=true" onmouseup="keys.right=false">Right ▶</button>
<button class="ctrl-btn" id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let ship,asteroids,stars,dist,speed,boost,highScore=0,running=false,paused=false,lastTime;
const keys={left:false,right:false,boost:false};

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='space-race'){highScore=e.data.state?.highScore||0;document.getElementById('hud-hi').textContent='Hi: '+highScore}});

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  ship={x:160,y:400,w:20,h:30};
  asteroids=[];stars=[];dist=0;speed=3;boost=100;running=true;paused=false;
  for(let i=0;i<50;i++)stars.push({x:Math.random()*320,y:Math.random()*480,s:Math.random()*2+0.5});
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

function togglePause(){if(!running)return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused){lastTime=performance.now();requestAnimationFrame(loop)}}

function loop(ts){
  if(!running||paused)return;
  const dt=(ts-lastTime)/16;lastTime=ts;
  let curSpeed=speed;
  if(keys.boost&&boost>0){curSpeed=speed*2;boost=Math.max(0,boost-0.5*dt)}
  else if(!keys.boost){boost=Math.min(100,boost+0.1*dt)}
  speed=3+dist/300;
  dist+=curSpeed*0.2*dt;
  // input
  if(keys.left)ship.x-=4*dt;
  if(keys.right)ship.x+=4*dt;
  ship.x=Math.max(5,Math.min(315-ship.w,ship.x));
  // stars
  stars.forEach(s=>{s.y+=s.s*curSpeed*0.3*dt;if(s.y>480){s.y=-5;s.x=Math.random()*320}});
  // asteroids
  if(Math.random()<0.03*dt*(1+dist/500))asteroids.push({x:Math.random()*280+20,y:-30,r:8+Math.random()*20,rot:Math.random()*Math.PI*2,rv:(Math.random()-0.5)*0.05});
  asteroids.forEach(a=>{a.y+=curSpeed*0.8*dt;a.rot+=a.rv*dt});
  asteroids=asteroids.filter(a=>a.y<520);
  // collision
  let dead=false;
  const sx=ship.x+ship.w/2,sy=ship.y+ship.h/2;
  asteroids.forEach(a=>{
    const dx=sx-a.x,dy=sy-a.y;
    if(Math.sqrt(dx*dx+dy*dy)<a.r+10)dead=true;
  });
  if(dead){endGame();return}
  draw(curSpeed);
  document.getElementById('hud-dist').textContent='Dist: '+Math.floor(dist);
  document.getElementById('hud-boost').textContent='Boost: '+Math.floor(boost)+'%';
  requestAnimationFrame(loop);
}

function draw(curSpeed){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,320,480);
  // stars
  stars.forEach(s=>{ctx.fillStyle=`rgba(226,232,240,${s.s/3})`;ctx.fillRect(s.x,s.y,s.s,s.s)});
  // asteroids
  asteroids.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    ctx.fillStyle='#64748b';ctx.beginPath();
    for(let i=0;i<7;i++){
      const angle=(i/7)*Math.PI*2;const r=a.r*(0.7+Math.sin(i*2)*0.3);
      i===0?ctx.moveTo(Math.cos(angle)*r,Math.sin(angle)*r):ctx.lineTo(Math.cos(angle)*r,Math.sin(angle)*r);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#475569';ctx.beginPath();ctx.arc(-a.r*0.2,-a.r*0.2,a.r*0.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // ship
  ctx.fillStyle='#3b82f6';
  ctx.beginPath();ctx.moveTo(ship.x+ship.w/2,ship.y);ctx.lineTo(ship.x,ship.y+ship.h);ctx.lineTo(ship.x+ship.w,ship.y+ship.h);ctx.closePath();ctx.fill();
  ctx.fillStyle='#6366f1';ctx.fillRect(ship.x+ship.w/2-3,ship.y+5,6,ship.h-10);
  // engine flame
  if(curSpeed>speed||keys.boost){
    ctx.fillStyle='#facc15';ctx.beginPath();ctx.moveTo(ship.x+5,ship.y+ship.h);ctx.lineTo(ship.x+ship.w/2,ship.y+ship.h+15+Math.random()*10);ctx.lineTo(ship.x+ship.w-5,ship.y+ship.h);ctx.fill();
  }else{
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.moveTo(ship.x+7,ship.y+ship.h);ctx.lineTo(ship.x+ship.w/2,ship.y+ship.h+8+Math.random()*5);ctx.lineTo(ship.x+ship.w-7,ship.y+ship.h);ctx.fill();
  }
  // boost bar
  ctx.fillStyle='#334155';ctx.fillRect(10,460,100,10);
  ctx.fillStyle=boost>30?'#22c55e':'#ef4444';ctx.fillRect(10,460,boost,10);
}

function endGame(){
  running=false;
  const score=Math.floor(dist);
  if(score>highScore){highScore=score;parent.postMessage({type:'ca-save',slug:'space-race',state:{highScore}},'*')}
  document.getElementById('hud-hi').textContent='Hi: '+highScore;
  document.getElementById('final-dist').textContent='Distance: '+score;
  document.getElementById('final-hi').textContent='Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if(e.key==='ArrowUp'||e.key==='w')keys.boost=true;
  if(e.key==='p'||e.key==='P')togglePause();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
  if(e.key==='ArrowUp'||e.key==='w')keys.boost=false;
});
</script>
</body>
</html>
