<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Train Set</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
canvas{border:2px solid #6366f1;display:block;max-width:100%;cursor:pointer}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#e2e8f0}
.overlay h2{font-size:1.5rem;margin-bottom:1rem;color:#facc15}
.overlay p{margin:0.3rem 0}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.5rem 1rem;font-size:0.85rem;cursor:pointer;border-radius:0;margin:0.2rem}
button:hover{opacity:0.85}
.pause-btn{background:#334155}
.hud{display:flex;gap:0.8rem;font-size:0.8rem;margin:0.25rem 0;flex-wrap:wrap;justify-content:center}
.hud span{color:#22c55e}
#wrap{position:relative;display:inline-block}
.controls{display:flex;gap:0.3rem;margin:0.3rem 0;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
<h1>Train Set</h1>
<div class="hud">
  <span id="scoreDisp">Score: 0</span>
  <span id="modeDisp">Sandbox</span>
  <span id="hScore">Best: 0</span>
</div>
<div id="wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div class="overlay" id="startOverlay">
    <h2>Train Set</h2>
    <p>Place tracks, connect stations!</p>
    <p>Select a piece type and click to place.</p>
    <button onclick="startGame('sandbox')">Sandbox</button>
    <button onclick="startGame('challenge')">Challenge</button>
  </div>
</div>
<div class="controls" id="pieceBtns"></div>
<div class="controls">
  <button class="pause-btn" id="pauseBtn" onclick="togglePause()" style="display:none">⏸</button>
  <button onclick="clearTrack()" id="clearBtn" style="display:none;background:#ef4444">Clear</button>
  <button onclick="runTrain()" id="runBtn" style="display:none;background:#22c55e">Run Train</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=400,H=400,GRID=10,CELL=W/GRID;
// pieces: 0=empty, 1=horiz, 2=vert, 3=curve-TR, 4=curve-BR, 5=curve-BL, 6=curve-TL, 7=station
const PIECES=['Empty','Horiz','Vert','Curve TR','Curve BR','Curve BL','Curve TL','Station'];
let grid,selected=1,score=0,highScore=0,paused=false,running=false,mode='sandbox';
let train=null,trainTimer=null;

function startGame(m){
  document.getElementById('startOverlay').style.display='none';
  ['pauseBtn','clearBtn','runBtn'].forEach(id=>document.getElementById(id).style.display='inline-block');
  mode=m;grid=Array.from({length:GRID},()=>Array(GRID).fill(0));
  score=0;train=null;paused=false;running=true;
  if(mode==='challenge'){
    // place 2 stations randomly
    for(let i=0;i<2;i++){
      let x,y;do{x=Math.floor(Math.random()*GRID);y=Math.floor(Math.random()*GRID);}while(grid[y][x]!==0);
      grid[y][x]=7;
    }
  }
  document.getElementById('modeDisp').textContent=mode==='sandbox'?'Sandbox':'Challenge';
  buildPieceBtns();updateHUD();draw();
}

function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';}
document.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P')togglePause();});

function buildPieceBtns(){
  const p=document.getElementById('pieceBtns');p.innerHTML='';
  PIECES.forEach((name,i)=>{
    if(i===0)return;
    const b=document.createElement('button');b.textContent=name;
    b.style.background=i===selected?'#facc15':'#334155';
    b.style.color=i===selected?'#0f172a':'#e2e8f0';
    b.onclick=()=>{selected=i;buildPieceBtns();};
    p.appendChild(b);
  });
}

canvas.addEventListener('click',e=>{
  if(!running||paused||train)return;
  const r=canvas.getBoundingClientRect();
  const gx=Math.floor((e.clientX-r.left)/r.width*GRID);
  const gy=Math.floor((e.clientY-r.top)/r.height*GRID);
  if(gx<0||gx>=GRID||gy<0||gy>=GRID)return;
  grid[gy][gx]=selected;draw();
});

function clearTrack(){grid=Array.from({length:GRID},()=>Array(GRID).fill(0));train=null;draw();}

function runTrain(){
  if(train)return;
  // find first track piece
  let sx=-1,sy=-1;
  for(let y=0;y<GRID&&sx<0;y++)for(let x=0;x<GRID&&sx<0;x++){
    if(grid[y][x]>=1&&grid[y][x]<=6){sx=x;sy=y;}
  }
  if(sx<0)return;
  train={x:sx,y:sy,dir:'right',visited:new Set(),stationsHit:0};
  trainStep();
}

function trainStep(){
  if(!train||paused)return;
  const key=train.x+','+train.y;
  if(train.visited.has(key)&&grid[train.y][train.x]!==7){train=null;draw();return;}
  train.visited.add(key);
  const cell=grid[train.y][train.x];
  if(cell===7){train.stationsHit++;score+=10;if(score>highScore){highScore=score;saveState();}updateHUD();}
  // determine next direction
  let nd=train.dir;
  if(cell===3){nd=train.dir==='down'?'right':train.dir==='left'?'up':train.dir;}
  if(cell===4){nd=train.dir==='up'?'right':train.dir==='left'?'down':train.dir;}
  if(cell===5){nd=train.dir==='up'?'left':train.dir==='right'?'down':train.dir;}
  if(cell===6){nd=train.dir==='down'?'left':train.dir==='right'?'up':train.dir;}
  let nx=train.x,ny=train.y;
  if(nd==='right')nx++;if(nd==='left')nx--;if(nd==='down')ny++;if(nd==='up')ny--;
  if(nx<0||nx>=GRID||ny<0||ny>=GRID||grid[ny][nx]===0){train=null;draw();return;}
  train.x=nx;train.y=ny;train.dir=nd;
  draw();
  setTimeout(trainStep,300);
}

function updateHUD(){
  document.getElementById('scoreDisp').textContent='Score: '+score;
  document.getElementById('hScore').textContent='Best: '+highScore;
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      ctx.strokeStyle='#1e293b';ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);
      const p=grid[y][x];if(p===0)continue;
      const cx=x*CELL+CELL/2,cy=y*CELL+CELL/2;
      ctx.strokeStyle='#6b7280';ctx.lineWidth=4;
      if(p===1){ctx.beginPath();ctx.moveTo(x*CELL,cy);ctx.lineTo(x*CELL+CELL,cy);ctx.stroke();}
      if(p===2){ctx.beginPath();ctx.moveTo(cx,y*CELL);ctx.lineTo(cx,y*CELL+CELL);ctx.stroke();}
      if(p===3){ctx.beginPath();ctx.arc(x*CELL+CELL,y*CELL,CELL,Math.PI*0.5,Math.PI);ctx.stroke();}
      if(p===4){ctx.beginPath();ctx.arc(x*CELL+CELL,y*CELL+CELL,CELL,Math.PI,Math.PI*1.5);ctx.stroke();}
      if(p===5){ctx.beginPath();ctx.arc(x*CELL,y*CELL+CELL,CELL,Math.PI*1.5,Math.PI*2);ctx.stroke();}
      if(p===6){ctx.beginPath();ctx.arc(x*CELL,y*CELL,CELL,0,Math.PI*0.5);ctx.stroke();}
      if(p===7){
        ctx.fillStyle='#ef4444';ctx.fillRect(x*CELL+5,y*CELL+5,CELL-10,CELL-10);
        ctx.fillStyle='#fff';ctx.font='bold 12px system-ui';ctx.textAlign='center';
        ctx.fillText('S',cx,cy+4);ctx.textAlign='start';
      }
      ctx.lineWidth=1;
    }
  }
  if(train){
    ctx.fillStyle='#facc15';
    ctx.fillRect(train.x*CELL+8,train.y*CELL+8,CELL-16,CELL-16);
  }
}

function saveState(){try{parent.postMessage({type:'ca-save',slug:'train-set',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.slug==='train-set'){
    if(e.data.state&&e.data.state.highScore)highScore=e.data.state.highScore;updateHUD();
  }
});
</script>
</body>
</html>
