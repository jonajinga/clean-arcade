<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Endless Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1rem}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#info{display:flex;gap:1.5rem;margin-bottom:.5rem;font-size:.9rem}
#info span{color:#6366f1}
canvas{display:block;border:2px solid #6366f1;max-width:100%;touch-action:none}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{font-size:1.1rem}
.overlay .score-line{color:#22c55e;font-size:1.3rem}
.btn{padding:.75rem 2rem;font-size:1.1rem;border:none;border-radius:0;cursor:pointer;background:#6366f1;color:#fff;font-weight:600}
.btn:hover{background:#4f46e5}
#pauseBtn{margin-top:.75rem;padding:.5rem 1.5rem;font-size:1.3rem;background:#3b82f6;color:#fff;border:none;border-radius:0;cursor:pointer}
.game-controls{display:flex;gap:4px;justify-content:center;margin:6px auto;flex-wrap:wrap}
.game-controls button{width:48px;height:40px;font-size:1.1rem;background:#334155;color:#e2e8f0;border:none;cursor:pointer}
.game-controls button:active{background:#475569}
.game-controls .wide-btn{width:auto;padding:0 16px;font-size:0.9rem}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Endless Runner</h1>
<div id="info">
  <span>Score: <b id="scoreEl">0</b></span>
  <span>Coins: <b id="coinsEl">0</b></span>
  <span>High: <b id="highEl">0</b></span>
</div>
<canvas id="c"></canvas>
<div class="game-controls">
<button class="wide-btn" ontouchstart="event.preventDefault();jump()" onclick="jump()">JUMP</button>
</div>
<button id="pauseBtn" class="hidden">⏸</button>

<div id="startOverlay" class="overlay">
  <h2>Endless Runner</h2>
  <p>Jump over obstacles, collect coins!</p>
  <p style="font-size:.85rem;color:#94a3b8">Space/Tap to jump. Double tap for double jump.</p>
  <button class="btn" id="playBtn">Play</button>
</div>
<div id="overOverlay" class="overlay hidden">
  <h2>Game Over</h2>
  <p class="score-line" id="overScore"></p>
  <p class="score-line" id="overHigh"></p>
  <button class="btn" id="replayBtn">Play Again</button>
</div>

<script>
const SLUG='endless-runner';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,GROUND;

function resize(){
  W=Math.min(window.innerWidth-32,600);
  H=Math.round(W*0.5);
  canvas.width=W;canvas.height=H;
  GROUND=H-40;
}
resize();
window.addEventListener('resize',()=>{resize();});

const GRAVITY=0.6;
const JUMP_FORCE=-12;
let player,obstacles,coins,particles;
let speed,distance,coinCount,score,highScore=0;
let paused=false,running=false,lastTime;
let jumpCount,canDoubleJump;

function initGame(){
  player={x:80,y:GROUND,w:30,h:40,vy:0,grounded:true};
  obstacles=[];coins=[];particles=[];
  speed=4;distance=0;coinCount=0;score=0;
  jumpCount=0;canDoubleJump=true;
  spawnTimer=0;coinTimer=0;
  updateUI();
}

function updateUI(){
  score=Math.floor(distance/10)+coinCount*10;
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('coinsEl').textContent=coinCount;
  document.getElementById('highEl').textContent=highScore;
}

let spawnTimer=0,coinTimer=0;

function jump(){
  if(!running||paused)return;
  if(player.grounded){
    player.vy=JUMP_FORCE;
    player.grounded=false;
    jumpCount=1;
  }else if(jumpCount<2){
    player.vy=JUMP_FORCE*0.85;
    jumpCount=2;
  }
}

function update(dt){
  if(paused||!running)return;

  distance+=speed*dt*60;
  speed=4+distance/2000;

  // Player physics
  player.vy+=GRAVITY;
  player.y+=player.vy;
  if(player.y>=GROUND){
    player.y=GROUND;player.vy=0;player.grounded=true;jumpCount=0;
  }

  // Spawn obstacles
  spawnTimer-=dt;
  if(spawnTimer<=0){
    const types=[
      {w:25,h:35,color:'#ef4444'},  // barrier
      {w:50,h:20,color:'#ef4444'},  // low wall
      {w:20,h:50,color:'#ef4444'},  // tall
    ];
    const t=types[Math.random()*types.length|0];
    obstacles.push({x:W+20,y:GROUND-t.h+player.h,w:t.w,h:t.h,color:t.color});
    spawnTimer=1.5+Math.random()*2-distance/8000;
    if(spawnTimer<0.7)spawnTimer=0.7;
  }

  // Spawn coins
  coinTimer-=dt;
  if(coinTimer<=0){
    const cy=GROUND-50-Math.random()*60;
    coins.push({x:W+20,y:cy,r:8,collected:false});
    coinTimer=0.8+Math.random()*1.5;
  }

  // Move obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=speed*dt*60;
    if(obstacles[i].x<-60)obstacles.splice(i,1);
  }

  // Move coins
  for(let i=coins.length-1;i>=0;i--){
    coins[i].x-=speed*dt*60;
    if(coins[i].x<-20)coins.splice(i,1);
  }

  // Collision with obstacles
  const px=player.x,py=player.y-player.h,pw=player.w,ph=player.h;
  for(const o of obstacles){
    if(px+pw>o.x+4&&px<o.x+o.w-4&&py+ph>o.y+4&&py<o.y+o.h-4){
      gameOver();return;
    }
  }

  // Coin collection
  for(const c of coins){
    if(c.collected)continue;
    const dx=(px+pw/2)-c.x,dy=(py+ph/2)-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<c.r+pw/2){
      c.collected=true;coinCount++;
      for(let i=0;i<6;i++){
        particles.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:30,color:'#facc15'});
      }
    }
  }
  coins=coins.filter(c=>!c.collected);

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  updateUI();
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='#475569';
  for(let i=0;i<20;i++){
    const sx=(i*137+distance*0.1*(i%3+1))%W;
    const sy=(i*73)%((GROUND-60));
    ctx.fillRect(sx,sy,2,2);
  }

  // Mountains
  ctx.fillStyle='#1e293b';
  ctx.beginPath();ctx.moveTo(0,GROUND);
  for(let x=0;x<=W;x+=40){
    const h=Math.sin((x+distance*0.2)*0.01)*30+Math.sin((x+distance*0.2)*0.005)*20;
    ctx.lineTo(x,GROUND-80-h);
  }
  ctx.lineTo(W,GROUND);ctx.fill();

  // Ground
  ctx.fillStyle='#334155';
  ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle='#22c55e';
  ctx.fillRect(0,GROUND,W,3);

  // Ground details
  ctx.fillStyle='#475569';
  for(let i=0;i<15;i++){
    const gx=((i*80-distance*speed*0.5)%W+W)%W;
    ctx.fillRect(gx,GROUND+10,20,2);
  }

  // Obstacles
  for(const o of obstacles){
    ctx.fillStyle=o.color;
    ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(o.x+2,o.y+2,o.w-4,4);
  }

  // Coins
  for(const c of coins){
    ctx.fillStyle='#facc15';
    ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a16207';
    ctx.font='bold 10px system-ui';ctx.textAlign='center';
    ctx.fillText('$',c.x,c.y+4);
  }

  // Player
  const py=player.y-player.h;
  // Body
  ctx.fillStyle='#6366f1';
  ctx.fillRect(player.x+5,py+12,20,20);
  // Head
  ctx.fillStyle='#e2e8f0';
  ctx.beginPath();ctx.arc(player.x+15,py+8,8,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#0f172a';
  ctx.fillRect(player.x+17,py+6,3,3);
  // Legs (animated)
  ctx.fillStyle='#6366f1';
  const legOff=player.grounded?Math.sin(distance*0.3)*5:3;
  ctx.fillRect(player.x+7,py+32,6,8+legOff);
  ctx.fillRect(player.x+17,py+32,6,8-legOff);

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;

  // Distance marker
  ctx.fillStyle='#94a3b8';ctx.font='12px system-ui';ctx.textAlign='left';
  ctx.fillText(Math.floor(distance)+'m',10,20);
}

function gameOver(){
  running=false;
  score=Math.floor(distance/10)+coinCount*10;
  if(score>highScore)highScore=score;
  updateUI();
  document.getElementById('overScore').textContent=`Score: ${score} (${Math.floor(distance)}m + ${coinCount} coins)`;
  document.getElementById('overHigh').textContent='High Score: '+highScore;
  document.getElementById('overOverlay').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.add('hidden');
  saveState();
}

function loop(t){
  if(!running)return;
  const dt=Math.min((t-lastTime)/1000,0.05);
  lastTime=t;
  if(!paused){update(dt);draw();}
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  resize();initGame();
  running=true;paused=false;
  document.getElementById('pauseBtn').textContent='⏸';
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='ArrowUp'){jump();e.preventDefault();}
  if((e.key==='p'||e.key==='P')&&running)document.getElementById('pauseBtn').click();
});

canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
canvas.addEventListener('click',()=>jump());

document.getElementById('pauseBtn').addEventListener('click',()=>{
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
  if(!paused){lastTime=performance.now();requestAnimationFrame(loop);}
  else saveState();
});

document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('replayBtn').addEventListener('click',startGame);

function saveState(){window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore}},'*');}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    highScore=e.data.state.highScore||0;
    document.getElementById('highEl').textContent=highScore;
  }
});
</script>
</body>
</html>
