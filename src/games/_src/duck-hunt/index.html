<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duck Hunt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.hud{display:flex;gap:1.5rem;font-size:0.85rem;margin:0.25rem;flex-wrap:wrap;justify-content:center}
canvas{border:2px solid #6366f1;display:block;cursor:crosshair}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:1rem;color:#facc15}
.overlay p{margin-bottom:1rem;font-size:1rem;text-align:center}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{background:#4f46e5}
.hidden{display:none}
.pause-btn{background:#334155;margin:0.25rem;padding:0.5rem 1rem;font-size:0.85rem}
</style>
</head>
<body>
<h1>Duck Hunt</h1>
<div class="hud">
<span>Round: <strong id="roundEl">1</strong>/10</span>
<span>Score: <strong id="scoreEl">0</strong></span>
<span>Hits: <strong id="hitsEl">0</strong></span>
<span>Shots: <strong id="shotsEl">0</strong></span>
<span>Accuracy: <strong id="accEl">0</strong>%</span>
</div>
<canvas id="canvas"></canvas>
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>

<div class="overlay" id="startOverlay">
<h2>Duck Hunt</h2>
<p>Click/tap to shoot ducks! 10 rounds of 3 ducks each. Track your accuracy!</p>
<button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="overOverlay">
<h2 id="overTitle">Game Over</h2>
<p id="overMsg"></p>
<button onclick="startGame()">Play Again</button>
</div>

<script>
let ducks,score,round,hits,shots,paused,gameOver,animId,roundTimer,highScore=0;
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let cw,ch;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='duck-hunt'){const s=e.data.state;if(s)highScore=s.highScore||0}});
function save(){try{parent.postMessage({type:'ca-save',slug:'duck-hunt',state:{highScore}},'*')}catch(e){}}

document.addEventListener('keydown',e=>{if(e.key==='P'||e.key==='p')togglePause()});

function resize(){
cw=Math.min(window.innerWidth-4,500);ch=Math.min(window.innerHeight-130,400);
canvas.width=cw;canvas.height=ch;
}
window.addEventListener('resize',resize);

function startGame(){
resize();ducks=[];score=0;round=0;hits=0;shots=0;paused=false;gameOver=false;
document.getElementById('startOverlay').classList.add('hidden');
document.getElementById('overOverlay').classList.add('hidden');
nextRound();
}

function nextRound(){
round++;
if(round>10){endGame();return}
ducks=[];
for(let i=0;i<3;i++){
const fromLeft=Math.random()>0.5;
const angle=(Math.random()*60-30)*Math.PI/180;
const speed=2+round*0.3+Math.random();
ducks.push({
x:fromLeft?-30:cw+30,
y:ch*0.3+Math.random()*ch*0.4,
vx:(fromLeft?1:-1)*speed*Math.cos(angle),
vy:speed*Math.sin(angle),
alive:true,size:30,hitAnim:0,
wingPhase:Math.random()*Math.PI*2
});
}
roundTimer=0;
updateHUD();
if(!animId)gameLoop();
}

function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';if(!paused)gameLoop()}

function gameLoop(){
if(paused||gameOver){animId=null;return}
update();render();
animId=requestAnimationFrame(gameLoop);
}

function update(){
roundTimer++;
for(const d of ducks){
if(!d.alive){d.hitAnim++;continue}
d.x+=d.vx;d.y+=d.vy;
d.wingPhase+=0.15;
// Bounce off top/bottom
if(d.y<20||d.y>ch-20)d.vy*=-1;
// Bounce off sides sometimes
if((d.x<-50||d.x>cw+50)&&roundTimer<300){
d.vx*=-1;d.x=Math.max(-30,Math.min(cw+30,d.x));
}
}
// Check if round is over (all hit or all escaped)
const allDone=ducks.every(d=>!d.alive||d.hitAnim>30||d.x<-60||d.x>cw+60);
if(allDone&&roundTimer>60){
setTimeout(nextRound,500);
animId=null;return;
}
}

function render(){
// Sky gradient
const grad=ctx.createLinearGradient(0,0,0,ch);
grad.addColorStop(0,'#0f172a');grad.addColorStop(0.7,'#1e293b');grad.addColorStop(1,'#22543d');
ctx.fillStyle=grad;ctx.fillRect(0,0,cw,ch);
// Ground
ctx.fillStyle='#166534';ctx.fillRect(0,ch*0.85,cw,ch*0.15);
// Trees
for(let i=0;i<5;i++){
ctx.fillStyle='#14532d';
ctx.beginPath();ctx.moveTo(i*cw/4,ch*0.85);ctx.lineTo(i*cw/4+30,ch*0.55);ctx.lineTo(i*cw/4+60,ch*0.85);ctx.fill();
}
// Ducks
for(const d of ducks){
if(d.hitAnim>0){
// Falling
ctx.save();ctx.globalAlpha=Math.max(0,1-d.hitAnim/30);
ctx.fillStyle='#ef4444';ctx.font='30px system-ui';ctx.textAlign='center';
ctx.fillText('💥',d.x,d.y+d.hitAnim*2);
ctx.restore();continue;
}
if(!d.alive)continue;
// Duck body
ctx.save();ctx.translate(d.x,d.y);
if(d.vx<0)ctx.scale(-1,1);
// Body
ctx.fillStyle='#854d0e';
ctx.beginPath();ctx.ellipse(0,0,d.size*0.6,d.size*0.4,0,0,Math.PI*2);ctx.fill();
// Head
ctx.fillStyle='#166534';
ctx.beginPath();ctx.arc(d.size*0.5,d.size*-0.2,d.size*0.25,0,Math.PI*2);ctx.fill();
// Beak
ctx.fillStyle='#facc15';
ctx.beginPath();ctx.moveTo(d.size*0.7,-d.size*0.3);ctx.lineTo(d.size*0.95,-d.size*0.15);ctx.lineTo(d.size*0.7,-d.size*0.1);ctx.fill();
// Wing
const wingY=Math.sin(d.wingPhase)*d.size*0.3;
ctx.fillStyle='#92400e';
ctx.beginPath();ctx.ellipse(-d.size*0.1,wingY,d.size*0.4,d.size*0.15,wingY*0.05,0,Math.PI*2);ctx.fill();
// Eye
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(d.size*0.55,-d.size*0.25,3,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(d.size*0.56,-d.size*0.25,1.5,0,Math.PI*2);ctx.fill();
ctx.restore();
}
}

canvas.addEventListener('click',e=>{
if(paused||gameOver)return;
shots++;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left)*(cw/rect.width),my=(e.clientY-rect.top)*(ch/rect.height);
// Flash
ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(0,0,cw,ch);
let hit=false;
for(const d of ducks){
if(!d.alive)continue;
if(Math.hypot(mx-d.x,my-d.y)<d.size*0.8){
d.alive=false;d.hitAnim=1;hits++;score+=100+round*10;hit=true;break;
}
}
if(!hit){
// Miss indicator
ctx.strokeStyle='rgba(239,68,68,0.5)';ctx.lineWidth=2;
ctx.beginPath();ctx.arc(mx,my,15,0,Math.PI*2);ctx.stroke();
}
updateHUD();
});

function updateHUD(){
document.getElementById('roundEl').textContent=Math.min(round,10);
document.getElementById('scoreEl').textContent=score;
document.getElementById('hitsEl').textContent=hits;
document.getElementById('shotsEl').textContent=shots;
document.getElementById('accEl').textContent=shots?Math.round(hits/shots*100):0;
}

function endGame(){
gameOver=true;cancelAnimationFrame(animId);animId=null;
highScore=Math.max(highScore,score);save();
const acc=shots?Math.round(hits/shots*100):0;
setTimeout(()=>{
document.getElementById('overTitle').textContent='Hunt Complete!';
document.getElementById('overMsg').textContent=`Score: ${score}\nHits: ${hits}/30 | Accuracy: ${acc}%\nBest: ${highScore}`;
document.getElementById('overOverlay').classList.remove('hidden');
},300);
}
</script>
</body>
</html>
