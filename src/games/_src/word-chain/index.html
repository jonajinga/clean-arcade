<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Chain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1rem;touch-action:manipulation}
h1{font-size:1.5rem;margin:.5rem 0}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{font-size:1.1rem;max-width:400px;text-align:center;line-height:1.5}
.overlay .score{font-size:1.4rem;color:#22c55e}
.btn{padding:12px 32px;font-size:1.1rem;border:none;border-radius:0;cursor:pointer;background:#6366f1;color:#fff;font-weight:600}
.btn:hover{background:#4f46e5}
.hidden{display:none!important}
#hud{display:flex;gap:2rem;margin:.5rem 0;font-size:1rem;flex-wrap:wrap;justify-content:center}
#hud span{color:#facc15}
#game{max-width:500px;width:100%;margin:0 auto}
#chain{min-height:200px;max-height:300px;overflow-y:auto;background:#1e293b;border-radius:0;padding:.75rem;margin:.5rem 0;display:flex;flex-direction:column;gap:4px}
.word-item{padding:4px 8px;border-radius:0;font-size:1rem}
.word-item.player{background:#6366f1;color:#fff;align-self:flex-end;text-align:right}
.word-item.cpu{background:#334155;color:#e2e8f0;align-self:flex-start}

#timer-fill{height:100%;background:#22c55e;transition:width 0.1s linear;width:100%}
#input-row{display:flex;gap:8px}
#word-input{flex:1;padding:10px;font-size:1rem;border:2px solid #334155;border-radius:0;background:#1e293b;color:#e2e8f0;outline:none}
#word-input:focus{border-color:#6366f1}
#submit-btn{padding:10px 20px;font-size:1rem;border:none;border-radius:0;background:#22c55e;color:#0f172a;font-weight:600;cursor:pointer}
#message{text-align:center;margin:.5rem 0;min-height:1.5rem;color:#ef4444;font-size:.9rem}
#last-letter{font-size:1.2rem;text-align:center;color:#facc15;margin:.25rem 0}
</style>
</head>
<body>
<h1>Word Chain</h1>
<div id="hud"><div>Score: <span id="score">0</span></div><div>Round: <span id="round">0</span></div><div>High: <span id="high">0</span></div></div>
<div id="game">
<div id="last-letter"></div>
<div id="timer-bar"><div id="timer-fill"></div></div>
<div id="chain"></div>
<div id="message"></div>
<div id="input-row">
<input type="text" id="word-input" placeholder="Type a word..." autocomplete="off" autocapitalize="off">
<button id="submit-btn" onclick="submitWord()">Go</button>
</div>
</div>
<div id="start-overlay" class="overlay">
<h2>Word Chain</h2>
<p>Take turns with the CPU. Each word must start with the last letter of the previous word. 10 seconds per turn. No repeats!</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div id="end-overlay" class="overlay hidden">
<h2 id="end-title">Game Over</h2>
<p class="score" id="end-score"></p>
<p id="end-msg"></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>

workplace","workshop","wrap","writer","writing","yellow","zone"];

let used,chain,score,highScore=0,round,lastLetter,timer,timerInterval,playerTurn;

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  used=new Set();chain=[];score=0;round=0;playerTurn=true;lastLetter='';
  document.getElementById('chain').innerHTML='';
  document.getElementById('message').textContent='';
  document.getElementById('last-letter').textContent='You go first! Any word.';
  document.getElementById('word-input').value='';
  document.getElementById('word-input').focus();
  updateHUD();
  startTimer();
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('round').textContent=round;
  document.getElementById('high').textContent=highScore;
}

function startTimer(){
  clearInterval(timerInterval);
  timer=10;
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('timer-fill').style.background='#22c55e';
  timerInterval=setInterval(()=>{
    timer-=0.1;
    let pct=Math.max(0,timer/10*100);
    document.getElementById('timer-fill').style.width=pct+'%';
    if(timer<3)document.getElementById('timer-fill').style.background='#ef4444';
    else if(timer<5)document.getElementById('timer-fill').style.background='#facc15';
    if(timer<=0){
      clearInterval(timerInterval);
      if(playerTurn)endGame('Time\'s up!');
      else endGame('CPU couldn\'t think of a word. You win!');
    }
  },100);
}

function addWord(word,isPlayer){
  let div=document.createElement('div');
  div.className='word-item '+(isPlayer?'player':'cpu');
  div.textContent=word;
  let chainEl=document.getElementById('chain');
  chainEl.appendChild(div);
  chainEl.scrollTop=chainEl.scrollHeight;
}

function submitWord(){
  if(!playerTurn)return;
  let input=document.getElementById('word-input');
  let word=input.value.trim().toLowerCase();
  input.value='';
  if(!word){return}
  if(!WORDS.includes(word)){
    document.getElementById('message').textContent='Not a valid word!';return;
  }
  if(used.has(word)){
    document.getElementById('message').textContent='Already used!';return;
  }
  if(lastLetter&&word[0]!==lastLetter){
    document.getElementById('message').textContent='Must start with "'+lastLetter.toUpperCase()+'"!';return;
  }
  document.getElementById('message').textContent='';
  used.add(word);
  chain.push(word);
  addWord(word,true);
  lastLetter=word[word.length-1];
  score+=word.length;
  round++;
  updateHUD();
  document.getElementById('last-letter').textContent='Next letter: '+lastLetter.toUpperCase();
  playerTurn=false;
  clearInterval(timerInterval);
  setTimeout(cpuTurn,800+Math.random()*1200);
}

function cpuTurn(){
  let options=WORDS.filter(w=>w[0]===lastLetter&&!used.has(w));
  if(options.length===0){endGame('CPU is stuck. You win!');return}
  let word=options[Math.floor(Math.random()*options.length)];
  used.add(word);
  chain.push(word);
  addWord(word,false);
  lastLetter=word[word.length-1];
  round++;
  document.getElementById('last-letter').textContent='Your turn! Start with: '+lastLetter.toUpperCase();
  playerTurn=true;
  document.getElementById('word-input').focus();
  startTimer();
}

function endGame(msg){
  clearInterval(timerInterval);
  if(score>highScore)highScore=score;
  updateHUD();
  document.getElementById('end-title').textContent=msg.includes('win')?'You Win!':'Game Over';
  document.getElementById('end-score').textContent='Score: '+score+' | '+round+' rounds';
  document.getElementById('end-msg').textContent=msg;
  document.getElementById('end-overlay').classList.remove('hidden');
  try{parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore}},'*')}catch(e){}
}

document.getElementById('word-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')submitWord();
});
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    if(e.data.state.highScore){highScore=e.data.state.highScore;document.getElementById('high').textContent=highScore;}
  }
});
</script>
