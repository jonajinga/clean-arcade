<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fortress Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.info{font-size:0.85rem;margin:0.25rem 0;text-align:center;min-height:1.4em}
canvas{border:2px solid #6366f1;display:block;margin:0.25rem auto}
.controls{display:flex;gap:0.5rem;margin:0.5rem;flex-wrap:wrap;justify-content:center}
.controls button{padding:0.5rem 1rem;font-size:0.8rem;background:#334155}
.controls button.active{background:#6366f1}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.overlay h2{font-size:1.5rem;margin-bottom:1rem;color:#facc15}
.overlay p{margin-bottom:1rem;font-size:1rem;text-align:center;max-width:320px}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{background:#4f46e5}
.hidden{display:none}
.pause-btn{background:#334155;margin:0.5rem}
</style>
</head>
<body>
<h1>Fortress Defense</h1>
<div class="info" id="info">Wave 1/10 | Place walls and archers, then start wave</div>
<canvas id="canvas"></canvas>
<div class="controls" id="controls">
<button id="btnWall" onclick="setTool('wall')" class="active">Wall (W)</button>
<button id="btnArcher" onclick="setTool('archer')">Archer (A)</button>
<button onclick="startWave()" id="btnWave">Start Wave</button>
</div>
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>

<div class="overlay" id="startOverlay">
<h2>Fortress Defense</h2>
<p>Place walls and archers to defend your castle. 10 waves of attackers. Walls block, archers shoot. Survive all waves!</p>
<button onclick="startGame()">Play</button>
</div>

<div class="overlay hidden" id="overOverlay">
<h2 id="overTitle">Game Over</h2>
<p id="overMsg"></p>
<button onclick="startGame()">Play Again</button>
</div>

<script>
const GS=16,CASTLE_X=1;
let grid,enemies,arrows,wave,score,castleHP,tool,waveActive,paused,gameOver,animId,highScore=0;
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),info=document.getElementById('info');
let cs,cw;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='fortress-defense'){const s=e.data.state;if(s)highScore=s.highScore||0}});
function save(){try{parent.postMessage({type:'ca-save',slug:'fortress-defense',state:{highScore}},'*')}catch(e){}}

document.addEventListener('keydown',e=>{
if(e.key==='P'||e.key==='p')togglePause();
if(e.key==='w')setTool('wall');
if(e.key==='a')setTool('archer');
});

function resize(){cw=Math.min(window.innerWidth-20,450);canvas.width=cw;canvas.height=cw;cs=cw/GS;render()}
window.addEventListener('resize',resize);

function setTool(t){tool=t;document.getElementById('btnWall').className=t==='wall'?'active':'';document.getElementById('btnArcher').className=t==='archer'?'active':''}

function startGame(){
grid=Array.from({length:GS},()=>Array(GS).fill(0));
// Castle on left side
for(let r=5;r<11;r++)grid[r][0]=5; // castle
enemies=[];arrows=[];wave=0;score=0;castleHP=20;tool='wall';waveActive=false;paused=false;gameOver=false;
document.getElementById('startOverlay').classList.add('hidden');
document.getElementById('overOverlay').classList.add('hidden');
document.getElementById('controls').classList.remove('hidden');
info.textContent='Wave 1/10 | Place walls and archers, then Start Wave';
setTool('wall');resize();
}

canvas.addEventListener('click',e=>{
if(gameOver||waveActive)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left)*(cw/rect.width),my=(e.clientY-rect.top)*(cw/rect.height);
const c=Math.floor(mx/cs),r=Math.floor(my/cs);
if(r<0||r>=GS||c<1||c>=GS||grid[r][c])return;
// Placement budget
const walls=grid.flat().filter(v=>v===1).length;
const archers=grid.flat().filter(v=>v===2).length;
if(tool==='wall'&&walls<15){grid[r][c]=1}
else if(tool==='archer'&&archers<6){grid[r][c]=2}
render();
});

function startWave(){
if(gameOver||waveActive)return;
wave++;
const count=3+wave*2;
for(let i=0;i<count;i++){
const r=Math.floor(Math.random()*GS);
enemies.push({x:GS-1+Math.random()*4,y:r+Math.random(),hp:1+Math.floor(wave/3),speed:0.02+wave*0.003,maxHp:1+Math.floor(wave/3)});
}
waveActive=true;
document.getElementById('btnWave').style.display='none';
info.textContent=`Wave ${wave}/10 | Enemies: ${enemies.length} | Castle HP: ${castleHP}`;
if(!animId)gameLoop();
}

function togglePause(){
if(!waveActive)return;
paused=!paused;
document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
if(!paused)gameLoop();
}

function gameLoop(){
if(paused||gameOver){animId=null;return}
update();render();
animId=requestAnimationFrame(gameLoop);
}

function update(){
// Move enemies
for(const e of enemies){
e.x-=e.speed;
// Check wall collision
const gc=Math.floor(e.x),gr=Math.floor(e.y);
if(gc>=0&&gc<GS&&gr>=0&&gr<GS&&grid[gr][gc]===1){
e.x=gc+1;// blocked
grid[gr][gc]=0;// wall breaks after hit
e.hp--;
}
if(e.x<=1){castleHP--;e.hp=0;score-=5}
}
enemies=enemies.filter(e=>e.hp>0);
// Archers shoot
for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){
if(grid[r][c]===2){
// Find nearest enemy in range 5
let nearest=null,bestD=6;
for(const e of enemies){
const d=Math.hypot(e.x-c,e.y-r);
if(d<bestD){bestD=d;nearest=e}
}
if(nearest&&Math.random()<0.05){
arrows.push({x:c,y:r,tx:nearest.x,ty:nearest.y,target:nearest,life:15});
nearest.hp--;score+=10;
}
}
}
// Update arrows
arrows=arrows.filter(a=>{a.life--;return a.life>0});
// Remove dead enemies
enemies=enemies.filter(e=>e.hp>0);
// Check wave complete
if(enemies.length===0&&waveActive){
waveActive=false;
document.getElementById('btnWave').style.display='';
if(wave>=10){endGame('All 10 waves survived!',true);return}
if(castleHP<=0){endGame('Castle destroyed!',false);return}
info.textContent=`Wave ${wave} cleared! Score: ${score} | Castle HP: ${castleHP} | Place defenses for next wave`;
}
if(castleHP<=0){endGame('Castle destroyed!',false)}
}

function render(){
ctx.fillStyle='#0f172a';ctx.fillRect(0,0,cw,cw);
for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){
const v=grid[r][c];
let fill='#1e293b';
if(v===1)fill='#78716c';
if(v===2)fill='#22c55e';
if(v===5)fill='#6366f1';
ctx.fillStyle=fill;ctx.fillRect(c*cs+0.5,r*cs+0.5,cs-1,cs-1);
if(v===2){
ctx.fillStyle='#fff';ctx.font=(cs*0.5)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('A',c*cs+cs/2,r*cs+cs/2);
}
}
// Castle HP bar
ctx.fillStyle='#ef4444';ctx.fillRect(0,0,cs,cw*(castleHP/20));
// Enemies
for(const e of enemies){
ctx.fillStyle='#ef4444';
ctx.fillRect(e.x*cs,e.y*cs-cs*0.3,cs*0.6,cs*0.6);
// HP bar
ctx.fillStyle='#22c55e';ctx.fillRect(e.x*cs,e.y*cs-cs*0.45,cs*0.6*(e.hp/e.maxHp),cs*0.1);
}
// Arrows
ctx.strokeStyle='#facc15';ctx.lineWidth=2;
for(const a of arrows){
ctx.beginPath();ctx.moveTo(a.x*cs+cs/2,a.y*cs+cs/2);ctx.lineTo(a.tx*cs,a.ty*cs);ctx.stroke();
}
// HUD
ctx.fillStyle='#e2e8f0';ctx.font='0.8rem system-ui';ctx.textAlign='right';
ctx.fillText(`Score: ${score}`,cw-5,15);
if(waveActive)info.textContent=`Wave ${wave}/10 | Enemies: ${enemies.length} | Castle HP: ${castleHP} | Score: ${score}`;
}

function endGame(msg,won){
gameOver=true;cancelAnimationFrame(animId);animId=null;
if(won)highScore=Math.max(highScore,score);save();
document.getElementById('controls').classList.add('hidden');
setTimeout(()=>{
document.getElementById('overTitle').textContent=won?'Victory!':'Defeat';
document.getElementById('overMsg').textContent=`${msg}\nScore: ${score} | Waves: ${wave}/10`;
document.getElementById('overOverlay').classList.remove('hidden');
},400);
}
</script>
</body>
</html>
