<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tennis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
canvas{border:2px solid #6366f1;max-width:100%;display:block}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#e2e8f0}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit;margin:0.3rem}
button:hover{opacity:0.85}
.pause-btn{background:#334155}
#controls{display:flex;gap:0.5rem;margin:0.4rem 0;flex-wrap:wrap;justify-content:center}
.ctrl-btn{background:#334155;padding:0.5rem 1rem;font-size:1.2rem;min-width:50px}
#wrap{position:relative;display:inline-block}
#score-bar{display:flex;justify-content:space-between;width:100%;padding:0.2rem 0.5rem;font-size:0.85rem;color:#e2e8f0}
</style>
</head>
<body>
<h1>Tennis</h1>
<div id="score-bar"><span id="p-score">You: 0</span><span id="set-info">Set 1</span><span id="ai-score">AI: 0</span></div>
<div id="wrap">
<canvas id="c" width="600" height="360"></canvas>
<div class="overlay" id="start-overlay">
<h2>Tennis</h2>
<p>Serve and rally against the AI</p>
<p>Tap/Click or press Space to swing</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay" id="over-overlay" style="display:none">
<h2 id="over-title">Game Over</h2>
<p id="over-msg"></p>
<p id="over-hs"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<div id="controls">
<button class="ctrl-btn" onclick="movePlayer(-1)" aria-label="Left">&#9664;</button>
<button class="ctrl-btn" onclick="swingPlayer()" aria-label="Swing">Swing</button>
<button class="ctrl-btn" onclick="movePlayer(1)" aria-label="Right">&#9654;</button>
<button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=600,H=360;
let highScore=0,paused=false,running=false,animId;
let player,ai,ball,serving,serverIsPlayer,playerScore,aiScore,playerGames,aiGames,set,gameOver;
let moveDir=0;

function initState(){
  player={x:100,y:H-80,w:20,h:50,swinging:false,swingTimer:0};
  ai={x:W-120,y:H-80,w:20,h:50,swinging:false,swingTimer:0};
  ball={x:0,y:0,vx:0,vy:0,active:false,onGround:false,groundY:H-30};
  serving=true;serverIsPlayer=true;
  playerScore=0;aiScore=0;playerGames=0;aiGames=0;set=1;gameOver=false;
}

function serve(){
  let s=serverIsPlayer?player:ai;
  ball.x=s.x+(serverIsPlayer?30:-10);ball.y=s.y-20;
  ball.vx=serverIsPlayer?4:-4;ball.vy=-5;ball.active=true;ball.onGround=false;
  serving=false;
}

function swingPlayer(){
  if(!running||paused||gameOver)return;
  if(serving&&serverIsPlayer){serve();return;}
  player.swinging=true;player.swingTimer=10;
  let dx=ball.x-player.x,dy=ball.y-player.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<60&&ball.active){
    ball.vx=4+Math.random()*2;ball.vy=-4-Math.random()*3;
  }
}

function movePlayer(d){moveDir=d;}

function aiLogic(){
  if(serving&&!serverIsPlayer){if(Math.random()<0.02)serve();return;}
  if(!ball.active)return;
  let targetX=ball.x+20;
  if(ai.x<targetX-10)ai.x+=2.5;
  else if(ai.x>targetX+10)ai.x-=2.5;
  let dx=ball.x-ai.x,dy=ball.y-ai.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<60&&ball.vx<0&&ball.active){
    ai.swinging=true;ai.swingTimer=10;
    ball.vx=-(4+Math.random()*2);ball.vy=-4-Math.random()*3;
  }
}

const scoreNames=['0','15','30','40'];
function pointScored(playerWon){
  if(playerWon)playerScore++;else aiScore++;
  if(playerScore>=4&&playerScore-aiScore>=2){
    playerGames++;playerScore=0;aiScore=0;serverIsPlayer=!serverIsPlayer;
  }else if(aiScore>=4&&aiScore-playerScore>=2){
    aiGames++;playerScore=0;aiScore=0;serverIsPlayer=!serverIsPlayer;
  }
  if(playerGames>=6||aiGames>=6){
    gameOver=true;
    let won=playerGames>aiGames;
    if(won&&playerGames>highScore){highScore=playerGames;save();}
    showOver(won?'You Win!':'You Lose!','Games: '+playerGames+' - '+aiGames);
  }
  serving=true;ball.active=false;
  updateScoreBar();
}

function updateScoreBar(){
  let ps=playerScore<4?scoreNames[playerScore]:playerScore;
  let as2=aiScore<4?scoreNames[aiScore]:aiScore;
  document.getElementById('p-score').textContent='You: '+playerGames+' ('+ps+')';
  document.getElementById('ai-score').textContent='AI: '+aiGames+' ('+as2+')';
  document.getElementById('set-info').textContent='Set '+set;
}

function update(){
  if(paused||!running||gameOver)return;
  if(moveDir!==0){player.x+=moveDir*3;moveDir=0;}
  player.x=Math.max(10,Math.min(W/2-30,player.x));
  if(player.swingTimer>0)player.swingTimer--;else player.swinging=false;
  if(ai.swingTimer>0)ai.swingTimer--;else ai.swinging=false;
  aiLogic();
  if(ball.active){
    ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=0.25;
    if(ball.y>=ball.groundY){ball.y=ball.groundY;ball.vy*=-0.5;ball.vx*=0.9;
      if(Math.abs(ball.vy)<1){
        if(ball.x<W/2)pointScored(false);else pointScored(true);
      }
    }
    if(ball.x<0||ball.x>W){
      if(ball.x<0)pointScored(false);else pointScored(true);
    }
    if(ball.y<0){ball.y=0;ball.vy=Math.abs(ball.vy);}
  }
  updateScoreBar();
}

function draw(){
  ctx.fillStyle='#166534';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#15803d';ctx.fillRect(0,H-30,W,30);
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,H-30);ctx.lineTo(W/2,H-200);ctx.stroke();
  ctx.fillStyle='#3b82f6';ctx.fillRect(player.x,player.y,player.w,player.h);
  if(player.swinging){ctx.fillStyle='#facc15';ctx.fillRect(player.x+15,player.y-5,25,8);}
  ctx.fillStyle='#ef4444';ctx.fillRect(ai.x,ai.y,ai.w,ai.h);
  if(ai.swinging){ctx.fillStyle='#facc15';ctx.fillRect(ai.x-25,ai.y-5,25,8);}
  if(ball.active){ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(ball.x,ball.y,6,0,Math.PI*2);ctx.fill();}
}

function loop(){
  update();draw();
  if(running)animId=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('start-overlay').style.display='none';
  document.getElementById('over-overlay').style.display='none';
  initState();updateScoreBar();running=true;paused=false;
  document.getElementById('pause-btn').textContent='⏸';
  serving=true;loop();
}

function showOver(t,m){
  document.getElementById('over-title').textContent=t;
  document.getElementById('over-msg').textContent=m;
  document.getElementById('over-hs').textContent='High Score (games): '+highScore;
  document.getElementById('over-overlay').style.display='flex';
  running=false;
}

function togglePause(){
  if(!running)return;paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(!paused)loop();
}

function save(){try{parent.postMessage({type:'ca-save',slug:'tennis',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='tennis'&&e.data.state){highScore=e.data.state.highScore||0;}});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')moveDir=-1;
  else if(e.key==='ArrowRight')moveDir=1;
  else if(e.key===' '||e.key==='ArrowUp')swingPlayer();
  else if(e.key.toLowerCase()==='p')togglePause();
});
canvas.addEventListener('click',swingPlayer);
canvas.addEventListener('touchstart',e=>{e.preventDefault();swingPlayer();},{passive:false});

initState();draw();
</script>
</body>
</html>
