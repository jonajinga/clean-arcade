<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Golf 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-wrap{position:relative;width:100%;max-width:480px}
canvas{display:block;width:100%;border:2px solid #6366f1;max-width:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#e2e8f0}
.overlay h2{font-size:1.5rem;margin-bottom:0.5rem;color:#facc15}
.overlay p{margin:0.3rem 0;font-size:0.95rem}
.overlay button,.ctrl-btn{background:#6366f1;color:#fff;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;margin-top:0.5rem}
.ctrl-btn{background:#334155;margin:0.3rem;font-size:0.9rem;padding:0.4rem 1rem}
#hud{display:flex;justify-content:space-between;width:100%;max-width:480px;padding:0.2rem 0.5rem;font-size:0.85rem}
#controls{display:flex;justify-content:center;gap:0.5rem;margin-top:0.3rem;flex-wrap:wrap}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Mini Golf 3D</h1>
<div id="hud"><span id="hud-hole">Hole: 1/5</span><span id="hud-strokes">Strokes: 0</span><span id="hud-total">Total: 0</span><span id="hud-hi">Best: --</span></div>
<div id="game-wrap">
<canvas id="c" width="480" height="480"></canvas>
<div class="overlay" id="start-overlay">
<h2>Mini Golf 3D</h2>
<p>5 holes of pseudo-3D mini golf!</p>
<p>Click/drag to aim, release to shoot.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="end-overlay">
<h2>Course Complete!</h2>
<p id="final-score"></p>
<p id="final-hi"></p>
<button onclick="startGame()">Play Again</button>
</div>
</div>
<div id="controls">
<button class="ctrl-btn" id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let ball,hole,walls,holeNum,strokes,totalStrokes,highScore=Infinity,aiming=false,aimStart={x:0,y:0},aimEnd={x:0,y:0},running=false,paused=false,sunk=false,animId;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='mini-golf-3d'){highScore=e.data.state?.highScore||Infinity;document.getElementById('hud-hi').textContent='Best: '+(highScore===Infinity?'--':highScore)}});

const holes=[
  {ball:{x:240,y:400},hole:{x:240,y:80},walls:[]},
  {ball:{x:80,y:400},hole:{x:400,y:80},walls:[{x:150,y:200,w:200,h:20}]},
  {ball:{x:240,y:420},hole:{x:240,y:60},walls:[{x:100,y:150,w:150,h:15},{x:230,y:280,w:150,h:15}]},
  {ball:{x:60,y:420},hole:{x:420,y:60},walls:[{x:180,y:120,w:15,h:150},{x:280,y:220,w:15,h:150}]},
  {ball:{x:240,y:430},hole:{x:240,y:50},walls:[{x:100,y:120,w:120,h:15},{x:260,y:200,w:120,h:15},{x:140,y:300,w:120,h:15}]}
];

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  holeNum=0;totalStrokes=0;running=true;paused=false;
  loadHole();
}

function loadHole(){
  const h=holes[holeNum];
  ball={x:h.ball.x,y:h.ball.y,vx:0,vy:0,r:8};
  hole={x:h.hole.x,y:h.hole.y,r:14};
  walls=h.walls;strokes=0;sunk=false;
  document.getElementById('hud-hole').textContent='Hole: '+(holeNum+1)+'/5';
  document.getElementById('hud-strokes').textContent='Strokes: 0';
  if(!animId)requestAnimationFrame(loop);
}

function togglePause(){if(!running)return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused)requestAnimationFrame(loop)}

function loop(){
  if(!running||paused)return;
  update();draw();animId=requestAnimationFrame(loop);
}

function update(){
  if(sunk)return;
  ball.x+=ball.vx;ball.y+=ball.vy;
  ball.vx*=0.985;ball.vy*=0.985;
  if(Math.abs(ball.vx)<0.05&&Math.abs(ball.vy)<0.05){ball.vx=0;ball.vy=0}
  // walls
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-0.7}
  if(ball.x+ball.r>480){ball.x=480-ball.r;ball.vx*=-0.7}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-0.7}
  if(ball.y+ball.r>480){ball.y=480-ball.r;ball.vy*=-0.7}
  walls.forEach(w=>{
    if(ball.x+ball.r>w.x&&ball.x-ball.r<w.x+w.w&&ball.y+ball.r>w.y&&ball.y-ball.r<w.y+w.h){
      const overlapL=ball.x+ball.r-w.x,overlapR=w.x+w.w-(ball.x-ball.r);
      const overlapT=ball.y+ball.r-w.y,overlapB=w.y+w.h-(ball.y-ball.r);
      const min=Math.min(overlapL,overlapR,overlapT,overlapB);
      if(min===overlapL){ball.x=w.x-ball.r;ball.vx*=-0.7}
      else if(min===overlapR){ball.x=w.x+w.w+ball.r;ball.vx*=-0.7}
      else if(min===overlapT){ball.y=w.y-ball.r;ball.vy*=-0.7}
      else{ball.y=w.y+w.h+ball.r;ball.vy*=-0.7}
    }
  });
  // hole check
  const dx=ball.x-hole.x,dy=ball.y-hole.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<hole.r&&Math.abs(ball.vx)<3&&Math.abs(ball.vy)<3){
    sunk=true;ball.vx=0;ball.vy=0;
    totalStrokes+=strokes;
    setTimeout(()=>{
      holeNum++;
      if(holeNum>=5){endGame()}
      else{loadHole()}
    },1000);
  }
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,480,480);
  // green (pseudo-3D perspective)
  ctx.fillStyle='#166534';
  ctx.beginPath();ctx.moveTo(40,480);ctx.lineTo(140,20);ctx.lineTo(340,20);ctx.lineTo(440,480);ctx.fill();
  ctx.fillStyle='#15803d';ctx.fillRect(30,0,420,480);
  // walls with 3D effect
  walls.forEach(w=>{
    ctx.fillStyle='#7c3aed';ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.fillStyle='#6d28d9';ctx.fillRect(w.x,w.y+w.h,w.w,4);
    ctx.fillStyle='#8b5cf6';ctx.fillRect(w.x,w.y-3,w.w,3);
  });
  // hole shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(hole.x+2,hole.y+2,hole.r,hole.r*0.7,0,0,Math.PI*2);ctx.fill();
  // hole
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(hole.x,hole.y,hole.r,hole.r*0.7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ef4444';ctx.fillRect(hole.x-1,hole.y-25,2,25);
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.moveTo(hole.x+1,hole.y-25);ctx.lineTo(hole.x+15,hole.y-20);ctx.lineTo(hole.x+1,hole.y-15);ctx.fill();
  // ball shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(ball.x+3,ball.y+3,ball.r,ball.r*0.6,0,0,Math.PI*2);ctx.fill();
  // ball
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(ball.x-2,ball.y-2,ball.r*0.4,0,Math.PI*2);ctx.fill();
  // aim line
  if(aiming&&ball.vx===0&&ball.vy===0){
    ctx.strokeStyle='rgba(250,204,21,0.7)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(ball.x,ball.y);
    const dx=aimStart.x-aimEnd.x,dy=aimStart.y-aimEnd.y;
    ctx.lineTo(ball.x+dx*2,ball.y+dy*2);ctx.stroke();ctx.setLineDash([]);
    // power indicator
    const power=Math.min(Math.sqrt(dx*dx+dy*dy),150);
    ctx.fillStyle='#facc15';ctx.fillRect(10,460,power*2,10);
    ctx.strokeStyle='#facc15';ctx.strokeRect(10,460,300,10);
  }
  if(sunk){ctx.fillStyle='#22c55e';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.fillText('Hole in '+strokes+'!',240,240)}
}

function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(480/r.width),y:(t.clientY-r.top)*(480/r.height)};
}

function onDown(e){
  if(!running||paused||sunk||ball.vx!==0||ball.vy!==0)return;
  e.preventDefault();aiming=true;
  const p=getCanvasPos(e);aimStart={...p};aimEnd={...p};
}
function onMove(e){if(!aiming)return;e.preventDefault();aimEnd=getCanvasPos(e)}
function onUp(e){
  if(!aiming)return;aiming=false;
  const dx=aimStart.x-aimEnd.x,dy=aimStart.y-aimEnd.y;
  const power=Math.min(Math.sqrt(dx*dx+dy*dy),150)/10;
  if(power>0.5){
    const angle=Math.atan2(dy,dx);
    ball.vx=Math.cos(angle)*power;ball.vy=Math.sin(angle)*power;
    strokes++;document.getElementById('hud-strokes').textContent='Strokes: '+strokes;
  }
}

canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
document.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P')togglePause()});

function endGame(){
  running=false;animId=null;
  if(totalStrokes<highScore){highScore=totalStrokes;parent.postMessage({type:'ca-save',slug:'mini-golf-3d',state:{highScore}},'*')}
  document.getElementById('hud-hi').textContent='Best: '+highScore;
  document.getElementById('hud-total').textContent='Total: '+totalStrokes;
  document.getElementById('final-score').textContent='Total Strokes: '+totalStrokes;
  document.getElementById('final-hi').textContent='Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
</script>
</body>
</html>
