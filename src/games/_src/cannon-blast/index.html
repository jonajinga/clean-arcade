<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cannon Blast</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-area{position:relative;width:90vw;max-width:500px;height:400px;border:2px solid #6366f1;background:#1e293b}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
.hidden{display:none!important}
canvas{display:block;width:100%;height:100%}
#controls{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;justify-content:center}
.ctrl-btn{background:#334155;padding:0.5rem 1rem;font-size:0.9rem}
#fire-btn{background:#ef4444}
</style>
</head>
<body>
<h1>Cannon Blast</h1>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="start-overlay" class="overlay">
    <h2>Cannon Blast</h2>
    <p>Aim and fire to hit targets!</p>
    <p style="color:#94a3b8">10 levels of increasing difficulty</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="end-overlay" class="overlay hidden">
    <h2 id="end-title">Game Over</h2>
    <p id="end-msg"></p>
    <p id="hs" style="color:#facc15"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="controls">
  <button class="ctrl-btn" onclick="adjustAngle(-5)" ontouchstart="adjustAngle(-5);event.preventDefault()">Aim ↑</button>
  <button class="ctrl-btn" onclick="adjustAngle(5)" ontouchstart="adjustAngle(5);event.preventDefault()">Aim ↓</button>
  <button class="ctrl-btn" onclick="adjustPower(-1)" ontouchstart="adjustPower(-1);event.preventDefault()">Pow -</button>
  <button class="ctrl-btn" onclick="adjustPower(1)" ontouchstart="adjustPower(1);event.preventDefault()">Pow +</button>
  <button id="fire-btn" onclick="fire()" ontouchstart="fire();event.preventDefault()">Fire!</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,angle,power,level,score,highScore=0,shots,targets,platforms,ball,firing,animId;
const GRAVITY=0.15;
function resize(){const r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;W=canvas.width;H=canvas.height}
resize();window.addEventListener('resize',resize);

function startGame(){
  level=1;score=0;
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  loadLevel();
}
function loadLevel(){
  angle=45;power=8;shots=3+Math.floor(level/3);firing=false;ball=null;
  targets=[];platforms=[];
  const numT=Math.min(level,5);
  for(let i=0;i<numT;i++){
    const px=150+Math.random()*(W-200);
    const py=H-80-Math.random()*(H*0.5);
    const pw=50+Math.random()*40;
    platforms.push({x:px,y:py,w:pw,h:10});
    targets.push({x:px+pw/2-8,y:py-20,w:16,h:16,hit:false});
  }
  // Ground
  platforms.push({x:0,y:H-20,w:W,h:20});
  if(!animId)draw();
}
function adjustAngle(d){angle=Math.max(10,Math.min(80,angle+d));draw()}
function adjustPower(d){power=Math.max(3,Math.min(15,power+d));draw()}
function fire(){
  if(firing||shots<=0)return;
  firing=true;shots--;
  const rad=(Math.PI/180)*(90-angle);
  ball={x:30,y:H-40,vx:Math.cos(rad)*power,vy:-Math.sin(rad)*power,trail:[]};
  animate();
}
function animate(){
  if(!ball)return;
  ball.trail.push({x:ball.x,y:ball.y});
  if(ball.trail.length>20)ball.trail.shift();
  ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=GRAVITY;
  // Check targets
  targets.forEach(t=>{
    if(!t.hit&&ball.x>t.x&&ball.x<t.x+t.w&&ball.y>t.y&&ball.y<t.y+t.h){
      t.hit=true;score+=level*10;
    }
  });
  // Check platforms for bounce
  platforms.forEach(p=>{
    if(ball.x>p.x&&ball.x<p.x+p.w&&ball.y+5>p.y&&ball.y<p.y+p.h&&ball.vy>0){
      ball.vy*=-0.5;ball.y=p.y-5;
    }
  });
  draw();
  if(ball.x>W+20||ball.y>H+20||ball.x<-20){
    firing=false;ball=null;
    if(targets.every(t=>t.hit)){
      if(level>=10){endGame(true);return}
      level++;setTimeout(loadLevel,500);
    }else if(shots<=0){
      endGame(false);
    }
    return;
  }
  requestAnimationFrame(animate);
}
function draw(){
  ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,H);
  // Ground
  ctx.fillStyle='#334155';ctx.fillRect(0,H-20,W,20);
  // Platforms
  ctx.fillStyle='#475569';
  platforms.forEach(p=>{if(p.y!==H-20)ctx.fillRect(p.x,p.y,p.w,p.h)});
  // Targets
  targets.forEach(t=>{
    ctx.fillStyle=t.hit?'#22c55e':'#ef4444';
    ctx.fillRect(t.x,t.y,t.w,t.h);
    if(!t.hit){ctx.fillStyle='#facc15';ctx.fillRect(t.x+4,t.y+4,8,8)}
  });
  // Cannon
  ctx.save();ctx.translate(30,H-30);
  ctx.rotate(-(Math.PI/180)*angle);
  ctx.fillStyle='#94a3b8';ctx.fillRect(0,-5,30,10);
  ctx.restore();
  ctx.fillStyle='#64748b';ctx.beginPath();ctx.arc(30,H-30,12,0,Math.PI*2);ctx.fill();
  // Ball + trail
  if(ball){
    ctx.strokeStyle='rgba(250,204,21,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ball.trail.forEach((p,i)=>{i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)});ctx.stroke();
    ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(ball.x,ball.y,5,0,Math.PI*2);ctx.fill();
  }
  // Power indicator
  ctx.fillStyle='#334155';ctx.fillRect(10,10,100,10);
  ctx.fillStyle='#3b82f6';ctx.fillRect(10,10,power/15*100,10);
  // HUD
  ctx.fillStyle='#e2e8f0';ctx.font='12px system-ui';
  ctx.fillText(`Level ${level}/10  Score: ${score}  Shots: ${shots}  Angle: ${angle}°`,10,38);
}
function endGame(won){
  if(score>highScore){highScore=score;saveScore()}
  document.getElementById('end-title').textContent=won?'You Win!':'Game Over';
  document.getElementById('end-msg').textContent='Score: '+score;
  document.getElementById('hs').textContent='Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowUp')adjustAngle(-5);
  if(e.code==='ArrowDown')adjustAngle(5);
  if(e.code==='ArrowLeft')adjustPower(-1);
  if(e.code==='ArrowRight')adjustPower(1);
  if(e.code==='Space'){e.preventDefault();fire()}
});
function saveScore(){try{parent.postMessage({type:'ca-save',slug:'cannon-blast',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='cannon-blast'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
