<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frogger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1rem}
h1{font-size:1.5rem;margin-bottom:.5rem;color:#facc15}
#info{display:flex;gap:1.5rem;margin-bottom:.5rem;font-size:.9rem}
#info span{color:#6366f1}
canvas{display:block;border:2px solid #6366f1;max-width:100%;touch-action:none}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{font-size:1.1rem;color:#e2e8f0}
.overlay .score-line{color:#22c55e;font-size:1.3rem}
.btn{padding:.75rem 2rem;font-size:1.1rem;border:none;border-radius:.5rem;cursor:pointer;background:#6366f1;color:#fff;font-weight:600;transition:background .2s}
.btn:hover{background:#4f46e5}
#pauseBtn{margin-top:.75rem;padding:.5rem 1.5rem;font-size:1.3rem;background:#3b82f6;color:#fff;border:none;border-radius:.5rem;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>Frogger</h1>
<div id="info">
  <span>Score: <b id="scoreEl">0</b></span>
  <span>Lives: <b id="livesEl">3</b></span>
  <span>High: <b id="highEl">0</b></span>
</div>
<canvas id="c"></canvas>
<button id="pauseBtn" class="hidden">⏸</button>

<div id="startOverlay" class="overlay">
  <h2>Frogger</h2>
  <p>Cross traffic & river to reach the top!</p>
  <p style="font-size:.85rem;color:#94a3b8">Arrow keys or swipe to move</p>
  <button class="btn" id="playBtn">Play</button>
</div>

<div id="overOverlay" class="overlay hidden">
  <h2 id="overTitle">Game Over</h2>
  <p class="score-line" id="overScore"></p>
  <p class="score-line" id="overHigh"></p>
  <button class="btn" id="replayBtn">Play Again</button>
</div>

<script>
const SLUG='frogger';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const COLS=13,ROWS=13;
let CELL,W,H;
let score=0,lives=3,highScore=0,paused=false,running=false;
let frog,lanes,homes,homeFilled;

function resize(){
  const maxW=Math.min(window.innerWidth-32,560);
  CELL=Math.floor(maxW/COLS);
  W=COLS*CELL;H=ROWS*CELL;
  canvas.width=W;canvas.height=H;
}
resize();
window.addEventListener('resize',()=>{if(running){resize();draw();}});

// Lane config: rows 1-5 road, row 6 median, rows 7-11 river, row 0 home, row 12 start
function initLanes(){
  lanes=[];
  // Road lanes (rows 1-5 from bottom, canvas rows 11-7)
  const roadSpeeds=[1.2,-1.5,1.8,-1,1.4];
  const roadLengths=[2,3,2,3,2];
  for(let i=0;i<5;i++){
    const row=11-i;
    const dir=roadSpeeds[i]>0?1:-1;
    const spd=Math.abs(roadSpeeds[i]);
    const len=roadLengths[i];
    const gap=len+3;
    const objs=[];
    for(let j=-1;j<Math.ceil(COLS/gap)+2;j++){
      objs.push({x:j*gap*CELL,w:len*CELL});
    }
    lanes.push({row,type:'road',dir,speed:spd,len,objs});
  }
  // River lanes (rows 7-11 from bottom → canvas rows 5-1)
  const riverSpeeds=[-1,1.3,-0.8,1.5,-1.2];
  const riverLengths=[3,4,2,3,4];
  for(let i=0;i<5;i++){
    const row=5-i;
    const dir=riverSpeeds[i]>0?1:-1;
    const spd=Math.abs(riverSpeeds[i]);
    const len=riverLengths[i];
    const gap=len+2;
    const objs=[];
    for(let j=-1;j<Math.ceil(COLS/gap)+2;j++){
      objs.push({x:j*gap*CELL,w:len*CELL});
    }
    lanes.push({row,type:'river',dir,speed:spd,len,objs});
  }
  // Homes at row 0
  homes=[1,4,7,10];
  homeFilled=[false,false,false,false];
}

function resetFrog(){
  frog={col:Math.floor(COLS/2),row:12};
}

function initGame(){
  score=0;lives=3;
  initLanes();
  resetFrog();
  updateUI();
}

function updateUI(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('livesEl').textContent=lives;
  document.getElementById('highEl').textContent=highScore;
}

function moveFrog(dx,dy){
  if(!running||paused)return;
  const nr=frog.row+dy;
  const nc=frog.col+dx;
  if(nc<0||nc>=COLS||nr<0||nr>12)return;
  frog.row=nr;frog.col=nc;
  checkPosition();
}

function checkPosition(){
  const r=frog.row;
  // Home row
  if(r===0){
    let landed=false;
    for(let i=0;i<homes.length;i++){
      if(frog.col>=homes[i]&&frog.col<=homes[i]+1&&!homeFilled[i]){
        homeFilled[i]=true;
        score+=100;
        landed=true;
        break;
      }
    }
    if(!landed){die();return;}
    if(homeFilled.every(h=>h)){
      score+=500;
      homeFilled=[false,false,false,false];
    }
    resetFrog();
    updateUI();
    return;
  }
  // Median row 6 — safe
  if(r===6||r===12)return;
  // Road check done in update via collision
  // River check done in update
}

function die(){
  lives--;
  updateUI();
  if(lives<=0){gameOver();return;}
  resetFrog();
}

function gameOver(){
  running=false;
  if(score>highScore)highScore=score;
  updateUI();
  document.getElementById('overScore').textContent='Score: '+score;
  document.getElementById('overHigh').textContent='High Score: '+highScore;
  document.getElementById('overTitle').textContent='Game Over';
  document.getElementById('overOverlay').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.add('hidden');
  saveState();
}

function saveState(){
  window.parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore}},'*');
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    highScore=e.data.state.highScore||0;
    updateUI();
  }
});

function update(dt){
  if(paused||!running)return;
  const frogPx=frog.col*CELL;
  const frogPy=frog.row*CELL;
  let onLog=false;
  let logDx=0;

  for(const lane of lanes){
    for(const obj of lane.objs){
      obj.x+=lane.dir*lane.speed*dt*60;
      if(lane.dir>0&&obj.x>W+CELL*2)obj.x-=(lane.len+Math.ceil(COLS/lane.len)*2+2)*CELL;
      if(lane.dir<0&&obj.x<-obj.w-CELL*2)obj.x+=(lane.len+Math.ceil(COLS/lane.len)*2+2)*CELL;
    }
    if(lane.row===frog.row){
      if(lane.type==='road'){
        for(const obj of lane.objs){
          if(frogPx+CELL*0.8>obj.x&&frogPx+CELL*0.2<obj.x+obj.w){
            die();return;
          }
        }
      }
      if(lane.type==='river'){
        for(const obj of lane.objs){
          if(frogPx+CELL*0.5>obj.x&&frogPx+CELL*0.5<obj.x+obj.w){
            onLog=true;
            logDx=lane.dir*lane.speed*dt*60;
          }
        }
        if(!onLog){die();return;}
        frog.col+=logDx/CELL;
        if(frog.col<0||frog.col>=COLS-1){die();return;}
      }
    }
  }
}

function draw(){
  ctx.fillStyle='#0f172a';
  ctx.fillRect(0,0,W,H);

  // Home row
  ctx.fillStyle='#134e4a';
  ctx.fillRect(0,0,W,CELL);
  for(let i=0;i<homes.length;i++){
    ctx.fillStyle=homeFilled[i]?'#22c55e':'#065f46';
    ctx.fillRect(homes[i]*CELL,0,CELL*2,CELL);
  }

  // River bg
  ctx.fillStyle='#1e3a5f';
  for(let r=1;r<=5;r++)ctx.fillRect(0,r*CELL,W,CELL);

  // Median
  ctx.fillStyle='#334155';
  ctx.fillRect(0,6*CELL,W,CELL);

  // Road bg
  ctx.fillStyle='#1e293b';
  for(let r=7;r<=11;r++)ctx.fillRect(0,r*CELL,W,CELL);

  // Start row
  ctx.fillStyle='#334155';
  ctx.fillRect(0,12*CELL,W,CELL);

  // Lane objects
  for(const lane of lanes){
    if(lane.type==='road'){
      ctx.fillStyle='#ef4444';
      for(const obj of lane.objs){
        ctx.fillRect(obj.x,lane.row*CELL+2,obj.w,CELL-4);
        // Wheels
        ctx.fillStyle='#1e293b';
        ctx.fillRect(obj.x+4,lane.row*CELL+CELL-6,8,4);
        ctx.fillRect(obj.x+obj.w-12,lane.row*CELL+CELL-6,8,4);
        ctx.fillStyle='#ef4444';
      }
    }else{
      ctx.fillStyle='#854d0e';
      for(const obj of lane.objs){
        ctx.beginPath();
        const cy=lane.row*CELL+CELL/2;
        ctx.roundRect(obj.x,lane.row*CELL+4,obj.w,CELL-8,4);
        ctx.fill();
      }
    }
  }

  // Draw road lines
  ctx.strokeStyle='#facc15';
  ctx.setLineDash([CELL/3,CELL/3]);
  ctx.lineWidth=2;
  for(let r=7;r<=11;r++){
    ctx.beginPath();
    ctx.moveTo(0,r*CELL);
    ctx.lineTo(W,r*CELL);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Frog
  const fx=frog.col*CELL;
  const fy=frog.row*CELL;
  ctx.fillStyle='#22c55e';
  ctx.beginPath();
  ctx.ellipse(fx+CELL/2,fy+CELL/2,CELL*0.4,CELL*0.35,0,0,Math.PI*2);
  ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(fx+CELL*0.35,fy+CELL*0.3,3,0,Math.PI*2);
  ctx.arc(fx+CELL*0.65,fy+CELL*0.3,3,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(fx+CELL*0.35,fy+CELL*0.3,1.5,0,Math.PI*2);
  ctx.arc(fx+CELL*0.65,fy+CELL*0.3,1.5,0,Math.PI*2);
  ctx.fill();
}

let lastTime=0;
function loop(t){
  if(!running)return;
  const dt=Math.min((t-lastTime)/1000,0.05);
  lastTime=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  initGame();
  running=true;paused=false;
  document.getElementById('pauseBtn').textContent='⏸';
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('replayBtn').addEventListener('click',startGame);

document.getElementById('pauseBtn').addEventListener('click',()=>{
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
  if(!paused){lastTime=performance.now();requestAnimationFrame(loop);}
  else saveState();
});

document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'){
    if(!running)return;
    document.getElementById('pauseBtn').click();
    return;
  }
  switch(e.key){
    case'ArrowUp':moveFrog(0,-1);e.preventDefault();break;
    case'ArrowDown':moveFrog(0,1);e.preventDefault();break;
    case'ArrowLeft':moveFrog(-1,0);e.preventDefault();break;
    case'ArrowRight':moveFrog(1,0);e.preventDefault();break;
  }
});

// Swipe
let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy)){moveFrog(dx>0?1:-1,0);}
  else{moveFrog(0,dy>0?1:-1);}
},{passive:false});

resize();
</script>
</body>
</html>
