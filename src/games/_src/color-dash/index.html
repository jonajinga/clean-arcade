<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Dash</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-area{position:relative;width:90vw;max-width:500px;height:450px;border:2px solid #6366f1;background:#0f172a;overflow:hidden}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
.hidden{display:none!important}
canvas{display:block;width:100%;height:100%}
#controls{display:flex;gap:0.5rem;margin-top:0.5rem;justify-content:center}
.ctrl-btn{background:#334155;padding:0.75rem 1.5rem;font-size:1rem}
#pause-btn{background:#334155;padding:0.5rem 1.5rem}
</style>
</head>
<body>
<h1>Color Dash</h1>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="start-overlay" class="overlay">
    <h2>Color Dash</h2>
    <p>Switch color to match gates!</p>
    <p style="color:#94a3b8">Wrong color = death. Endless run!</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="end-overlay" class="overlay hidden">
    <h2>Game Over</h2>
    <p id="final-score"></p>
    <p id="hs" style="color:#facc15"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="controls">
  <button class="ctrl-btn" onclick="switchColor()" ontouchstart="switchColor();event.preventDefault()">Switch Color</button>
  <button id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
const COLORS=['#ef4444','#3b82f6','#22c55e','#facc15'];
let playerY,playerColorIdx,gates,score,highScore=0,speed,gameOver,paused,dist;
function resize(){const r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;W=canvas.width;H=canvas.height}
resize();window.addEventListener('resize',resize);

function startGame(){
  playerY=H/2;playerColorIdx=0;gates=[];score=0;speed=2;dist=0;gameOver=false;paused=false;
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  for(let i=0;i<4;i++)addGate(W+i*200);
  loop();
}
function addGate(x){
  const ci=Math.floor(Math.random()*COLORS.length);
  const gapY=60+Math.random()*(H-160);
  const gapH=80;
  gates.push({x,colorIdx:ci,gapY,gapH,scored:false});
}
function switchColor(){
  if(gameOver)return;
  playerColorIdx=(playerColorIdx+1)%COLORS.length;
}
function togglePause(){if(gameOver)return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused)loop()}
function loop(){
  if(paused||gameOver)return;
  update();draw();requestAnimationFrame(loop);
}
function update(){
  dist++;speed=2+dist*0.001;
  gates.forEach(g=>g.x-=speed);
  if(gates.length>0&&gates[gates.length-1].x<W-150)addGate(W+50);
  gates=gates.filter(g=>g.x>-40);
  // Player position: fixed x=60
  const px=60,pw=20,ph=20;
  gates.forEach(g=>{
    if(!g.scored&&g.x+10<px){g.scored=true;score++}
    // Collision check
    if(px+pw>g.x&&px<g.x+10){
      // In gate column
      if(playerY<g.gapY||playerY+ph>g.gapY+g.gapH){
        // Hit wall
        die();return;
      }else if(playerColorIdx!==g.colorIdx){
        die();return;
      }
    }
  });
}
function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  // Ground lines
  for(let i=0;i<W;i+=40){
    const x=(i-dist*speed%40+40)%W;
    ctx.strokeStyle='#1e293b';ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  // Gates
  gates.forEach(g=>{
    const c=COLORS[g.colorIdx];
    ctx.fillStyle=c;
    ctx.fillRect(g.x,0,10,g.gapY);
    ctx.fillRect(g.x,g.gapY+g.gapH,10,H-g.gapY-g.gapH);
    // Gate opening indicator
    ctx.strokeStyle=c;ctx.lineWidth=2;
    ctx.strokeRect(g.x-2,g.gapY,14,g.gapH);
  });
  // Player
  ctx.fillStyle=COLORS[playerColorIdx];
  ctx.fillRect(60,playerY,20,20);
  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(60,playerY,20,20);
  // Color indicator
  COLORS.forEach((c,i)=>{
    ctx.fillStyle=c;ctx.globalAlpha=i===playerColorIdx?1:0.3;
    ctx.fillRect(10+i*25,H-25,20,15);
  });
  ctx.globalAlpha=1;
  // HUD
  ctx.fillStyle='#e2e8f0';ctx.font='14px system-ui';
  ctx.fillText('Score: '+score,10,20);
  ctx.fillText('Best: '+highScore,W-90,20);
}
function die(){
  gameOver=true;
  if(score>highScore){highScore=score;saveScore()}
  document.getElementById('final-score').textContent='Score: '+score;
  document.getElementById('hs').textContent='Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
}
// Controls: arrow keys to move up/down, space to switch color
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();switchColor()}
  if(e.code==='ArrowUp')playerY=Math.max(0,playerY-15);
  if(e.code==='ArrowDown')playerY=Math.min(H-20,playerY+15);
  if(e.code==='KeyP')togglePause();
});
// Touch: drag to move vertically
let touchY=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchY=e.touches[0].clientY});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touchY!==null){
    const dy=e.touches[0].clientY-touchY;
    playerY=Math.max(0,Math.min(H-20,playerY+dy));
    touchY=e.touches[0].clientY;
  }
});
canvas.addEventListener('touchend',()=>{touchY=null});
function saveScore(){try{parent.postMessage({type:'ca-save',slug:'color-dash',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='color-dash'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
