<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>F1 Racer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.game-area{border:2px solid #6366f1;max-width:100%;width:400px;position:relative}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:20px;text-align:center}
.overlay.hidden{display:none}
button{background:#6366f1;color:#e2e8f0;border:none;padding:10px 24px;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{opacity:0.9}
.controls{display:flex;gap:4px;padding:6px;justify-content:center;flex-wrap:wrap}
.ctrl-btn{background:#334155;padding:10px 14px;font-size:1rem;min-width:44px;min-height:44px}
.pause-btn{background:#334155;padding:6px 14px;font-size:0.85rem}
.info{display:flex;justify-content:space-between;font-size:0.8rem;color:#94a3b8;padding:2px 8px;flex-wrap:wrap;gap:4px}
.tire-bar{height:6px;background:#334155;margin:0 8px 2px}
.tire-fill{height:100%;background:#22c55e;transition:width 0.3s}
</style>
</head>
<body>
<h1>F1 Racer</h1>
<div class="game-area">
<div class="overlay" id="startOverlay">
<p style="margin-bottom:12px;font-size:1.1rem">F1 Racer</p>
<p style="margin-bottom:16px;font-size:0.85rem;color:#94a3b8">Race 3 laps on the circuit!<br>Watch tire wear. Pit to change tires.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<p style="margin-bottom:8px;font-size:1.2rem" id="goTitle">Race Over!</p>
<p style="margin-bottom:8px" id="goScore"></p>
<p style="margin-bottom:16px;color:#94a3b8" id="goHigh"></p>
<button onclick="startGame()">Play Again</button>
</div>
<div class="info">
<span>Lap: <b id="lap">1</b>/3</span><span>Pos: <b id="pos">1</b>/4</span><span>Speed: <b id="speed">0</b></span><span>Best: <b id="best">-</b></span>
</div>
<div class="tire-bar"><div class="tire-fill" id="tireFill" style="width:100%"></div></div>
<canvas id="c" width="400" height="400"></canvas>
<div class="controls">
<button class="ctrl-btn" ontouchstart="event.preventDefault();keys.up=true" ontouchend="keys.up=false">&#9650;</button>
<button class="ctrl-btn" ontouchstart="event.preventDefault();keys.down=true" ontouchend="keys.down=false">&#9660;</button>
<button class="ctrl-btn" ontouchstart="event.preventDefault();keys.left=true" ontouchend="keys.left=false">&#9664;</button>
<button class="ctrl-btn" ontouchstart="event.preventDefault();keys.right=true" ontouchend="keys.right=false">&#9654;</button>
<button class="ctrl-btn" style="background:#ef4444;font-size:0.7rem" onclick="pitStop()">PIT</button>
<button class="pause-btn" id="pauseBtn" onclick="togglePause()">&#9208;</button>
</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=400,H=400;
// track as waypoints (oval-ish circuit)
const TRACK=[
  {x:200,y:50},{x:320,y:80},{x:360,y:160},{x:350,y:260},
  {x:300,y:340},{x:200,y:370},{x:100,y:340},{x:50,y:260},
  {x:40,y:160},{x:80,y:80}
];
const TRACK_W=40;

let player,aiCars,keys={up:false,down:false,left:false,right:false};
let lap=1,tireWear=100,paused=false,gameRunning=false,raceTime=0,highScore=0;
let pitLane={x:200,y:200,r:30};

function getTrackPoint(t){
  const n=TRACK.length;
  const i=Math.floor(t*n)%n;
  const j=(i+1)%n;
  const f=(t*n)%1;
  return{x:TRACK[i].x*(1-f)+TRACK[j].x*f,y:TRACK[i].y*(1-f)+TRACK[j].y*f};
}

function getTrackAngle(t){
  const p1=getTrackPoint(t),p2=getTrackPoint(t+0.001);
  return Math.atan2(p2.y-p1.y,p2.x-p1.x);
}

function init(){
  player={t:0,speed:0,offset:0,laps:0,lastCheckpoint:0};
  aiCars=[];
  for(let i=0;i<3;i++){
    aiCars.push({t:(i+1)*0.05,speed:1.5+Math.random()*0.5,offset:(i-1)*8,laps:0,lastCheckpoint:0,color:['#ef4444','#3b82f6','#facc15'][i]});
  }
  lap=1;tireWear=100;raceTime=0;
}

function update(){
  if(paused||!gameRunning)return;
  raceTime++;
  const tireFactor=Math.max(0.3,tireWear/100);
  // player
  if(keys.up)player.speed=Math.min(3*tireFactor,player.speed+0.1);
  else if(keys.down)player.speed=Math.max(0,player.speed-0.15);
  else player.speed*=0.98;
  if(keys.left)player.offset=Math.max(-TRACK_W/2,player.offset-1.5);
  if(keys.right)player.offset=Math.min(TRACK_W/2,player.offset+1.5);

  const prevT=player.t;
  player.t=(player.t+player.speed*0.001)%1;
  if(player.t<prevT&&prevT>0.9){
    player.laps++;lap=player.laps+1;document.getElementById('lap').textContent=Math.min(lap,3);
    if(player.laps>=3){finishRace();return}
  }
  tireWear=Math.max(0,tireWear-0.02*player.speed);
  document.getElementById('tireFill').style.width=tireWear+'%';
  document.getElementById('tireFill').style.background=tireWear>50?'#22c55e':tireWear>20?'#facc15':'#ef4444';
  document.getElementById('speed').textContent=Math.round(player.speed*60);

  // AI
  aiCars.forEach(ai=>{
    const prevAI=ai.t;
    ai.t=(ai.t+ai.speed*0.001)%1;
    if(ai.t<prevAI&&prevAI>0.9)ai.laps++;
    ai.speed+=(Math.random()-0.5)*0.1;
    ai.speed=Math.max(1,Math.min(2.5,ai.speed));
  });

  // position
  const allCars=[{laps:player.laps,t:player.t,name:'You'},...aiCars.map((a,i)=>({laps:a.laps,t:a.t,name:'AI'+(i+1)}))];
  allCars.sort((a,b)=>b.laps-a.laps||b.t-a.t);
  const pos=allCars.findIndex(c=>c.name==='You')+1;
  document.getElementById('pos').textContent=pos;

  // pit check
  const pp=getTrackPoint(player.t);
  if(Math.abs(pp.x-pitLane.x)<pitLane.r&&Math.abs(pp.y-pitLane.y)<pitLane.r&&player.speed<0.5){
    tireWear=100;
  }
}

function pitStop(){
  player.speed=0.2;
  // will refuel when passing pit area
  document.getElementById('speed').textContent='PIT';
}

function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  // draw track
  ctx.strokeStyle='#334155';ctx.lineWidth=TRACK_W;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(TRACK[0].x,TRACK[0].y);
  for(let i=1;i<TRACK.length;i++)ctx.lineTo(TRACK[i].x,TRACK[i].y);
  ctx.closePath();ctx.stroke();
  // track center line
  ctx.strokeStyle='#475569';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(TRACK[0].x,TRACK[0].y);
  for(let i=1;i<TRACK.length;i++)ctx.lineTo(TRACK[i].x,TRACK[i].y);
  ctx.closePath();ctx.stroke();ctx.setLineDash([]);
  // start/finish
  const sf=TRACK[0];
  ctx.fillStyle='#facc15';ctx.fillRect(sf.x-2,sf.y-20,4,40);
  // pit
  ctx.fillStyle='rgba(34,197,94,0.3)';ctx.beginPath();ctx.arc(pitLane.x,pitLane.y,pitLane.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#22c55e';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('PIT',pitLane.x,pitLane.y+4);
  // AI cars
  aiCars.forEach(ai=>{
    const p=getTrackPoint(ai.t);const a=getTrackAngle(ai.t);
    const ox=Math.cos(a+Math.PI/2)*ai.offset,oy=Math.sin(a+Math.PI/2)*ai.offset;
    ctx.save();ctx.translate(p.x+ox,p.y+oy);ctx.rotate(a);
    ctx.fillStyle=ai.color;ctx.fillRect(-8,-5,16,10);
    ctx.restore();
  });
  // player
  const pp=getTrackPoint(player.t);const pa=getTrackAngle(player.t);
  const pox=Math.cos(pa+Math.PI/2)*player.offset,poy=Math.sin(pa+Math.PI/2)*player.offset;
  ctx.save();ctx.translate(pp.x+pox,pp.y+poy);ctx.rotate(pa);
  ctx.fillStyle='#22c55e';ctx.fillRect(-10,-6,20,12);
  ctx.fillStyle='#facc15';ctx.fillRect(6,-4,4,3);ctx.fillRect(6,1,4,3);
  ctx.restore();
}

function gameLoop(){
  update();draw();
  if(gameRunning)requestAnimationFrame(gameLoop);
}

function finishRace(){
  gameRunning=false;
  const time=Math.round(raceTime/60*100)/100;
  if(highScore===0||time<highScore){highScore=time;saveState()}
  const allCars=[{laps:player.laps,t:player.t,name:'You'},...aiCars.map((a,i)=>({laps:a.laps,t:a.t}))];
  allCars.sort((a,b)=>b.laps-a.laps||b.t-a.t);
  const pos=allCars.findIndex(c=>c.name==='You')+1;
  document.getElementById('goTitle').textContent=pos===1?'You Win!':'Race Over!';
  document.getElementById('goScore').textContent='Position: '+pos+' | Time: '+time+'s';
  document.getElementById('goHigh').textContent='Best: '+highScore+'s';
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'\u25B6':'\u23F8'}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  init();gameRunning=true;paused=false;
  document.getElementById('best').textContent=highScore||'-';
  gameLoop();
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'){keys.up=true;e.preventDefault()}if(e.key==='ArrowDown'){keys.down=true;e.preventDefault()}
  if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;
  if(e.key==='p'||e.key==='P')togglePause();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp')keys.up=false;if(e.key==='ArrowDown')keys.down=false;
  if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;
});

function saveState(){try{parent.postMessage({type:'ca-save',slug:'f1-racer',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='f1-racer'&&e.data.state){highScore=e.data.state.highScore||0}});
draw();
</script>
</body>
</html>
