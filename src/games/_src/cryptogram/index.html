<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cryptogram</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
.overlay p{color:#e2e8f0;font-size:1.1rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.6rem 1.5rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{opacity:0.9}
.hidden{display:none}
.game-area{border:2px solid #6366f1;padding:1rem;width:95%;max-width:650px;margin:0.5rem auto}
.quote-display{display:flex;flex-wrap:wrap;gap:1px 8px;line-height:2.5;justify-content:center}
.letter-pair{display:inline-flex;flex-direction:column;align-items:center;min-width:1.2em}
.letter-pair .cipher{color:#ef4444;font-weight:bold;font-size:1rem;font-family:monospace}
.letter-pair .decoded{font-size:0.9rem;color:#22c55e;min-height:1.1em;border-bottom:1px solid #334155;min-width:1em;text-align:center;cursor:pointer;font-family:monospace}
.letter-pair .decoded.active{border-bottom-color:#facc15;background:rgba(250,204,21,0.1)}
.letter-pair.space{min-width:0.5em}
.letter-pair.punct .cipher{color:#94a3b8}
.hint-section{display:flex;flex-wrap:wrap;gap:3px;margin:0.5rem 0;justify-content:center}
.freq{font-size:0.65rem;color:#94a3b8;background:#1e293b;padding:1px 4px;border:1px solid #334155}
.controls{display:flex;gap:0.5rem;margin:0.5rem 0;flex-wrap:wrap;justify-content:center}
.score-display{color:#22c55e;font-size:1rem;font-weight:bold}
.msg{font-size:0.9rem;min-height:1.1rem;text-align:center;margin:0.25rem}
.info{color:#94a3b8;font-size:0.8rem;text-align:center;margin:0.25rem}
.author{color:#facc15;font-size:0.85rem;font-style:italic;text-align:center;margin:0.25rem}
</style>
</head>
<body>
<h1>Cryptogram</h1>
<div class="score-display">Puzzle: <span id="puzzleNum">1</span>/10 | Score: <span id="score">0</span></div>
<div class="game-area">
<div class="quote-display" id="quoteDisplay"></div>
</div>
<div class="author" id="author"></div>
<div class="hint-section" id="hints"></div>
<div class="controls">
<button onclick="giveHint()">Hint</button>
<button onclick="clearAll()" style="background:#ef4444">Clear</button>
<button onclick="checkSolution()" style="background:#22c55e">Check</button>
</div>
<div class="msg" id="msg"></div>
<div class="info">Click an encrypted letter below, then type its real letter.</div>

<div class="overlay" id="startOverlay">
<h2>Cryptogram</h2>
<p>Decrypt the famous quote</p>
<p style="font-size:0.9rem;color:#94a3b8;max-width:300px;text-align:center">Each letter has been substituted with another. Click on a letter position and type the correct letter to decode the message.</p>
<button id="startBtn">Play</button>
</div>
<div class="overlay hidden" id="overOverlay">
<h2>All Solved!</h2>
<p>Final Score: <span id="finalScore">0</span></p>
<button id="againBtn">Play Again</button>
</div>

<script>
const QUOTES=[
{text:"Be yourself everyone else is already taken",author:"Oscar Wilde"},
{text:"Two things are infinite the universe and human stupidity",author:"Albert Einstein"},
{text:"In three words I can sum up everything I learned about life it goes on",author:"Robert Frost"},
{text:"The only way to do great work is to love what you do",author:"Steve Jobs"},
{text:"Life is what happens when you are busy making other plans",author:"John Lennon"},
{text:"Get busy living or get busy dying",author:"Stephen King"},
{text:"You miss one hundred percent of the shots you never take",author:"Wayne Gretzky"},
{text:"Whether you think you can or you think you cannot you are right",author:"Henry Ford"},
{text:"The mind is everything what you think you become",author:"Buddha"},
{text:"Strive not to be a success but rather to be of value",author:"Albert Einstein"}
];

let currentPuzzle=0;
let cipherMap={};
let reverseMap={};
let userMap={};
let selectedLetter=null;
let score=0;
let hintsUsed=0;
let highScore=0;
let gameActive=false;

function generateCipher(){
const alpha='abcdefghijklmnopqrstuvwxyz'.split('');
const shuffled=[...alpha];
for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
for(let i=0;i<26;i++){
if(alpha[i]===shuffled[i]){const j=(i+1)%26;[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
}
cipherMap={};reverseMap={};
for(let i=0;i<26;i++){cipherMap[alpha[i]]=shuffled[i];reverseMap[shuffled[i]]=alpha[i];}
}

function encode(text){
return text.split('').map(c=>{
const l=c.toLowerCase();
return cipherMap[l]?cipherMap[l]:c;
}).join('');
}

function renderQuote(){
const q=QUOTES[currentPuzzle];
const encoded=encode(q.text);
const container=document.getElementById('quoteDisplay');
container.innerHTML='';
const words=encoded.split(' ');
const origWords=q.text.split(' ');
words.forEach((word,wi)=>{
if(wi>0){
const sp=document.createElement('span');
sp.className='letter-pair space';
sp.innerHTML='&nbsp;';
container.appendChild(sp);
}
for(let i=0;i<word.length;i++){
const ch=word[i];
const span=document.createElement('span');
if(/[a-z]/i.test(ch)){
span.className='letter-pair';
const cipher=document.createElement('span');
cipher.className='cipher';
cipher.textContent=ch.toUpperCase();
const decoded=document.createElement('span');
decoded.className='decoded';
if(selectedLetter===ch.toLowerCase())decoded.classList.add('active');
decoded.textContent=userMap[ch.toLowerCase()]?userMap[ch.toLowerCase()].toUpperCase():'';
decoded.addEventListener('click',()=>{
selectedLetter=ch.toLowerCase();
renderQuote();
});
span.appendChild(decoded);
span.appendChild(cipher);
}else{
span.className='letter-pair punct';
const c2=document.createElement('span');
c2.className='cipher';c2.textContent=ch;
span.appendChild(c2);
}
container.appendChild(span);
}
});
document.getElementById('author').textContent='— '+q.author;
// Frequency hints
const freq={};
for(const c of encoded.toLowerCase())if(/[a-z]/.test(c))freq[c]=(freq[c]||0)+1;
const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
const hints=document.getElementById('hints');
hints.innerHTML='<span style="font-size:0.65rem;color:#94a3b8">Freq: </span>';
sorted.forEach(([l,n])=>{
const s=document.createElement('span');s.className='freq';
s.textContent=`${l.toUpperCase()}=${n}`;hints.appendChild(s);
});
}

function giveHint(){
if(!gameActive)return;
const encoded=encode(QUOTES[currentPuzzle].text).toLowerCase();
const letters=[...new Set(encoded.split('').filter(c=>/[a-z]/.test(c)))];
const unmapped=letters.filter(l=>!userMap[l]);
if(unmapped.length===0)return;
const l=unmapped[Math.floor(Math.random()*unmapped.length)];
userMap[l]=reverseMap[l];
hintsUsed++;
renderQuote();
}

function clearAll(){
if(!gameActive)return;
userMap={};selectedLetter=null;
renderQuote();
}

function checkSolution(){
if(!gameActive)return;
const msg=document.getElementById('msg');
const encoded=encode(QUOTES[currentPuzzle].text).toLowerCase();
const letters=new Set(encoded.split('').filter(c=>/[a-z]/.test(c)));
let correct=true;
for(const l of letters){
if(!userMap[l]||userMap[l]!==reverseMap[l]){correct=false;break;}
}
if(correct){
const pts=Math.max(10-hintsUsed*2,1);
score+=pts;
document.getElementById('score').textContent=score;
msg.textContent=`Solved! +${pts}`;msg.style.color='#22c55e';
currentPuzzle++;
if(currentPuzzle>=QUOTES.length){
gameActive=false;
if(score>highScore){highScore=score;save();}
document.getElementById('finalScore').textContent=score;
setTimeout(()=>document.getElementById('overOverlay').classList.remove('hidden'),1000);
}else{
setTimeout(()=>{loadPuzzle();msg.textContent='';},1500);
}
}else{
msg.textContent='Not quite right yet.';msg.style.color='#ef4444';
}
}

function loadPuzzle(){
generateCipher();
userMap={};selectedLetter=null;hintsUsed=0;
document.getElementById('puzzleNum').textContent=currentPuzzle+1;
renderQuote();
}

function startGame(){
currentPuzzle=0;score=0;
document.getElementById('score').textContent='0';
document.getElementById('msg').textContent='';
document.getElementById('startOverlay').classList.add('hidden');
document.getElementById('overOverlay').classList.add('hidden');
gameActive=true;
loadPuzzle();
}

document.addEventListener('keydown',e=>{
if(!gameActive)return;
if(selectedLetter&&/^[a-z]$/i.test(e.key)){
const val=e.key.toLowerCase();
for(const k in userMap)if(userMap[k]===val)delete userMap[k];
userMap[selectedLetter]=val;
// Auto advance
const encoded=encode(QUOTES[currentPuzzle].text).toLowerCase();
const letters=[...new Set(encoded.split('').filter(c=>/[a-z]/.test(c)))];
const idx=letters.indexOf(selectedLetter);
for(let i=1;i<letters.length;i++){
const next=letters[(idx+i)%letters.length];
if(!userMap[next]){selectedLetter=next;break;}
}
renderQuote();
}
if(e.key==='Backspace'&&selectedLetter){delete userMap[selectedLetter];renderQuote();}
});

function save(){try{parent.postMessage({type:'ca-save',slug:'cryptogram',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{
if(e.data&&e.data.type==='ca-load'&&e.data.slug==='cryptogram'){
if(e.data.state&&e.data.state.highScore)highScore=e.data.state.highScore;
}
});

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);
</script>
</body>
</html>
