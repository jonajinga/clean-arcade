<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fraction Frenzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
.game-area{border:2px solid #6366f1;max-width:100%;width:380px;padding:16px;position:relative;min-height:440px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:20px;text-align:center}
.overlay.hidden{display:none}
button{background:#6366f1;color:#e2e8f0;border:none;padding:10px 24px;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
button:hover{opacity:0.9}
.score-bar{display:flex;justify-content:space-between;font-size:0.85rem;color:#94a3b8;margin-bottom:10px}
.pies{display:flex;justify-content:center;gap:30px;margin:16px 0}
.pie-wrap{text-align:center}
.pie-wrap canvas{cursor:pointer;border:3px solid transparent;transition:border-color 0.2s}
.pie-wrap canvas:hover{border-color:#6366f1}
.pie-wrap canvas.selected{border-color:#facc15}
.fraction-label{font-size:1.3rem;font-weight:bold;margin-top:6px}
.or{display:flex;align-items:center;font-size:1.2rem;color:#94a3b8;font-weight:bold}
.feedback{text-align:center;font-size:1rem;margin-top:12px;min-height:24px}
.equal-btn{background:#3b82f6;margin-top:10px;display:block;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
<h1>Fraction Frenzy</h1>
<div class="game-area">
<div class="overlay" id="startOverlay">
<p style="margin-bottom:12px;font-size:1.1rem">Fraction Frenzy</p>
<p style="margin-bottom:16px;font-size:0.85rem;color:#94a3b8">Which fraction is larger?<br>Click the bigger pie! 30 rounds.</p>
<button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<p style="margin-bottom:8px;font-size:1.2rem">Complete!</p>
<p style="margin-bottom:8px" id="goScore"></p>
<p style="margin-bottom:16px;color:#94a3b8" id="goHigh"></p>
<button onclick="startGame()">Play Again</button>
</div>
<div class="score-bar"><span>Round: <b id="round">1</b>/30</span><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span></div>
<div class="pies">
<div class="pie-wrap"><canvas id="pieA" width="120" height="120" onclick="pick('A')"></canvas><div class="fraction-label" id="labelA"></div></div>
<div class="or">VS</div>
<div class="pie-wrap"><canvas id="pieB" width="120" height="120" onclick="pick('B')"></canvas><div class="fraction-label" id="labelB"></div></div>
</div>
<button class="equal-btn" onclick="pick('E')">Equal</button>
<div class="feedback" id="feedback"></div>
</div>
<script>
let currentRound=0,score=0,highScore=0,answered=false,fracA,fracB;

function drawPie(canvasId,num,den,color){
  const cv=document.getElementById(canvasId),cx=cv.getContext('2d');
  cx.clearRect(0,0,120,120);
  const cx0=60,cy0=60,r=50;
  // background circle
  cx.beginPath();cx.arc(cx0,cy0,r,0,Math.PI*2);cx.fillStyle='#1e293b';cx.fill();cx.strokeStyle='#334155';cx.lineWidth=2;cx.stroke();
  // filled portion
  if(num>0){
    cx.beginPath();cx.moveTo(cx0,cy0);
    cx.arc(cx0,cy0,r,-Math.PI/2,-Math.PI/2+(num/den)*Math.PI*2);
    cx.closePath();cx.fillStyle=color;cx.fill();
  }
  // divider lines
  for(let i=0;i<den;i++){
    const angle=-Math.PI/2+(i/den)*Math.PI*2;
    cx.beginPath();cx.moveTo(cx0,cy0);cx.lineTo(cx0+Math.cos(angle)*r,cy0+Math.sin(angle)*r);
    cx.strokeStyle='#0f172a';cx.lineWidth=1.5;cx.stroke();
  }
}

function genFraction(){
  const den=[2,3,4,5,6,8][Math.floor(Math.random()*6)];
  const num=Math.floor(Math.random()*den)+1;
  return{num,den};
}

function setupRound(){
  if(currentRound>=30){endGame();return}
  answered=false;
  fracA=genFraction();fracB=genFraction();
  // avoid too many equals
  if(Math.random()>0.15&&fracA.num/fracA.den===fracB.num/fracB.den){fracB=genFraction()}
  drawPie('pieA',fracA.num,fracA.den,'#6366f1');
  drawPie('pieB',fracB.num,fracB.den,'#3b82f6');
  document.getElementById('labelA').textContent=fracA.num+'/'+fracA.den;
  document.getElementById('labelB').textContent=fracB.num+'/'+fracB.den;
  document.getElementById('round').textContent=currentRound+1;
  document.getElementById('feedback').textContent='';
  document.getElementById('pieA').classList.remove('selected');
  document.getElementById('pieB').classList.remove('selected');
}

function pick(choice){
  if(answered)return;answered=true;
  const valA=fracA.num/fracA.den,valB=fracB.num/fracB.den;
  let correct;
  if(valA>valB)correct='A';else if(valB>valA)correct='B';else correct='E';
  const isCorrect=choice===correct;
  if(isCorrect){
    score++;document.getElementById('score').textContent=score;
    document.getElementById('feedback').textContent='Correct!';document.getElementById('feedback').style.color='#22c55e';
  } else {
    const ans=correct==='E'?'They are equal':correct==='A'?fracA.num+'/'+fracA.den:fracB.num+'/'+fracB.den;
    document.getElementById('feedback').textContent='Wrong! '+ans+' is bigger';document.getElementById('feedback').style.color='#ef4444';
  }
  if(choice==='A')document.getElementById('pieA').classList.add('selected');
  if(choice==='B')document.getElementById('pieB').classList.add('selected');
  currentRound++;setTimeout(setupRound,1200);
}

function endGame(){
  if(score>highScore){highScore=score;saveState()}
  document.getElementById('goScore').textContent='Score: '+score+'/30';
  document.getElementById('goHigh').textContent='Best: '+highScore;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  score=0;currentRound=0;
  document.getElementById('score').textContent=0;
  document.getElementById('best').textContent=highScore;
  setupRound();
}

function saveState(){try{parent.postMessage({type:'ca-save',slug:'fraction-frenzy',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='fraction-frenzy'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
