<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geometry Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.4rem;margin:.5rem 0;color:#facc15}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{color:#e2e8f0}
.btn{background:#6366f1;color:#e2e8f0;border:none;padding:.7rem 1.8rem;font-size:1rem;border-radius:0;cursor:pointer;font-family:inherit}
.btn:hover{background:#818cf8}
.hidden{display:none!important}
#game{display:flex;flex-direction:column;align-items:center;width:100%;max-width:600px;padding:.5rem}
.hud{display:flex;justify-content:space-between;width:100%;font-size:.85rem;margin-bottom:.3rem}
.hud span{background:#1e293b;padding:.2rem .6rem;border-radius:.25rem}
canvas{background:#1e293b;border-radius:0;display:block;max-width:100%;touch-action:none}
.pause-row{margin-top:.75rem}
.pause-btn{background:#334155;color:#e2e8f0;border:none;padding:.5rem 1.5rem;font-size:1.2rem;border-radius:0;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="overlay" id="startOverlay">
<h2>Geometry Dash</h2>
<p>Tap/Space to jump over spikes and gaps.<br>One hit = death. Score = distance.</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="endOverlay">
<h2>Crashed!</h2>
<p id="endMsg"></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
<div id="game">
<h1>Geometry Dash</h1>
<div class="hud">
<span>Score: <b id="score">0</b></span>
<span>Best: <b id="high">0</b></span>
</div>
<canvas id="canvas" width="600" height="300"></canvas>
<div class="pause-row"><button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button></div>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W=600,H=300,GROUND=H-40,SIZE=28;
let player,obstacles,score,highScore=0,gameActive=false,paused=false,lastTime,speed,spawnDist,nextSpawn,raf;
function resize(){let w=Math.min(600,window.innerWidth-16);canvas.style.width=w+'px';canvas.style.height=(w*H/W)+'px';}
window.addEventListener('resize',resize);
function jump(){if(player.onGround){player.vy=-10;player.onGround=false;}}
function spawnObstacle(){
  let types=['spike','gap','tallSpike'];
  let t=types[Math.random()*types.length|0];
  let x=W+20;
  if(t==='spike')obstacles.push({type:'spike',x,y:GROUND-SIZE,w:SIZE,h:SIZE});
  else if(t==='tallSpike')obstacles.push({type:'spike',x,y:GROUND-SIZE*1.8,w:SIZE,h:SIZE*1.8});
  else obstacles.push({type:'gap',x,w:SIZE*2.5,y:GROUND,h:40});
}
function update(dt){
  speed=4+score*0.003;
  // player physics
  player.vy+=0.5;
  player.y+=player.vy;
  // ground
  let onPlatform=true;
  // check gap
  for(let ob of obstacles){
    if(ob.type==='gap'){
      if(player.x+SIZE>ob.x&&player.x<ob.x+ob.w){onPlatform=false;}
    }
  }
  if(onPlatform&&player.y+SIZE>=GROUND){player.y=GROUND-SIZE;player.vy=0;player.onGround=true;}
  else if(!onPlatform&&player.y+SIZE>=GROUND){/* fell in gap */endGame();return;}
  if(player.y+SIZE>H){endGame();return;}
  // obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    let ob=obstacles[i];ob.x-=speed;
    if(ob.x+ob.w<-20){obstacles.splice(i,1);continue;}
    // collision
    if(ob.type==='spike'){
      // shrink hitbox a bit
      let ox=ob.x+4,oy=ob.y+4,ow=ob.w-8,oh=ob.h-8;
      if(player.x+SIZE>ox&&player.x<ox+ow&&player.y+SIZE>oy&&player.y<oy+oh){endGame();return;}
    }
  }
  nextSpawn-=speed;
  if(nextSpawn<=0){spawnObstacle();nextSpawn=120+Math.random()*200-score*0.1;if(nextSpawn<80)nextSpawn=80;}
  score+=speed*0.1;
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // ground
  ctx.fillStyle='#334155';ctx.fillRect(0,GROUND,W,H-GROUND);
  // gaps
  obstacles.forEach(ob=>{
    if(ob.type==='gap'){ctx.clearRect(ob.x,ob.y,ob.w,ob.h);ctx.fillStyle='#0f172a';ctx.fillRect(ob.x,ob.y,ob.w,ob.h);}
  });
  // player
  ctx.fillStyle='#6366f1';ctx.fillRect(player.x,player.y,SIZE,SIZE);
  // spikes
  obstacles.forEach(ob=>{
    if(ob.type==='spike'){
      ctx.fillStyle='#ef4444';
      ctx.beginPath();
      ctx.moveTo(ob.x,ob.y+ob.h);
      ctx.lineTo(ob.x+ob.w/2,ob.y);
      ctx.lineTo(ob.x+ob.w,ob.y+ob.h);
      ctx.closePath();ctx.fill();
    }
  });
  // ground line
  ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  document.getElementById('score').textContent=score|0;
  document.getElementById('high').textContent=highScore|0;
}
function loop(ts){
  if(!gameActive)return;
  if(!lastTime)lastTime=ts;
  let dt=(ts-lastTime)/16;lastTime=ts;
  if(!paused){update(dt);draw();}
  raf=requestAnimationFrame(loop);
}
function endGame(){
  gameActive=false;
  if(score>highScore)highScore=score|0;
  document.getElementById('endMsg').textContent=`Distance: ${score|0} | Best: ${highScore}`;
  document.getElementById('endOverlay').classList.remove('hidden');
  saveState();
}
function togglePause(){
  if(!gameActive)return;paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';
  if(paused)saveState();
}
function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  player={x:80,y:GROUND-SIZE,vy:0,onGround:true};
  obstacles=[];score=0;speed=4;nextSpawn=200;paused=false;lastTime=0;gameActive=true;
  document.getElementById('pauseBtn').textContent='⏸';
  raf=requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.key==='ArrowUp'){e.preventDefault();jump();}
  if(e.key==='p'||e.key==='P')togglePause();
});
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
canvas.addEventListener('click',jump);
function saveState(){try{window.parent.postMessage({type:'ca-save',slug:'geometry-dash',state:{highScore}},'*');}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.state){highScore=e.data.state.highScore||0;}});
resize();
</script>
</body>
</html>
