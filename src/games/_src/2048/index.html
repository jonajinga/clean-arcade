<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
.game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 16px;
  max-width: 100vw;
}
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 420px;
}
.header h1 {
  font-size: 36px;
  font-weight: 800;
  color: #f1f5f9;
  flex: 1;
}
.score-boxes {
  display: flex;
  gap: 8px;
}
.score-box {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 0;
  padding: 6px 14px;
  text-align: center;
  min-width: 70px;
}
.score-box .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #94a3b8;
}
.score-box .val {
  font-size: 20px;
  font-weight: 700;
  color: #f1f5f9;
  font-variant-numeric: tabular-nums;
}
.btn-row {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 420px;
}
.btn {
  padding: 10px 20px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 0;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn:hover { background: #2563eb; }
.board {
  position: relative;
  background: #1e293b;
  border-radius: 0;
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.cell {
  width: 90px;
  height: 90px;
  background: #283548;
  border-radius: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 28px;
  transition: none;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.88);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
.overlay h2 { font-size: 32px; margin-bottom: 8px; color: #f1f5f9; }
.overlay p { color: #94a3b8; margin-bottom: 20px; font-size: 16px; }
.overlay .btn { padding: 12px 36px; font-size: 16px; }
.hidden { display: none !important; }

.msg-toast {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(234, 179, 8, 0.95);
  color: #0f172a;
  padding: 12px 28px;
  border-radius: 0;
  font-size: 22px;
  font-weight: 700;
  z-index: 20;
  pointer-events: none;
  animation: toastFade 1.5s ease-out forwards;
}
@keyframes toastFade {
  0% { opacity: 1; transform: translateX(-50%) translateY(0); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
}

@media (max-width: 440px) {
  .cell { width: calc((100vw - 72px) / 4); height: calc((100vw - 72px) / 4); font-size: 22px; }
  .header h1 { font-size: 28px; }
  .score-box { min-width: 58px; padding: 4px 10px; }
  .score-box .val { font-size: 17px; }
}
@media (max-width: 340px) {
  .cell { font-size: 18px; }
  .board { gap: 6px; padding: 6px; }
}
</style>
</head>
<body>

<div id="start-overlay" class="overlay" onclick="newGame()">
  <h2>2048</h2>
  <p>Arrow keys or swipe to play</p>
  <button class="btn" onclick="newGame()">Play</button>
</div>

<div id="gameover-overlay" class="overlay hidden">
  <h2>Game Over</h2>
  <p id="final-text">No more moves!</p>
  <button class="btn" onclick="newGame()">Play Again</button>
</div>

<div class="game-container">
  <div class="header">
    <h1>2048</h1>
    <div class="score-boxes">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="val" id="score-display">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="val" id="best-display">0</div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="newGame()">New Game</button>
  </div>
  <div class="board" id="board"></div>
</div>

<script>
(function() {
  var SIZE = 4;
  var grid, score, bestScore, won, gameOver;
  bestScore = 0;

  var TILE_COLORS = {
    0:    { bg: '#283548', fg: '#283548' },
    2:    { bg: '#e2e8f0', fg: '#1e293b' },
    4:    { bg: '#cbd5e1', fg: '#1e293b' },
    8:    { bg: '#f97316', fg: '#fff' },
    16:   { bg: '#ea580c', fg: '#fff' },
    32:   { bg: '#ef4444', fg: '#fff' },
    64:   { bg: '#dc2626', fg: '#fff' },
    128:  { bg: '#eab308', fg: '#fff' },
    256:  { bg: '#ca8a04', fg: '#fff' },
    512:  { bg: '#a16207', fg: '#fff' },
    1024: { bg: '#854d0e', fg: '#fff' },
    2048: { bg: '#fbbf24', fg: '#0f172a' },
    4096: { bg: '#7c3aed', fg: '#fff' },
    8192: { bg: '#6d28d9', fg: '#fff' }
  };

  function getColor(v) {
    return TILE_COLORS[v] || { bg: '#4c1d95', fg: '#fff' };
  }

  var boardEl = document.getElementById('board');

  function createCells() {
    boardEl.innerHTML = '';
    for (var i = 0; i < SIZE * SIZE; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'c' + i;
      boardEl.appendChild(cell);
    }
  }

  function renderGrid() {
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var v = grid[r][c];
        var cell = document.getElementById('c' + (r * SIZE + c));
        var col = getColor(v);
        cell.style.background = col.bg;
        cell.style.color = col.fg;
        cell.textContent = v || '';
        var len = String(v).length;
        if (len >= 5) cell.style.fontSize = '16px';
        else if (len === 4) cell.style.fontSize = '20px';
        else if (len === 3) cell.style.fontSize = '24px';
        else cell.style.fontSize = '';
      }
    }
    document.getElementById('score-display').textContent = score;
    document.getElementById('best-display').textContent = bestScore;
  }

  function emptyGrid() {
    var g = [];
    for (var r = 0; r < SIZE; r++) {
      var row = [];
      for (var c = 0; c < SIZE; c++) row.push(0);
      g.push(row);
    }
    return g;
  }

  function emptyCells() {
    var cells = [];
    for (var r = 0; r < SIZE; r++)
      for (var c = 0; c < SIZE; c++)
        if (!grid[r][c]) cells.push([r, c]);
    return cells;
  }

  function addRandom() {
    var cells = emptyCells();
    if (!cells.length) return;
    var pick = cells[Math.floor(Math.random() * cells.length)];
    grid[pick[0]][pick[1]] = Math.random() < 0.9 ? 2 : 4;
  }

  function slide(row) {
    var filtered = row.filter(function(v) { return v !== 0; });
    var merged = [];
    var pts = 0;
    for (var i = 0; i < filtered.length; i++) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        var val = filtered[i] * 2;
        merged.push(val);
        pts += val;
        i++;
      } else {
        merged.push(filtered[i]);
      }
    }
    while (merged.length < SIZE) merged.push(0);
    return { row: merged, pts: pts };
  }

  function move(dir) {
    if (gameOver) return false;
    var moved = false;
    var pts = 0;

    if (dir === 'left') {
      for (var r = 0; r < SIZE; r++) {
        var result = slide(grid[r]);
        if (grid[r].join(',') !== result.row.join(',')) moved = true;
        grid[r] = result.row;
        pts += result.pts;
      }
    } else if (dir === 'right') {
      for (var r = 0; r < SIZE; r++) {
        var rev = grid[r].slice().reverse();
        var result = slide(rev);
        var newRow = result.row.reverse();
        if (grid[r].join(',') !== newRow.join(',')) moved = true;
        grid[r] = newRow;
        pts += result.pts;
      }
    } else if (dir === 'up') {
      for (var c = 0; c < SIZE; c++) {
        var col = [];
        for (var r = 0; r < SIZE; r++) col.push(grid[r][c]);
        var result = slide(col);
        for (var r = 0; r < SIZE; r++) {
          if (grid[r][c] !== result.row[r]) moved = true;
          grid[r][c] = result.row[r];
        }
        pts += result.pts;
      }
    } else if (dir === 'down') {
      for (var c = 0; c < SIZE; c++) {
        var col = [];
        for (var r = SIZE - 1; r >= 0; r--) col.push(grid[r][c]);
        var result = slide(col);
        var newCol = result.row.reverse();
        for (var r = 0; r < SIZE; r++) {
          if (grid[r][c] !== newCol[r]) moved = true;
          grid[r][c] = newCol[r];
        }
        pts += result.pts;
      }
    }

    if (moved) {
      score += pts;
      if (score > bestScore) bestScore = score;
      addRandom();
      renderGrid();
      checkWin();
      if (isGameOver()) {
        gameOver = true;
        document.getElementById('final-text').textContent = 'Score: ' + score;
        document.getElementById('gameover-overlay').classList.remove('hidden');
      }
      saveState();
    }
    return moved;
  }

  function checkWin() {
    if (won) return;
    for (var r = 0; r < SIZE; r++)
      for (var c = 0; c < SIZE; c++)
        if (grid[r][c] === 2048) {
          won = true;
          showToast('You reached 2048!');
          return;
        }
  }

  function showToast(msg) {
    var el = document.createElement('div');
    el.className = 'msg-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 1600);
  }

  function isGameOver() {
    for (var r = 0; r < SIZE; r++)
      for (var c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return false;
        if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return false;
        if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return false;
      }
    return true;
  }

  function saveState() {
    try { parent.postMessage({ type: 'ca-save', slug: '2048', state: { grid: grid, score: score, best: bestScore, won: won, over: gameOver } }, '*'); } catch(e) {}
  }

  window.newGame = function() {
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
    grid = emptyGrid();
    score = 0;
    won = false;
    gameOver = false;
    addRandom();
    addRandom();
    renderGrid();
  };

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (gameOver) return;
    var dir = null;
    switch(e.key) {
      case 'ArrowLeft':  dir = 'left'; break;
      case 'ArrowRight': dir = 'right'; break;
      case 'ArrowUp':    dir = 'up'; break;
      case 'ArrowDown':  dir = 'down'; break;
    }
    if (dir) { e.preventDefault(); move(dir); }
  });

  // Touch / swipe
  var touchStartX, touchStartY;
  document.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, {passive: true});

  document.addEventListener('touchend', function(e) {
    if (gameOver) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    var absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 30) return;

    var dir;
    if (absDx > absDy) {
      dir = dx > 0 ? 'right' : 'left';
    } else {
      dir = dy > 0 ? 'down' : 'up';
    }
    move(dir);
  }, {passive: true});

  // Parent save/load
  var stateRestored = false;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ca-load' && e.data.state) {
      var s = e.data.state;
      if (s.grid) {
        // Full state restore
        grid = s.grid;
        score = s.score || 0;
        bestScore = s.best || 0;
        won = !!s.won;
        gameOver = !!s.over;
        stateRestored = true;
        document.getElementById('start-overlay').classList.add('hidden');
        renderGrid();
        if (gameOver) {
          document.getElementById('final-text').textContent = 'Score: ' + score;
          document.getElementById('gameover-overlay').classList.remove('hidden');
        }
      } else if (typeof s.highScore === 'number') {
        // Legacy: high score only
        bestScore = s.highScore;
        document.getElementById('best-display').textContent = bestScore;
      }
    }
  });

  createCells();
  grid = emptyGrid();
  renderGrid();
})();
</script>
</body>
</html>
