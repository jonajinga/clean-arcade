<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kart Racer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{font-size:1.2rem;margin:0.5rem 0 0.25rem;color:#facc15;text-align:center}
#game-area{position:relative;width:90vw;max-width:450px;height:450px;border:2px solid #6366f1;background:#1e293b}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:1rem}
.overlay h2{color:#facc15;font-size:1.5rem}
button{background:#6366f1;color:#e2e8f0;border:none;padding:0.75rem 2rem;font-size:1rem;cursor:pointer;border-radius:0;font-family:inherit}
.hidden{display:none!important}
canvas{display:block;width:100%;height:100%}
#controls{display:grid;grid-template-columns:repeat(3,1fr);gap:0.3rem;margin-top:0.5rem;max-width:200px}
.ctrl-btn{background:#334155;padding:0.6rem;font-size:1.2rem;text-align:center}
#gas-btn{background:#22c55e}
#pause-btn{background:#334155;padding:0.5rem 1rem;font-size:0.9rem}
</style>
</head>
<body>
<h1>Kart Racer</h1>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="start-overlay" class="overlay">
    <h2>Kart Racer</h2>
    <p>Top-down kart racing! 3 laps to win.</p>
    <p style="color:#94a3b8">Arrow keys or buttons. Pass checkpoints!</p>
    <button onclick="startGame()">Play</button>
  </div>
  <div id="end-overlay" class="overlay hidden">
    <h2 id="end-title">Race Over</h2>
    <p id="end-msg"></p>
    <p id="hs" style="color:#facc15"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="controls">
  <div></div>
  <button class="ctrl-btn" onmousedown="keys.up=true" onmouseup="keys.up=false" ontouchstart="keys.up=true;event.preventDefault()" ontouchend="keys.up=false">&#9650;</button>
  <div></div>
  <button class="ctrl-btn" onmousedown="keys.left=true" onmouseup="keys.left=false" ontouchstart="keys.left=true;event.preventDefault()" ontouchend="keys.left=false">&#9664;</button>
  <button id="pause-btn" onclick="togglePause()">⏸</button>
  <button class="ctrl-btn" onmousedown="keys.right=true" onmouseup="keys.right=false" ontouchstart="keys.right=true;event.preventDefault()" ontouchend="keys.right=false">&#9654;</button>
  <div></div>
  <button class="ctrl-btn" onmousedown="keys.down=true" onmouseup="keys.down=false" ontouchstart="keys.down=true;event.preventDefault()" ontouchend="keys.down=false">&#9660;</button>
  <div></div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
const keys={up:false,down:false,left:false,right:false};
// Track defined as series of waypoints forming an oval
const TRACK_PTS=[
  {x:225,y:80},{x:350,y:100},{x:400,y:180},{x:380,y:300},
  {x:300,y:380},{x:150,y:380},{x:70,y:300},{x:50,y:180},
  {x:100,y:100}
];
const TRACK_W=50;
let player,aiKarts,lap,checkpoint,paused,gameOver,highScore=0,startTime,boosts;

function resize(){const r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;W=canvas.width;H=canvas.height}
resize();window.addEventListener('resize',resize);

function startGame(){
  player={x:225,y:80,angle:Math.PI/2,speed:0,lap:0,cp:0};
  aiKarts=[
    {x:210,y:70,angle:Math.PI/2,speed:1.8,lap:0,cp:0,color:'#ef4444',cpIdx:0},
    {x:240,y:70,angle:Math.PI/2,speed:1.6,lap:0,cp:0,color:'#a855f7',cpIdx:0}
  ];
  boosts=[];
  // Place boosts
  for(let i=0;i<3;i++){
    const pt=TRACK_PTS[Math.floor(Math.random()*TRACK_PTS.length)];
    boosts.push({x:pt.x+Math.random()*30-15,y:pt.y+Math.random()*30-15,active:true});
  }
  paused=false;gameOver=false;startTime=Date.now();
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  loop();
}
function togglePause(){if(gameOver)return;paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶':'⏸';if(!paused)loop()}
function loop(){
  if(paused||gameOver)return;
  update();draw();requestAnimationFrame(loop);
}
function update(){
  // Player controls
  if(keys.up)player.speed=Math.min(3.5,player.speed+0.1);
  else if(keys.down)player.speed=Math.max(-1,player.speed-0.15);
  else player.speed*=0.98;
  if(keys.left)player.angle-=0.04*Math.max(0.5,player.speed);
  if(keys.right)player.angle+=0.04*Math.max(0.5,player.speed);
  player.x+=Math.cos(player.angle)*player.speed;
  player.y+=Math.sin(player.angle)*player.speed;
  // Keep on track (basic bounds)
  player.x=Math.max(10,Math.min(W-10,player.x));
  player.y=Math.max(10,Math.min(H-10,player.y));
  // Checkpoints
  checkCheckpoint(player);
  // Boosts
  boosts.forEach(b=>{
    if(b.active&&Math.hypot(b.x-player.x,b.y-player.y)<20){
      b.active=false;player.speed=Math.min(5,player.speed+2);
      setTimeout(()=>b.active=true,5000);
    }
  });
  // AI karts
  aiKarts.forEach(ai=>{
    const target=TRACK_PTS[ai.cpIdx%TRACK_PTS.length];
    const dx=target.x-ai.x,dy=target.y-ai.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    ai.angle=Math.atan2(dy,dx);
    ai.x+=Math.cos(ai.angle)*ai.speed;
    ai.y+=Math.sin(ai.angle)*ai.speed;
    if(dist<30){
      ai.cpIdx=(ai.cpIdx+1)%TRACK_PTS.length;
      if(ai.cpIdx===0)ai.lap++;
    }
    // Collision with player
    if(Math.hypot(ai.x-player.x,ai.y-player.y)<15){
      player.speed*=0.5;
    }
  });
  // Win check
  if(player.lap>=3){endGame(true);return}
  if(aiKarts.some(ai=>ai.lap>=3)){endGame(false)}
}
function checkCheckpoint(p){
  const next=TRACK_PTS[p.cp%TRACK_PTS.length];
  if(Math.hypot(next.x-p.x,next.y-p.y)<35){
    p.cp++;
    if(p.cp%TRACK_PTS.length===0)p.lap++;
  }
}
function draw(){
  ctx.fillStyle='#15803d';ctx.fillRect(0,0,W,H);
  // Track
  ctx.strokeStyle='#475569';ctx.lineWidth=TRACK_W;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  TRACK_PTS.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();ctx.stroke();
  // Track center line
  ctx.strokeStyle='#facc15';ctx.lineWidth=2;ctx.setLineDash([10,10]);
  ctx.beginPath();
  TRACK_PTS.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();ctx.stroke();ctx.setLineDash([]);
  // Boosts
  boosts.forEach(b=>{
    if(!b.active)return;
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(b.x,b.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.fillText('⚡',b.x,b.y+3);
  });
  // AI karts
  aiKarts.forEach(ai=>{
    ctx.save();ctx.translate(ai.x,ai.y);ctx.rotate(ai.angle);
    ctx.fillStyle=ai.color;ctx.fillRect(-10,-7,20,14);
    ctx.fillStyle='#0f172a';ctx.fillRect(6,-5,4,10);
    ctx.restore();
  });
  // Player
  ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);
  ctx.fillStyle='#3b82f6';ctx.fillRect(-10,-7,20,14);
  ctx.fillStyle='#facc15';ctx.fillRect(6,-5,4,10);
  ctx.restore();
  // HUD
  ctx.fillStyle='rgba(15,23,42,0.7)';ctx.fillRect(0,0,W,24);
  ctx.fillStyle='#e2e8f0';ctx.font='12px system-ui';ctx.textAlign='left';
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  ctx.fillText(`Lap ${Math.min(player.lap+1,3)}/3 | Speed: ${Math.round(player.speed*20)}mph | Time: ${elapsed}s`,8,16);
  ctx.lineWidth=1;
}
function endGame(won){
  gameOver=true;
  const time=Math.floor((Date.now()-startTime)/1000);
  if(won&&time<highScore||highScore===0){highScore=time;saveScore()}
  document.getElementById('end-title').textContent=won?'You Win!':'You Lost!';
  document.getElementById('end-msg').textContent=won?'Time: '+time+'s':'AI finished first';
  document.getElementById('hs').textContent='Best: '+highScore+'s';
  document.getElementById('end-overlay').classList.remove('hidden');
}
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();keys.up=true}
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();keys.down=true}
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=true;
  if(e.code==='KeyP')togglePause();
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowUp'||e.code==='KeyW')keys.up=false;
  if(e.code==='ArrowDown'||e.code==='KeyS')keys.down=false;
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=false;
});
function saveScore(){try{parent.postMessage({type:'ca-save',slug:'kart-racer',state:{highScore}},'*')}catch(e){}}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='ca-load'&&e.data.slug==='kart-racer'&&e.data.state){highScore=e.data.state.highScore||0}});
</script>
</body>
</html>
