<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Trainer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:1rem}
.overlay h1{font-size:2rem;margin-bottom:.5rem;color:#6366f1}
.overlay h2{font-size:1.5rem;margin-bottom:.5rem;color:#facc15}
.overlay p{font-size:1.1rem;margin-bottom:1rem;color:#e2e8f0}
.btn{padding:.75rem 2rem;font-size:1.2rem;border:none;border-radius:.5rem;cursor:pointer;background:#6366f1;color:#fff;font-family:inherit;margin:.25rem}
.btn:hover{background:#4f46e5}
.hidden{display:none}
#arena{position:relative;width:min(500px,90vw);height:min(400px,60vh);background:#1e293b;border:2px solid #6366f1;border-radius:.5rem;cursor:crosshair;overflow:hidden;touch-action:none}
.target{position:absolute;border-radius:50%;background:radial-gradient(circle,#facc15 30%,#ef4444 70%);cursor:crosshair;transition:transform .1s;box-shadow:0 0 10px rgba(239,68,68,.5)}
.target:hover{transform:scale(1.05)}
.hud{display:flex;justify-content:space-between;width:min(500px,90vw);margin-top:.5rem;font-size:.95rem}
.hud span{color:#facc15;font-weight:700}
.stats{margin-top:.5rem;text-align:center;font-size:.9rem;color:#94a3b8}
.pause-btn{margin-top:.75rem;padding:.5rem 1.5rem;font-size:1.3rem;border:none;border-radius:.5rem;cursor:pointer;background:#3b82f6;color:#fff;font-family:inherit}
</style>
</head>
<body>
<div id="start-overlay" class="overlay">
<h1>Aim Trainer</h1>
<p>Click the targets as fast as you can!<br>30-second rounds. Track hits and accuracy.</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div id="gameover-overlay" class="overlay hidden">
<h2>Time's Up!</h2>
<p>Hits: <span id="final-hits" style="color:#22c55e">0</span></p>
<p>Clicks: <span id="final-clicks">0</span></p>
<p>Accuracy: <span id="final-accuracy" style="color:#facc15">0%</span></p>
<p>Avg reaction: <span id="final-avg" style="color:#3b82f6">0ms</span></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>

<div id="arena" onclick="missClick()"></div>
<div class="hud">
<div>Time: <span id="timer">30</span>s</div>
<div>Hits: <span id="hits">0</span></div>
<div>Accuracy: <span id="accuracy">100%</span></div>
</div>
<button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸</button>

<script>
const arena=document.getElementById('arena');
let hits,clicks,timeLeft,paused,running,interval,targetEl,spawnTime,reactionTimes;

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  hits=0;clicks=0;timeLeft=30;paused=false;running=true;reactionTimes=[];
  document.getElementById('pause-btn').textContent='⏸';
  updateHUD();
  clearInterval(interval);
  interval=setInterval(tick,1000);
  spawnTarget();
}

function tick(){
  if(paused)return;
  timeLeft--;
  document.getElementById('timer').textContent=timeLeft;
  if(timeLeft<=0){endGame();}
}

function spawnTarget(){
  if(targetEl)targetEl.remove();
  const size=30+Math.random()*30;
  const aw=arena.clientWidth,ah=arena.clientHeight;
  const x=Math.random()*(aw-size),y=Math.random()*(ah-size);
  targetEl=document.createElement('div');
  targetEl.className='target';
  targetEl.style.width=size+'px';targetEl.style.height=size+'px';
  targetEl.style.left=x+'px';targetEl.style.top=y+'px';
  targetEl.onclick=e=>{e.stopPropagation();hitTarget();};
  arena.appendChild(targetEl);
  spawnTime=performance.now();
}

function hitTarget(){
  if(!running||paused)return;
  hits++;clicks++;
  reactionTimes.push(Math.round(performance.now()-spawnTime));
  updateHUD();
  spawnTarget();
}

function missClick(){
  if(!running||paused)return;
  clicks++;
  updateHUD();
}

function updateHUD(){
  document.getElementById('hits').textContent=hits;
  const acc=clicks>0?Math.round(hits/clicks*100):100;
  document.getElementById('accuracy').textContent=acc+'%';
}

function endGame(){
  running=false;clearInterval(interval);
  if(targetEl)targetEl.remove();
  const acc=clicks>0?Math.round(hits/clicks*100):0;
  const avg=reactionTimes.length>0?Math.round(reactionTimes.reduce((a,b)=>a+b,0)/reactionTimes.length):0;
  document.getElementById('final-hits').textContent=hits;
  document.getElementById('final-clicks').textContent=clicks;
  document.getElementById('final-accuracy').textContent=acc+'%';
  document.getElementById('final-avg').textContent=avg+'ms';
  document.getElementById('gameover-overlay').classList.remove('hidden');
  window.parent.postMessage({type:'ca-save',slug:'aim-trainer',state:{hits,clicks,acc,avg}},'*');
}

function togglePause(){
  if(!running)return;
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
  if(paused)window.parent.postMessage({type:'ca-save',slug:'aim-trainer',state:{hits,clicks,timeLeft}},'*');
}

document.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P')togglePause();});

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    hits=e.data.state.hits||0;clicks=e.data.state.clicks||0;
    timeLeft=e.data.state.timeLeft||30;
  }
});
</script>
</body>
</html>
