<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pattern Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1rem;touch-action:manipulation}
h1{font-size:1.5rem;margin:.5rem 0}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:1rem}
.overlay h2{font-size:2rem;color:#facc15}
.overlay p{font-size:1.1rem;max-width:400px;text-align:center;line-height:1.5}
.overlay .score{font-size:1.4rem;color:#22c55e}
.btn{padding:12px 32px;font-size:1.1rem;border:none;border-radius:6px;cursor:pointer;background:#6366f1;color:#fff;font-weight:600}
.btn:hover{background:#4f46e5}
.hidden{display:none!important}
#hud{display:flex;gap:1.5rem;margin:.5rem 0;font-size:1rem;flex-wrap:wrap;justify-content:center}
#hud span{color:#facc15}
#game{max-width:400px;width:100%;text-align:center}
#status{font-size:1.2rem;margin:.75rem 0;min-height:1.5rem;font-weight:600}
#grid{display:inline-grid;gap:4px;margin:1rem auto}
.cell{width:48px;height:48px;border-radius:4px;border:2px solid #334155;cursor:pointer;transition:background .15s,border-color .15s}
.cell.off{background:#1e293b}
.cell.on{background:#6366f1}
.cell.correct{background:#22c55e;border-color:#22c55e}
.cell.wrong{background:#ef4444;border-color:#ef4444}
.cell.showing{background:#6366f1;border-color:#818cf8}
.cell.locked{cursor:default}
#check-btn{padding:10px 28px;font-size:1rem;border:none;border-radius:6px;background:#22c55e;color:#0f172a;font-weight:600;cursor:pointer;margin:.75rem 0}
#check-btn:disabled{opacity:.4;cursor:default}
@media(max-width:400px){.cell{width:40px;height:40px}}
</style>
</head>
<body>
<h1>Pattern Match</h1>
<div id="hud">
<div>Round: <span id="round">1</span></div>
<div>Score: <span id="score">0</span></div>
<div>High: <span id="high">0</span></div>
</div>
<div id="game">
<div id="status">Memorize the pattern!</div>
<div id="grid"></div>
<button id="check-btn" onclick="checkPattern()" disabled>Check</button>
</div>
<div id="start-overlay" class="overlay">
<h2>Pattern Match</h2>
<p>A pattern will briefly appear on the grid. Memorize it, then reproduce it from memory! Patterns get more complex each round. How far can you go?</p>
<button class="btn" onclick="startGame()">Play</button>
</div>
<div id="end-overlay" class="overlay hidden">
<h2>Game Over!</h2>
<p class="score" id="end-score"></p>
<button class="btn" onclick="startGame()">Play Again</button>
</div>
<script>
const SLUG='pattern-match';
let gridSize,pattern,playerPattern,round,score,highScore=0,phase,cells;

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
  round=1;score=0;
  updateHUD();
  nextRound();
}

function getGridSize(){
  if(round<=2)return 4;
  if(round<=5)return 5;
  if(round<=8)return 6;
  return 7;
}

function getPatternCount(){
  return Math.min(3+round,Math.floor(gridSize*gridSize*0.45));
}

function nextRound(){
  gridSize=getGridSize();
  let count=getPatternCount();
  pattern=new Set();
  while(pattern.size<count){
    pattern.add(Math.floor(Math.random()*gridSize*gridSize));
  }
  playerPattern=new Set();
  phase='showing';
  document.getElementById('status').textContent='Memorize the pattern!';
  document.getElementById('status').style.color='#facc15';
  document.getElementById('check-btn').disabled=true;
  renderGrid(true);
  // show time scales with complexity
  let showTime=1500+round*200;
  if(showTime>4000)showTime=4000;
  setTimeout(()=>{
    phase='input';
    document.getElementById('status').textContent='Reproduce the pattern!';
    document.getElementById('status').style.color='#e2e8f0';
    document.getElementById('check-btn').disabled=false;
    renderGrid(false);
  },showTime);
}

function renderGrid(showPattern){
  let grid=document.getElementById('grid');
  grid.style.gridTemplateColumns='repeat('+gridSize+', 48px)';
  grid.innerHTML='';
  for(let i=0;i<gridSize*gridSize;i++){
    let cell=document.createElement('div');
    cell.className='cell';
    if(showPattern&&pattern.has(i)){
      cell.classList.add('showing');
    }else if(!showPattern&&playerPattern.has(i)){
      cell.classList.add('on');
    }else{
      cell.classList.add('off');
    }
    if(showPattern)cell.classList.add('locked');
    cell.onclick=()=>toggleCell(i);
    grid.appendChild(cell);
  }
  // responsive cell size
  let maxW=Math.min(48,Math.floor((Math.min(400,window.innerWidth-32)-gridSize*4)/gridSize));
  grid.style.gridTemplateColumns='repeat('+gridSize+', '+maxW+'px)';
  grid.querySelectorAll('.cell').forEach(c=>{c.style.width=maxW+'px';c.style.height=maxW+'px';});
}

function toggleCell(i){
  if(phase!=='input')return;
  if(playerPattern.has(i))playerPattern.delete(i);
  else playerPattern.add(i);
  renderGrid(false);
}

function checkPattern(){
  if(phase!=='input')return;
  phase='result';
  document.getElementById('check-btn').disabled=true;
  let grid=document.getElementById('grid');
  let cells=grid.querySelectorAll('.cell');
  let correctCount=0,totalPattern=pattern.size;

  cells.forEach((cell,i)=>{
    let isPattern=pattern.has(i);
    let isPlayer=playerPattern.has(i);
    cell.className='cell locked';
    if(isPattern&&isPlayer){cell.classList.add('correct');correctCount++;}
    else if(isPlayer&&!isPattern){cell.classList.add('wrong');}
    else if(isPattern&&!isPlayer){cell.classList.add('showing');}
    else{cell.classList.add('off');}
  });

  let accuracy=Math.round(correctCount/totalPattern*100);
  let wrongCount=[...playerPattern].filter(i=>!pattern.has(i)).length;
  // Penalize extra clicks
  let adjustedAcc=Math.max(0,accuracy-wrongCount*10);
  let pts=Math.round(adjustedAcc/100*round*10);
  score+=pts;

  let status=document.getElementById('status');
  if(adjustedAcc>=80){
    status.textContent='Round '+round+': '+accuracy+'% match! +'+pts+' pts';
    status.style.color='#22c55e';
    round++;
    updateHUD();
    setTimeout(nextRound,2000);
  }else{
    status.textContent='Only '+accuracy+'% match. Game over!';
    status.style.color='#ef4444';
    setTimeout(endGame,2000);
  }
}

function updateHUD(){
  document.getElementById('round').textContent=round;
  document.getElementById('score').textContent=score;
  document.getElementById('high').textContent=highScore;
}

function endGame(){
  if(score>highScore)highScore=score;
  updateHUD();
  document.getElementById('end-score').textContent='Score: '+score+' | Reached Round '+round+' | Best: '+highScore;
  document.getElementById('end-overlay').classList.remove('hidden');
  try{parent.postMessage({type:'ca-save',slug:SLUG,state:{highScore}},'*')}catch(e){}
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='ca-load'&&e.data.state){
    if(e.data.state.highScore){highScore=e.data.state.highScore;document.getElementById('high').textContent=highScore;}
  }
});
</script>
</body>
</html>
